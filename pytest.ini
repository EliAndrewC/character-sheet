[pytest]
# Default: only run unit tests (not e2e)
testpaths = tests
# Playwright defaults
; browser can be overridden with --browser
markers =
    navigation: nav bar, login, logout, profile link
    homepage: character list, badges, empty state
    profile: profile page, display name, access grants
    school: school selection, HTMX loading, techniques
    school_rings: school ring dropdown, fixed vs multi-ring
    rings: ring +/- controls, min/max
    knacks: knack +/- controls, min/max
    combat_skills: attack/parry controls and constraints
    skills: skill +/- controls, XP costs
    honor_rank_recognition: honor/rank/recognition controls
    advantages: advantage checkboxes, XP toggle
    exclusive_pairs: mutually exclusive advantage/disadvantage pairs
    advantage_details: detail fields (text, skills, player dropdowns)
    autosave: auto-save, save status indicator
    apply_changes: apply changes modal, quick-fill, redirect
    permissions: edit/delete visibility, owner dropdown, non-editor view
    banners: draft status banners on sheet and homepage
    status_display: honor/rank/recognition/stipend on sheet
    tracking: wounds, void points, per-adventure abilities
    skill_rolls: skill roll display with bonuses and notes
    xp_summary: XP breakdown, budget, and clickable expansion on sheet
    version_history: version list, revert, inline edit, author
    groups: gaming groups, party effects, admin manage groups
    sections: rich-text sections (Notes/Backstory/Allies) on character sheet
    rolls: click-to-roll dice from the character sheet
    gm_awards: GM-awarded Rank/Recognition bonus modal, history list, lock
    responsive: responsive design sanity checks (overflow, hamburger, label widths)
    google_sheets: Google Sheets export button visibility and flow
    import: character import flow (dropdown, form, progress page, notes banner)
