{% extends "base.html" %}

{% block title %}L7R - Generate Art - {{ character.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto" data-testid="art-gen-gender-page">
    <div class="flex items-center gap-3 mb-6">
        <a href="/characters/{{ character.id }}/edit"
           class="text-ink/60 hover:text-ink text-sm">&larr; Back to edit</a>
    </div>
    <h1 class="text-3xl font-bold mb-2">Generate Character Art</h1>
    <p class="text-ink/70 mb-6">
        Step 1 of 3. Pick the character's gender - it controls the
        pronouns used in the prompt.
    </p>

    <form method="GET"
          action="/characters/{{ character.id }}/art/generate/options"
          class="space-y-6 bg-white rounded-lg shadow p-6 border border-ink/10">
        <fieldset class="space-y-3">
            <legend class="text-sm font-medium mb-2">Character gender</legend>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="gender" value="male"
                       required
                       class="w-4 h-4"
                       data-testid="gender-male">
                <span>Male (he / him)</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="gender" value="female"
                       class="w-4 h-4"
                       data-testid="gender-female">
                <span>Female (she / her)</span>
            </label>
        </fieldset>

        <div class="flex gap-3">
            <a href="/characters/{{ character.id }}/edit"
               class="bg-ink/20 hover:bg-ink/30 text-ink px-4 py-2 rounded font-medium">
                Cancel
            </a>
            <button type="submit"
                    class="bg-accent hover:bg-red-900 text-parchment px-4 py-2 rounded font-medium"
                    data-action="gender-continue">
                Continue
            </button>
        </div>
    </form>
</div>
{% endblock %}
