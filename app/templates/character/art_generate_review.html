{% extends "base.html" %}

{% block title %}L7R - Review Prompt - {{ character.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto"
     x-data="{ generating: false }"
     data-testid="art-gen-review-page">
    <div class="flex items-center gap-3 mb-6">
        <a href="/characters/{{ character.id }}/art/generate"
           class="text-ink/60 hover:text-ink text-sm">&larr; Start over</a>
    </div>
    <h1 class="text-3xl font-bold mb-2">Review the Prompt</h1>
    <p class="text-ink/70 mb-6">
        Step 3 of 3. Edit the prompt below if you'd like to tweak the
        wording, then click Generate Art.
    </p>

    <form method="POST"
          action="/characters/{{ character.id }}/art/generate/submit/{{ staging_id }}"
          class="space-y-4 bg-white rounded-lg shadow p-6 border border-ink/10"
          @submit="generating = true"
          data-testid="art-gen-review-form">
        <label for="prompt" class="block text-sm font-medium">
            Final prompt
        </label>
        <textarea id="prompt" name="prompt"
                  rows="10"
                  required
                  :disabled="generating"
                  class="w-full border border-ink/20 rounded p-3 bg-parchment font-mono text-sm disabled:bg-ink/5 disabled:text-ink/40"
                  data-testid="prompt-textarea">{{ prompt_text }}</textarea>

        <div class="flex gap-3">
            <a href="/characters/{{ character.id }}/art/generate"
               class="bg-ink/20 hover:bg-ink/30 text-ink px-4 py-2 rounded font-medium"
               :class="{ 'opacity-40 pointer-events-none': generating }">
                Back
            </a>
            <button type="submit"
                    :disabled="generating"
                    class="bg-accent hover:bg-red-900 text-parchment px-4 py-2 rounded font-medium disabled:opacity-40"
                    data-action="generate-art">
                <span x-show="!generating">Generate Art</span>
                <span x-show="generating" x-cloak>Generating&hellip;</span>
            </button>
        </div>
    </form>
</div>
{% endblock %}
