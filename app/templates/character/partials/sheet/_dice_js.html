                    formula.kitsune_swap_from_ring = formula.kitsune_swap.kitsune_swap_from_ring;
                    formula.kitsune_swap_to_ring = formula.kitsune_swap.kitsune_swap_to_ring;
                }
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];

                // Mantis Wave-Treader Special: defensive posture at wound-check
                // time adds +5 and labels the bonus in bonus_sources.
                if (window._trackingBridge?.currentPosture?.() === 'defensive') {
                    formula.flat = (formula.flat || 0) + 5;
                    if (!formula.bonus_sources) formula.bonus_sources = [];
                    formula.bonus_sources = [...formula.bonus_sources, '+5 from defensive posture'];
                }
                // Mantis Wave-Treader 5th Dan: per-round accumulator of +N to
                // wound checks where N is the count of defensive postures.
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    const _mantisWcAcc = window._trackingBridge?.defensivePhaseCount?.() || 0;
                    if (_mantisWcAcc > 0) {
                        formula.flat = (formula.flat || 0) + _mantisWcAcc;
                        if (!formula.bonus_sources) formula.bonus_sources = [];
                        formula.bonus_sources = [...formula.bonus_sources,
                            `+${_mantisWcAcc} from Mantis 5th Dan (defensive posture count)`];
                    }
                }
                // Mantis Wave-Treader 3rd Dan defensive: per-round accumulator
                // set via the Tracking-section button. Applies to wound checks.
                if (this.schoolAbilities.mantis_3rd_dan_defensive) {
                    const _mantis3rdWc = window._trackingBridge?.defensive3rdDanAccum || 0;
                    if (_mantis3rdWc > 0) {
                        formula.flat = (formula.flat || 0) + _mantis3rdWc;
                        if (!formula.bonus_sources) formula.bonus_sources = [];
                        formula.bonus_sources = [...formula.bonus_sources,
                            `+${_mantis3rdWc} from Mantis 3rd Dan (defensive)`];
                    }
                }

                // Iaijutsu strike: no reroll
                if (this.wcIsStrike) {
                    formula.reroll_tens = false;
                    formula.no_reroll_reason = 'iaijutsu_strike';
                }

                // Add void spending
                if (voidCount > 0) {
                    formula.rolled += voidCount;
                    formula.kept += voidCount;
                    formula.void_spent = voidCount;
                    const _cap = window.L7RRollMath.applyDiceCap(formula.rolled, formula.kept, formula.flat);
                    formula.rolled = _cap.rolled; formula.kept = _cap.kept; formula.flat = _cap.flat;
                    if (_cap.overflowFlat > 0) formula.void_overflow_bonus = _cap.overflowFlat;
                    // Mirumoto 5th Dan: +10 per VP on combat rolls (wound checks are combat rolls)
                    const combatBonus = this.voidSpendConfig.combat_vp_flat_bonus || 0;
                    if (combatBonus > 0) {
                        formula.flat += voidCount * combatBonus;
                    }
                    // Akodo 4th Dan / Yogo Warden 4th Dan: VP free raises on wound checks
                    // are now handled POST-ROLL via the discretionary section buttons
                    // Deduct void
                    const options = this.computeVoidOptions();
                    if (options[voidCount - 1]) this.deductVoidPoints(options[voidCount - 1]);
                }

                // Hida 5th Dan: apply banked counterattack bonus
                if (this.hidaBankedWcBonus > 0) {
                    const hidaBonus = this.hidaBankedWcBonus;
                    formula.flat += hidaBonus;
                    formula.hida_counterattack_bonus = hidaBonus;
                    if (!formula.bonus_sources) formula.bonus_sources = [];
                    formula.bonus_sources.push('+' + hidaBonus + ' from Hida 5th Dan counterattack excess');
                    this.hidaBankedWcBonus = 0;
                    if (window._trackingBridge) window._trackingBridge.hidaBankedWcBonus = 0;
                    window._trackingBridge?.saveBankedBonuses();
                }

                // Doji Artisan 5th Dan: auto-apply bonus from light wounds
                if (formula.doji_5th_dan_wc) {
                    const dojiBonus = window.L7RRollMath.bonusPer5Over10(this.wcLightWounds);
                    if (dojiBonus > 0) {
                        formula.flat += dojiBonus;
                        formula.doji_5th_dan_bonus = dojiBonus;
                        if (!formula.bonus_sources) formula.bonus_sources = [];
                        formula.bonus_sources.push('+' + dojiBonus + ' from Doji 5th Dan');
                    }
                }

                // Daidoji 3rd Dan: counterattack free raises
                if (this.wcDaidojiCounterattack && this.daidojiCounterattackData) {
                    const bonus = this.daidojiCounterattackData.bonus;
                    formula.flat += bonus;
                    formula.daidoji_counterattack_bonus = bonus;
                    formula.daidoji_counterattack_raises = this.daidojiCounterattackData.raises;
                    if (!formula.bonus_sources) formula.bonus_sources = [];
                    formula.bonus_sources.push('+' + bonus + ' from Daidoji counterattack (' + this.daidojiCounterattackData.raises + ' free raises)');
                }

                // Roll the dice
                this.wcPhase = 'rolling';
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    formula.rolled, formula.reroll_tens,
                    this.prefs.dice_animation_enabled, playSound,
                    'dice-animation-wc'
                );

                // Keep highest dice (normal roll, not initiative)
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(formula.kept, sorted.length);
                const keptDice = sorted.slice(sorted.length - keptCount);
                let rollTotal = keptDice.reduce((s, d) => s + d.value, 0) + formula.flat;

                // Shosuro Actor 5th Dan: add sum of lowest 3 dice (post-roll)
                this.shosuroLowest3Bonus = 0;
                if (formula.shosuro_5th_dan) {
                    const allValues = sorted.map(d => d.value);
                    const lowest3 = allValues.slice(0, Math.min(3, allValues.length));
                    this.shosuroLowest3Bonus = lowest3.reduce((s, v) => s + v, 0);
                    rollTotal += this.shosuroLowest3Bonus;
                }

                // Conviction: carry forward any points already spent.
                if (this.convictionSpentThisRoll > 0) {
                    rollTotal += this.convictionSpentThisRoll;
                }
                // Priest 5th Dan ally conviction persists across rerolls.
                rollTotal += this.totalPriestAllySpentThisRoll();

                // Store result
                this.formula = formula;
                this.finalDice = sorted.map((d, i) => ({
                    value: d.value,
                    kept: i >= sorted.length - keptCount
                }));
                this.keptDice = keptDice;
                this.unkeptDice = sorted.slice(0, sorted.length - keptCount);
                this.keptSum = keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = rollTotal;

                const lw = this.wcLightWounds;
                const effectiveTotal = rollTotal;
                this.wcRollTotal = effectiveTotal;
                this.wcRaisesSpent = 0;

                const wc = window.L7RRollMath.woundCheckResult(effectiveTotal, lw, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                if (!wc.passed) {
                    this.wcBayushiHalfLw = !!this.formulas['wound_check']?.bayushi_5th_dan_half_lw;
                }

                this.wcResultApplied = false;
                this.wcResultChoice = '';
                this.wcPhase = 'result';
                this._prerenderRollImage(this._buildWoundCheckImagePayload());
                this._saveRollHistoryCreate();

                // Auto-apply if no discretionary bonuses and failed (or iaijutsu)
                if (!this.wcPassed && (this.wcIsStrike || !this.wcHasDiscretionary)) {
                    this.applyWoundCheckFailure();
                }
            },

            wcSpendRaise() {
                if (this.wcRaisesSpent >= this.wcMaxRaisesPerRoll) return;
                const t = window._trackingBridge;
                const raisesUsed = t?.getCount?.('adventure_raises') || 0;
                const raisesAvail = Math.max(0, (this.advRaisesConfig.available || 0) - raisesUsed);
                if (this.wcRaisesSpent >= raisesAvail) return;

                this.wcRaisesSpent++;
                this.baseTotal += 5;
                this.wcRollTotal += 5;
                const wc = window.L7RRollMath.woundCheckResult(this.wcRollTotal, this.wcLightWounds, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                // Deduct the raise from tracking
                if (t?.setCount) t.setCount('adventure_raises', raisesUsed + 1);
            },

            wcSpendMatsuBonus(idx) {
                const b = this.matsuBankedWcBonuses[idx];
                if (!b || b.spent) return;
                b.spent = true;
                this.wcMatsuBonusApplied += b.amount;
                this.baseTotal += b.amount;
                this.wcRollTotal += b.amount;
                const wc = window.L7RRollMath.woundCheckResult(this.wcRollTotal, this.wcLightWounds, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                window._trackingBridge?.saveBankedBonuses();
            },

            wcUndoMatsuBonus() {
                if (this.wcMatsuBonusApplied <= 0) return;
                const last = [...this.matsuBankedWcBonuses].reverse().find(b => b.spent);
                if (!last) return;
                last.spent = false;
                this.wcMatsuBonusApplied -= last.amount;
                this.baseTotal -= last.amount;
                this.wcRollTotal -= last.amount;
                const wc = window.L7RRollMath.woundCheckResult(this.wcRollTotal, this.wcLightWounds, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                window._trackingBridge?.saveBankedBonuses();
            },

            // wcSpendBankedExcess is now handled inline in the template buttons

            wcUndoRaise() {
                if (this.wcRaisesSpent <= 0) return;
                const t = window._trackingBridge;
                const raisesUsed = t?.getCount?.('adventure_raises') || 0;
                this.wcRaisesSpent--;
                this.baseTotal -= 5;
                this.wcRollTotal -= 5;
                const wc = window.L7RRollMath.woundCheckResult(this.wcRollTotal, this.wcLightWounds, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                if (t?.setCount) t.setCount('adventure_raises', Math.max(0, raisesUsed - 1));
            },

            applyWoundCheckFailure() {
                const t = window._trackingBridge;
                if (!t || this.wcResultApplied) return;
                // Non-editors: the WC walk-through is informational only -
                // never mutate the bridge's lightWounds / seriousWounds /
                // tempVoidPoints. The save shim already rejects the POST,
                // but we also want the displayed counters on the sheet to
                // stay anchored at the persisted values throughout.
                if (t.canEdit) {
                    const swGained = this.wcSeriousWounds;
                    t.seriousWounds += swGained;
                    t.lightWounds = 0;
                    // Yogo Warden: gain 1 temp VP per serious wound taken
                    if (this.schoolAbilities.yogo_temp_vp_on_sw && swGained > 0) {
                        t.tempVoidPoints += swGained;
                    }
                    t.save();
                    window.dispatchEvent(new CustomEvent('wound-changed', { detail: { serious: t.seriousWounds } }));
                }
                this.wcResultApplied = true;
                this.wcResultChoice = 'failure_applied';
                this._flushRollHistoryUpdate();
            },

            wcKeepLightWounds() {
                // Passed - player chooses to keep their light wounds.
                // Non-editors get no banked-bonus side effects (those would
                // bloat the priest/ally's adventureState without permission).
                const t = window._trackingBridge;
                if (t?.canEdit) {
                    if (this.schoolAbilities.isawa_bank_wc_excess && this.wcPassed && this.wcMargin > 0) {
                        this.bankedWcExcess.push({ amount: this.wcMargin, spent: false });
                    }
                    if (this.schoolAbilities.akodo_wc_attack_bonus && this.wcPassed && this.wcMargin > 0) {
                        const bonus = window.L7RRollMath.akodoBankedBonus(this.wcMargin, this.schoolAbilities.akodo_attack_skill || 0);
                        if (bonus > 0) t.akodoBankedBonuses.push({ amount: bonus, spent: false });
                    }
                    if (t.saveBankedBonuses) t.saveBankedBonuses();
                }
                this.wcResultChoice = 'keep_lw';
                this._flushRollHistoryUpdate();
                this.wcModalOpen = false;
            },

            wcTakeSeriousAndReset() {
                // Passed - player chooses to take 1 serious, reset light to 0.
                // Non-editors: no mutation of the displayed sheet state.
                const t = window._trackingBridge;
                if (!t) return;
                if (t.canEdit) {
                    t.seriousWounds += 1;
                    if (this.schoolAbilities.yogo_temp_vp_on_sw) {
                        t.tempVoidPoints += 1;
                    }
                    t.lightWounds = 0;
                    t.save();
                    window.dispatchEvent(new CustomEvent('wound-changed', { detail: { serious: t.seriousWounds } }));
                }
                this.wcResultChoice = 'take_1_sw';
                this._flushRollHistoryUpdate();
                this.wcModalOpen = false;
            },

            wcAcceptResult() {
                // Accept the current discretionary-adjusted result
                if (!this.wcResultApplied) {
                    this.applyWoundCheckFailure();
                }
                this.wcModalOpen = false;
            },

            async rerollImpairedTens(priest) {
                // Priest "sick or impaired" ritual: reroll the impaired 10s on
                // the CURRENT result. Visible only when the character rolled an
                // Impaired roll (``no_reroll_reason === 'impaired'``) AND at
                // least one 10 is sitting in the final pool. Discretionary
                // spends (raises, Conviction, Mirumoto round points, etc.)
                // made before clicking the button carry through unchanged.
                if (!this.formula || this.formula.no_reroll_reason !== 'impaired') return;
                // Rebuild the parts-preserving pool from kept + unkept
                // (finalDice drops the exploded-parts array).
                const pool = [...(this.unkeptDice || []), ...(this.keptDice || [])]
                    .map(d => ({ value: d.value, parts: d.parts ? [...d.parts] : [d.value] }));
                const tenIndices = pool
                    .map((d, i) => d.value === 10 ? i : -1)
                    .filter(i => i >= 0);
                if (tenIndices.length === 0) return;

                const disc = this._genericDiscretionaryTotal();
                const convictionCarry = this.convictionSpentThisRoll || 0;
                const priestAllyCarry = this.totalPriestAllySpentThisRoll();

                this.phase = 'rolling';
                // New dice explode on 10 (the whole point of the ritual is
                // that the character ignores their impaired penalty).
                const newDice = await this._rerollDice(
                    tenIndices.length, true, 'dice-animation'
                );
                tenIndices.forEach((idx, j) => {
                    pool[idx] = { value: newDice[j].value, parts: newDice[j].parts };
                });

                const sortedAsc = pool.slice().sort((a, b) => a.value - b.value);
                const keptCount = Math.min(this.formula.kept, sortedAsc.length);
                const isInit = this.formula.is_initiative;
                const keptSet = new Set();
                if (isInit) {
                    for (let i = 0; i < keptCount; i++) keptSet.add(i);
                } else {
                    for (let i = sortedAsc.length - keptCount; i < sortedAsc.length; i++) {
                        keptSet.add(i);
                    }
                }
                this.finalDice = sortedAsc.map((d, i) => ({ value: d.value, kept: keptSet.has(i) }));
                this.keptDice = sortedAsc.filter((_, i) => keptSet.has(i));
                this.unkeptDice = sortedAsc.filter((_, i) => !keptSet.has(i));
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);

                // Shosuro 5th Dan "lowest 3" bonus depends on the full pool
                // and must be recomputed against the new dice.
                this.shosuroLowest3Bonus = 0;
                if (this.schoolAbilities.shosuro_add_lowest_3 && !isInit) {
                    const lowest3 = sortedAsc
                        .slice(0, Math.min(3, sortedAsc.length))
                        .map(d => d.value);
                    this.shosuroLowest3Bonus = lowest3.reduce((s, v) => s + v, 0);
                }

                this.baseTotal = this.keptSum
                    + (this.formula.flat || 0)
                    + (this.shosuroLowest3Bonus || 0)
                    + convictionCarry
                    + priestAllyCarry
                    + disc;

                this.phase = 'done';
            },

            async rollBless(title) {
                // Priest bless ritual 2k1 roll. Conviction may be spent via
                // the standard in-modal block; void is never offered because
                // the roll menu that exposes VP options is bypassed.
                this.rollMenuOpen = false;
                this.owHoverRow = null;
                this.parryHoverRow = null;
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];
                this.courtier5thApplied = false;
                this.dojiOpponentResult = 0;
                this.dojiTnRollApplied = false;
                // Bless is a ritual, not a skill/combat roll — suppress all
                // post-roll school hooks (feint temp VP, Mirumoto parry VP, etc).
                this._postRollHooksFired = true;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.mirumotoPointsSpentThisRoll = 0;
                this.currentRollKey = 'bless';
                this.shosuroLowest3Bonus = 0;
                this.perRoundResetMessages = [];
                this.raisesSpentThisRoll = 0;

                this.formula = {
                    label: title,
                    rolled: 2,
                    kept: 1,
                    flat: 0,
                    reroll_tens: true,
                    is_initiative: false,
                    bonuses: [],
                    adventure_raises_max_per_roll: 0,
                };
                this.title = title;
                this.formulaText = '2k1';
                this.open = true;
                await this.runRoll();
            },

            async rollSpendVPForXk1({ x, title }) {
                // Deduct 1 VP through deductVoidPoints so school hooks fire
                // (e.g. Ide 5th Dan grants temp VP on regular VP spend).
                // Priority: temp > regular > worldliness.
                const t = window._trackingBridge;
                const fromTemp = (t?.tempVoidPoints || 0) > 0 ? 1 : 0;
                const fromRegular = !fromTemp && (t?.voidPoints || 0) > 0 ? 1 : 0;
                const fromWorldliness = (!fromTemp && !fromRegular) ? 1 : 0;
                this.deductVoidPoints({ fromRegular, fromTemp, fromWorldliness });

                this.title = title;
                // Roll-history key (see roll_descriptions.py: "spend_vp_xk1").
                // The ":<school>" suffix lets the explainer tooltip resolve to
                // that school's actual 3rd Dan technique rules text (Isawa Ishi,
                // Ide Diplomat, etc.); the bare key falls back to generic text.
                // Without setting this at all, the row would inherit the
                // previous roll's key and the create POST would never fire.
                this.currentRollKey = 'spend_vp_xk1:' + ({{ character.school|tojson }} || '');
                this.formulaText = `${x}k1`;
                this.formula = { rolled: x, kept: 1, flat: 0, reroll_tens: true, is_initiative: false };
                this.raisesSpentThisRoll = 0;
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.courtier5thApplied = false;
                this.mirumotoPointsSpentThisRoll = 0;
                this._postRollHooksFired = true;
                this.phase = 'rolling';
                this.finalDice = [];
                this.unkeptDice = [];
                this.keptDice = [];
                this.baseTotal = 0;
                this.keptSum = 0;
                this.open = true;

                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    x, true, this.prefs.dice_animation_enabled, playSound, 'dice-animation'
                );

                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = 1;
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.slice(sorted.length - keptCount);
                this.unkeptDice = sorted.slice(0, sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum;
                this.phase = 'done';
                // Pre-render the copy-as-image PNG and persist to Roll History,
                // exactly like the standard roll path (runRoll). Previously this
                // roll was never recorded, so it never appeared in the history.
                this._prerenderRollImage(this._buildRollImagePayload());
                this._saveRollHistoryCreate();
            },

            close() {
                // Flush any debounced roll-history PATCH so a quick close
                // immediately after toggling a discretionary bonus still
                // lands the final state.
                this._flushRollHistoryUpdate();
                this.open = false;
                this.phase = 'idle';
            },
        };
    }
    </script>
