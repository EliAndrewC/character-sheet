    <script>
    function freeformRoller() {
        return {
            ffOpen: false,
            ffPhase: 'pre',  // 'pre' | 'rolling' | 'done'
            ffRolled: 1,
            ffKept: 1,
            ffRerollTens: {{ 'false' if is_impaired_now else 'true' }},
            ffFinalDice: [],
            ffTotal: 0,
            ffFormulaText: '',
            ffPrefs: { dice_animation_enabled: true, dice_sound_enabled: true },
            _ffEarthRing: {{ ring_map['Earth'] }},

            init() {
                if (this._ffInited) return;
                this._ffInited = true;
                try {
                    const p = JSON.parse(document.getElementById('user-prefs').textContent || '{}');
                    this.ffPrefs.dice_animation_enabled = p.dice_animation_enabled !== false;
                    this.ffPrefs.dice_sound_enabled = p.dice_sound_enabled !== false;
                } catch (e) { /* keep defaults */ }
            },

            _impairedNow() {
                const t = window._trackingBridge;
                const sw = (t && typeof t.seriousWounds === 'number')
                    ? t.seriousWounds : {{ character.current_serious_wounds or 0 }};
                return window.L7RRollMath.isImpaired(sw, this._ffEarthRing);
            },

            openModal() {
                this.ffPhase = 'pre';
                this.ffRolled = 1;
                this.ffKept = 1;
                this.ffRerollTens = !this._impairedNow();
                this.ffFinalDice = [];
                this.ffTotal = 0;
                this.ffFormulaText = '';
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                this.ffOpen = true;
            },

            close() {
                this.ffOpen = false;
            },

            // ----------------------------------------------------------------
            // Copy-as-image plumbing for the freeform modal. Freeform lives
            // in its own ``x-data`` scope (siblings to the diceRoller), so
            // it carries a local copy of the state under the same names the
            // shared partial expects (rollImageStatus / rollImageBlob /
            // copyRollImage / _prerenderRollImage). Alpine resolves x-show
            // / @click bindings against whichever scope is active at render
            // time, so the partial template works unchanged inside either
            // owner.
            // ----------------------------------------------------------------
            rollImageStatus: 'idle',
            rollImageBlob: null,
            _rollImageReqId: 0,

            _rollHistoryReqId: 0,

            _saveFreeformRollHistory() {
                const t = window._trackingBridge;
                if (!t || !t._charId) return;
                const reqId = ++this._rollHistoryReqId;
                const payload = this._buildFreeformImagePayload();
                fetch('/characters/' + t._charId + '/rolls', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        roll_key: 'freeform',
                        roll_label: 'Freeform Roll',
                        payload: payload,
                        impaired_at_roll: this._impairedNow(),
                        tn: null,
                        action_die_spent: null,
                    }),
                }).catch(() => { /* non-fatal */ });
                // Freeform has no post-roll discretionary changes, so we
                // don't need to capture the row id for later PATCH.
                void reqId;
            },

            _buildFreeformImagePayload() {
                const all = this.ffFinalDice || [];
                const cellsFrom = (arr) => arr.map(d => ({
                    parts: Array.isArray(d.parts) && d.parts.length
                        ? d.parts : [d.value],
                }));
                return {
                    title: 'Freeform Roll',
                    formula: this.ffFormulaText || '',
                    kept: cellsFrom(all.filter(d => d.kept)),
                    dropped: cellsFrom(all.filter(d => !d.kept)),
                    bonuses: [],
                    total: this.ffTotal || 0,
                };
            },

            _prerenderRollImage() {
                const t = window._trackingBridge;
                if (!t || !t._charId) return;
                const reqId = ++this._rollImageReqId;
                this.rollImageBlob = null;
                this.rollImageStatus = 'rendering';
                fetch('/characters/' + t._charId + '/roll-image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this._buildFreeformImagePayload()),
                }).then(resp => {
                    if (reqId !== this._rollImageReqId) return null;
                    if (!resp.ok) throw new Error('render failed');
                    return resp.blob();
                }).then(blob => {
                    if (blob === null) return;
                    if (reqId !== this._rollImageReqId) return;
                    this.rollImageBlob = blob;
                    this.rollImageStatus = 'ready';
                }).catch(() => {
                    if (reqId !== this._rollImageReqId) return;
                    this.rollImageStatus = 'failed';
                });
            },

            async copyRollImage() {
                if (!this.rollImageBlob) {
                    this.rollImageStatus = 'failed';
                    return;
                }
                try {
                    await navigator.clipboard.write([
                        new ClipboardItem({'image/png': this.rollImageBlob}),
                    ]);
                    this.rollImageStatus = 'copied';
                    setTimeout(() => {
                        if (this.rollImageStatus === 'copied') {
                            this.rollImageStatus = 'ready';
                        }
                    }, 1800);
                } catch (e) {
                    this.rollImageStatus = 'failed';
                }
            },

            reset() {
                this.ffPhase = 'pre';
                this.ffFinalDice = [];
                this.ffTotal = 0;
                this.ffFormulaText = '';
            },

            clampKept() {
                if (this.ffKept > this.ffRolled) this.ffKept = this.ffRolled;
            },

            async doRoll() {
                this.clampKept();
                const rolled = this.ffRolled;
                const kept = this.ffKept;
                const rerollTens = !!this.ffRerollTens;
                this.ffFormulaText = `${rolled}k${kept}` + (rerollTens ? '' : ' (no reroll)');
                this.ffFinalDice = [];
                this.ffTotal = 0;
                this.ffPhase = 'rolling';
                const playSound = this.ffPrefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    rolled, rerollTens, this.ffPrefs.dice_animation_enabled,
                    playSound, 'dice-animation-ff'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(kept, sorted.length);
                this.ffFinalDice = sorted.map((d, i) => ({
                    value: d.value,
                    kept: i >= sorted.length - keptCount,
                }));
                const keptDice = sorted.slice(sorted.length - keptCount);
                this.ffTotal = keptDice.reduce((s, d) => s + d.value, 0);
                this.ffPhase = 'done';
                this._prerenderRollImage();
                this._saveFreeformRollHistory();
            },
        };
    }

    function diceRoller() {
        return {
            open: false,
            phase: 'idle',
            title: '',
            formula: null,
            formulaText: '',
            finalDice: [],
            unkeptDice: [],
            keptDice: [],
            baseTotal: 0,
            keptSum: 0,
            actionDice: [],
            subDamageDice: [],
            subDamageTotal: 0,
            subDamageLabel: '',
            formulas: {},
            prefs: { dice_animation_enabled: true, dice_sound_enabled: true },
            // 3rd Dan free raises
            advRaisesConfig: { available: 0, used: 0 },
            convictionConfig: { rank: 0, max_per_roll: 0, daily_max: 0 },
            convictionSpentThisRoll: 0,
            togashiRaisesSpentThisRoll: 0,
            priestAllies: [],  // [{priest_id, name, rank, max_per_roll, pool_max, used}]
            partyPriests: [],  // [{priest_id, name}] — any priest in the gaming group
            priestAllySpentThisRoll: {},  // {priest_id: N spent on the current roll}
            // Priest 3rd Dan precepts pool exposed by party-member priests.
            // Shape: [{priest_id, name, pool: [{value}, ...]}]. Self is never
            // included - the priest's own sheet uses preceptsPool directly.
            priestPreceptsAllies: [],
            // Swap menu state, keyed by "<priest_id>:<poolDieIndex>" to
            // stay unique across simultaneously-available ally pools.
            preceptsPoolMenuOpen: null,
            // Structured swap events for the current roll. Rendered as an
            // auxiliary bonus-source list under each result panel.
            preceptsPoolSwapBonuses: [],
            raisesSpentThisRoll: 0,
            // Courtier 5th Dan optional TN/contested bonus
            courtier5thApplied: false,
            // Lucky reroll
            luckyUsedThisRoll: false,
            togashiRerollUsed: false,
            togashiOrigTotal: 0,
            luckyPrevTotal: 0,
            luckyPrevBaseTotal: 0,
            luckyPrevActionDice: [],
            luckyOriginalWasHigher: false,
            // When a Lucky reroll happens we capture BOTH halves (original
            // and rerolled dice + totals) into this structure so the Roll
            // History page can show the pair with a Lucky badge. ``kept``
            // is 'reroll' when the reroll wins (or for initiative, which
            // always shows the fresh roll as the live result) and
            // 'original' when the auto-use-higher rule restores the
            // original. Null when no Lucky has fired on the current roll.
            luckyRollPair: null,
            perRoundResetMessages: [],
            // Shinjo Bushi phase bonus on the parry result modal. The spent
            // die's value is snapshot at roll time (before the attack-die
            // spend mutates its displayed value); the player then picks the
            // phase post-roll and the bonus is applied live to baseTotal.
            shinjoParryPhase: null,
            shinjoParryDieValue: null,
            shinjoParryBonusApplied: 0,

            // Pools that were already full are skipped so the initiative
            // modal doesn't show a "refreshed" message when nothing changed.
            // For non-editors this is a no-op: their pools don't deplete in
            // the first place (the spend handlers are gated on canEdit), so
            // there's nothing to refresh and no informational message to
            // surface in the initiative modal.
            _resetPerRoundAbilities() {
                const messages = [];
                const t = window._trackingBridge;
                if (!t || !t.canEdit) return messages;
                if (this.schoolAbilities.mirumoto_round_points) {
                    const max = t.mirumotoRoundPointsMax || 0;
                    if ((t.mirumotoRoundPoints || 0) < max) {
                        t.mirumotoRoundPoints = max;
                        messages.push('Mirumoto 3rd Dan points refreshed for the new combat round');
                    }
                }
                if (this.schoolAbilities.priest_round_conviction_refresh) {
                    if ((t.getCount ? t.getCount('conviction') : 0) > 0) {
                        t.setCount('conviction', 0);
                        messages.push('Conviction pool refreshed for the new combat round');
                    }
                }
                return messages;
            },

            canUseLucky() {
                const t = window._trackingBridge;
                if (!t || this.luckyUsedThisRoll) return false;
                // Check if Lucky ability exists and is unused
                const hasLucky = (t.perAdventure || []).some(a => a.id === 'lucky_used');
                if (!hasLucky) return false;
                return !t.getToggle('lucky_used');
            },

            _genericDiscretionaryTotal() {
                return (this.raisesSpentThisRoll || 0) * 5
                    + (this.mirumotoPointsSpentThisRoll || 0) * 2
                    + (this.courtier5thApplied ? (this.formula?.courtier_5th_dan_optional || 0) : 0);
            },
            _atkDiscretionaryTotal() {
                return (this.atkRaisesSpent || 0) * 5
                    + (this.mirumotoPointsSpentThisRoll || 0) * 2
                    + (this.akodoSpentThisRoll || 0)
                    + (this.bayushiRaisesSpentThisRoll || 0) * 5;
            },
            _wcDiscretionaryTotal() {
                return (this.wcRaisesSpent || 0) * 5
                    + (this.mirumotoPointsSpentThisRoll || 0) * 2
                    + (this.wcMatsuBonusApplied || 0)
                    + (this.wcPostRollVpSpent || 0) * 5
                    + (this.wcExcessSpentThisRoll || 0);
            },

            // Snapshot the dice-display state immediately before a Lucky
            // reroll fires. Two purposes:
            //   1. If the reroll comes out lower (non-initiative), we
            //      restore this state so the live modal and every followup
            //      step (attack -> damage, wound check -> serious wounds)
            //      reads the higher original value - the "auto-use-higher"
            //      rule. There is never a reason to keep a strictly-lower
            //      roll, so the player isn't asked.
            //   2. Either way, the cell-shaped copies (``keptCells`` /
            //      ``droppedCells``) get recorded into ``luckyRollPair``
            //      so the Roll History page can display both halves of the
            //      pair side by side.
            // ``actionDice`` is only meaningful for initiative; for other
            // flows it's just whatever leftover values are sitting in the
            // shared state and the renderer ignores it because the pair's
            // initiative flag is false.
            _luckyDiceSnapshot() {
                return {
                    finalDice: (this.finalDice || []).map(d => ({...d})),
                    keptDice: (this.keptDice || []).map(d => ({...d})),
                    unkeptDice: (this.unkeptDice || []).map(d => ({...d})),
                    keptSum: this.keptSum,
                    keptCells: this._cellsFromDice(this.keptDice),
                    droppedCells: this._cellsFromDice(this.unkeptDice),
                    actionDice: (this.actionDice || []).map(d => ({value: d.value})),
                };
            },

            _restoreLuckyDice(snap) {
                this.finalDice = snap.finalDice;
                this.keptDice = snap.keptDice;
                this.unkeptDice = snap.unkeptDice;
                this.keptSum = snap.keptSum;
            },

            // Decide the Lucky reroll outcome, restore the original dice
            // display when it wins (non-initiative only), and record the
            // pair for the Roll History display. Call this AFTER the
            // reroll has populated ``this.keptDice`` / ``this.unkeptDice``
            // / ``this.keptSum`` with the rerolled values - we build the
            // ``reroll`` half of the pair from current state before any
            // restore happens. Returns ``{total, keepReroll}``; callers
            // assign ``total`` back into their flow-specific total var
            // (``atkRollTotal`` / ``wcRollTotal`` / ``atkDamageTotal`` /
            // ``duelXRoll``) and use ``keepReroll`` to undo any
            // companion state that lives outside the dice snapshot
            // (e.g. damage's ``atkDamageShosuroBonus``).
            _resolveLucky(origSnap, origTotal, newTotal, isInit) {
                const res = window.L7RRollMath.luckyResolveReroll(
                    origTotal, newTotal, isInit,
                );
                const rerollHalf = {
                    kept: this._cellsFromDice(this.keptDice),
                    dropped: this._cellsFromDice(this.unkeptDice),
                    total: newTotal,
                    show_total: !isInit,
                };
                if (isInit) {
                    rerollHalf.action_dice = (this.actionDice || [])
                        .map(d => ({value: d.value}));
                }
                if (!res.keepReroll) {
                    this._restoreLuckyDice(origSnap);
                }
                this.luckyOriginalWasHigher = res.originalHigher;
                const origHalf = {
                    kept: origSnap.keptCells,
                    dropped: origSnap.droppedCells,
                    total: origTotal,
                    show_total: !isInit,
                };
                if (isInit) {
                    origHalf.action_dice = origSnap.actionDice;
                }
                this.luckyRollPair = {
                    kept: res.keepReroll ? 'reroll' : 'original',
                    original: origHalf,
                    reroll: rerollHalf,
                };
                return {
                    total: res.keepReroll ? newTotal : origTotal,
                    keepReroll: res.keepReroll,
                };
            },

            // Generic Lucky reroll (skill / knack / ring / initiative /
            // bless). Snapshot the dice BEFORE runRoll wipes them so the
            // auto-use-higher rule can restore the original if the reroll
            // comes out lower. ``runRoll`` is told to skip its own image
            // render + history create - we patch the existing history row
            // and re-prerender after the resolve so the effective (possibly
            // restored) state is what gets stored / pasted-as-image.
            useLucky() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const isInit = this.formula?.is_initiative;
                const disc = this._genericDiscretionaryTotal();
                const origTotal = this.baseTotal;
                const origSnap = this._luckyDiceSnapshot();
                // Preserved so the existing initiative "choose which set"
                // panel in modal_result.html keeps working.
                this.luckyPrevBaseTotal = origTotal - disc;
                this.luckyPrevTotal = origTotal;
                this.luckyPrevActionDice = [...this.actionDice];
                this.runRoll({skipHistoryCreate: true, skipImageRender: true}).then(() => {
                    // runRoll resets baseTotal to dice-only; re-add the
                    // carried-over discretionary bonuses (they survive
                    // every reroll wave).
                    this.baseTotal += disc;
                    const newTotal = this.baseTotal;
                    const r = this._resolveLucky(origSnap, origTotal, newTotal, isInit);
                    this.baseTotal = r.total;
                    this._prerenderRollImage(isInit
                        ? this._buildInitiativeImagePayload()
                        : this._buildRollImagePayload());
                    this._patchRollHistoryNow();
                });
            },

            async _rerollDice(rolled, rerollTens, trayId) {
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                return window.L7RDice.rollAndAnimate(
                    rolled, rerollTens, this.prefs.dice_animation_enabled, playSound, trayId
                );
            },

            async useLuckyWoundCheck() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const disc = this._wcDiscretionaryTotal();
                const origTotal = this.wcRollTotal;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevBaseTotal = origTotal - disc;
                this.luckyPrevTotal = origTotal;
                // Do NOT reset discretionary state - bonuses carry over.
                this.wcPhase = 'rolling';
                const f = this.formula;
                const dice = await this._rerollDice(f.rolled, f.reroll_tens, 'dice-animation-wc');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                const keptDice = sorted.slice(sorted.length - keptCount);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = keptDice;
                this.unkeptDice = sorted.slice(0, sorted.length - keptCount);
                this.keptSum = keptDice.reduce((s, d) => s + d.value, 0);
                const newTotal = this.keptSum + f.flat + disc;
                // Resolve auto-use-higher: if the original beats the reroll
                // the snapshot is restored and the wound-check math below
                // computes off the higher (original) total.
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                this.baseTotal = r.total;
                this.wcRollTotal = r.total;
                const wc = window.L7RRollMath.woundCheckResult(
                    this.wcRollTotal, this.wcLightWounds,
                    this.formulas['wound_check']?.bayushi_5th_dan_half_lw,
                );
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
                this.wcResultApplied = false;
                this.wcPhase = 'result';
                this._prerenderRollImage(this._buildWoundCheckImagePayload());
                this._patchRollHistoryNow();
            },

            async useLuckyAttack() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const disc = this._atkDiscretionaryTotal();
                const origTotal = this.atkRollTotal;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevBaseTotal = origTotal - disc;
                this.luckyPrevTotal = origTotal;
                // Do NOT reset discretionary state - bonuses carry over.
                this.atkPhase = 'rolling';
                const f = this.formula;
                const dice = await this._rerollDice(f.rolled, f.reroll_tens, 'dice-animation-atk');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.unkeptDice = sorted.filter((_, i) => i < sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                const newTotal = this.keptSum + f.flat + disc;
                // Auto-use-higher: if reroll loses, restore original and
                // ``_atkUpdateHitState`` below will compute hit/extra-dice
                // off the higher original total. This is the fix for the
                // followup-on-lower-reroll bug.
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                this.baseTotal = r.total;
                this.atkRollTotal = r.total;
                this.atkFailedParry = false;
                this._atkUpdateHitState();
                this.atkPhase = 'result';
                // Refresh annotation + image off the effective state.
                this._annotateSpentActionDie(this._describeAttackForDie(false));
                this._prerenderRollImage(this._buildAttackImagePayload());
                this._patchRollHistoryNow();
            },

            async useLuckyDamage() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const origTotal = this.atkDamageTotal;
                const origShosuro = this.atkDamageShosuroBonus;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevTotal = origTotal;
                this.mirumotoPointsSpentThisRoll = 0;
                this.atkPhase = 'damage-rolling';
                const f = this.formula;
                const dice = await this._rerollDice(f.rolled, true, 'dice-animation-atk');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                // Shosuro 5th Dan: recompute lowest-3 bonus on rerolled damage.
                this.atkDamageShosuroBonus = 0;
                if (this.atkFormula?.shosuro_5th_dan) {
                    const allValues = sorted.map(d => d.value);
                    const lowest3 = allValues.slice(0, Math.min(3, allValues.length));
                    this.atkDamageShosuroBonus = lowest3.reduce((s, v) => s + v, 0);
                }
                const newTotal = this.keptSum + (f.flat || 0) + this.atkDamageShosuroBonus + this.convictionSpentThisRoll + this.totalPriestAllySpentThisRoll();
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                // Companion state not covered by the dice snapshot: when
                // the original wins, also restore the Shosuro bonus so the
                // breakdown bullets match the kept dice.
                if (!r.keepReroll) {
                    this.atkDamageShosuroBonus = origShosuro;
                }
                this.atkDamageTotal = r.total;
                this.atkPhase = 'damage-result';
                this._annotateSpentActionDie(this._describeAttackForDie(true));
                this._prerenderRollImage(this._buildAttackDamageImagePayload());
                this._patchRollHistoryNow();
            },

            async useLuckyDuelContested() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const origTotal = this.duelContestedRoll;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevTotal = origTotal;
                this.duelPhase = 'contested-rolling';
                const f = this.formula;
                const dice = await this._rerollDice(f.rolled, f.reroll_tens, 'dice-animation-duel');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.unkeptDice = sorted.filter((_, i) => i < sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                const newTotal = this.keptSum + f.flat;
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                this.baseTotal = r.total;
                this.duelContestedRoll = r.total;
                this.duelPhase = 'contested-result';
                this._prerenderRollImage(this._buildDuelContestedImagePayload());
                this._patchRollHistoryNow();
            },

            async useLuckyDuelStrike() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const origTotal = this.duelStrikeRoll;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevTotal = origTotal;
                this.duelPhase = 'strike-rolling';
                const f = this.formula;
                const dice = await this._rerollDice(f.rolled, false, 'dice-animation-duel');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.unkeptDice = sorted.filter((_, i) => i < sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                const newTotal = this.keptSum + f.flat;
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                this.baseTotal = r.total;
                this.duelStrikeRoll = r.total;
                // Hit / excess feed the damage step, so they MUST be
                // computed off the effective (higher) strike total.
                const excess = this.duelStrikeRoll - this.duelOpponentTN;
                this.duelStrikeHit = excess >= 0;
                this.duelStrikeExcess = excess;
                this.duelPhase = 'strike-result';
                this._prerenderRollImage(this._buildDuelStrikeImagePayload());
                this._patchRollHistoryNow();
            },

            async useLuckyDuelDamage() {
                if (!this.canUseLucky()) return;
                const t = window._trackingBridge;
                t.setToggle('lucky_used', true);
                this.luckyUsedThisRoll = true;
                const origTotal = this.duelDamageTotal;
                const origSnap = this._luckyDiceSnapshot();
                this.luckyPrevTotal = origTotal;
                this.duelPhase = 'damage-rolling';
                const dmg = this.duelComputeDamage();
                const dice = await this._rerollDice(dmg.rolled, true, 'dice-animation-duel');
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(dmg.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.unkeptDice = sorted.filter((_, i) => i < sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                const newTotal = this.keptSum + dmg.flat;
                const r = this._resolveLucky(origSnap, origTotal, newTotal, false);
                this.duelDamageTotal = r.total;
                this.duelPhase = 'damage-result';
                this._prerenderRollImage(this._buildDuelDamageImagePayload());
                this._patchRollHistoryNow();

                        && this.formulas['athletics:Fire']
                        && this.formulas['athletics:Water']
                        && this.formulas['athletics:Earth']) {
                    const pos = this._computeRollMenuPos(el);
                    this.rollMenuKey = key;
                    this.rollMenuTitle = 'Athletics';
                    this.rollMenuPos = pos;
                    this.rollMenuOptions = this.schoolAbilities.merchant_post_roll_vp
                        ? [] : this.computeVoidOptions();
                    this.rollMenuHasStrike = false;
                    this.rollMenuHasParry = false;
                    this.rollMenuHasTogashiInit = false;
                    this.rollMenuHasAthleticsPicker = true;
                    this.rollMenuHasRingPicker = false;
                    this.rollMenuHasAttackChoice = false;
                    this.rollMenuOwCapacity = 0;
                    this.owHoverRow = null;
                    this.athHoverRow = null;
                    this.parryHoverRow = null;
                    this.rollMenuOpen = true;
                    return;
                }

                // Ring tile click: bare-ring roll plus (when the
                // character has athletics rank >= 1) an athletics-ring
                // option. Each row carries its own VP-spending
                // submenu. The ring tile triggers this path via
                // ``data-roll-key="ring:<RingName>"``; characters
                // without athletics only ever see the bare row.
                if (key.startsWith('ring:') && this.formulas[key]) {
                    const ring = key.slice('ring:'.length);
                    const pos = this._computeRollMenuPos(el);
                    this.rollMenuKey = key;
                    this.rollMenuTitle = ring;
                    this.rollMenuPos = pos;
                    this.rollMenuOptions = this.schoolAbilities.merchant_post_roll_vp
                        ? [] : this.computeVoidOptions();
                    this.rollMenuHasStrike = false;
                    this.rollMenuHasParry = false;
                    this.rollMenuHasTogashiInit = false;
                    this.rollMenuHasAthleticsPicker = false;
                    this.rollMenuHasRingPicker = true;
                    this.ringPickerRing = ring;
                    this.ringPickerHover = null;
                    this.rollMenuHasAttackChoice = false;
                    this.rollMenuOwCapacity = 0;
                    this.owHoverRow = null;
                    this.athHoverRow = null;
                    this.parryHoverRow = null;
                    this.rollMenuOpen = true;
                    return;
                }

                // Pontificate: keep the with/without-void options, but give
                // each a hover submenu of eligible basic skills. Rolling a
                // submenu skill rolls "Pontificate (as <skill>)" which
                // inherits that skill's bonuses; rolling the main option
                // rolls plain Pontificate with no skill bonuses. Always show
                // the menu (even at 0 VP) so the skill submenus are reachable.
                if (key === 'knack:pontificate') {
                    const pos = this._computeRollMenuPos(el);
                    this.rollMenuKey = key;
                    this.rollMenuTitle = f.label;
                    this.rollMenuPos = pos;
                    this.rollMenuOptions = this.schoolAbilities.merchant_post_roll_vp
                        ? [] : this.computeVoidOptions();
                    this.rollMenuHasStrike = false;
                    this.rollMenuHasParry = false;
                    this.rollMenuHasTogashiInit = false;
                    this.rollMenuHasAthleticsPicker = false;
                    this.rollMenuHasRingPicker = false;
                    this.rollMenuHasAttackChoice = false;
                    this.rollMenuHasPontificate = true;
                    this.rollMenuOwCapacity = 0;
                    this.owHoverRow = null;
                    this.athHoverRow = null;
                    this.parryHoverRow = null;
                    this.pontHoverRow = null;
                    this.rollMenuOpen = true;
                    return;
                }

                // Togashi Ise Zumi: initiative has a dropdown with two variants
                // (normal + 1 athletics die, OR all-athletics with +3 dice).
                if (f.is_initiative && f.togashi_ise_zumi
                        && this.formulas['initiative:athletics']) {
                    const pos = this._computeRollMenuPos(el);
                    this.rollMenuKey = key;
                    this.rollMenuTitle = f.label;
                    this.rollMenuPos = pos;
                    this.rollMenuOptions = [];
                    this.rollMenuHasStrike = false;
                    this.rollMenuHasParry = false;
                    this.rollMenuHasTogashiInit = true;
                    this.rollMenuHasAthleticsPicker = false;
                    this.rollMenuHasRingPicker = false;
                    this.rollMenuHasAttackChoice = false;
                    this.rollMenuOwCapacity = 0;
                    this.owHoverRow = null;
                    this.athHoverRow = null;
                    this.parryHoverRow = null;
                    this.rollMenuOpen = true;
                    return;
                }

                // Initiative rolls directly (no void spending) - per design,
                // these tiles have no rules-text tooltip and stay click-to-
                // roll on every device.
                if (f.is_initiative) {
                    this.executeRoll(key, 0, null);
                    return;
                }

                // Attack (regular) with athletics available: show a choice menu
                // so the player can pick regular vs athletics attack. Only the
                // Togashi Ise Zumi school treats athletics as a standard attack
                // variant this way; other schools access Athletics attack via
                // the Athletics skill directly (or via an athletics-only die).
                if (key === 'attack'
                        && this.formulas['athletics:attack']
                        && this.schoolAbilities.athletics_combat_everywhere) {
                    const pos = this._computeRollMenuPos(el);
                    this.rollMenuKey = key;
                    this.rollMenuTitle = f.label;
                    this.rollMenuPos = pos;
                    this.rollMenuOptions = [];
                    this.rollMenuHasStrike = false;
                    this.rollMenuHasParry = false;
                    this.rollMenuHasTogashiInit = false;
                    this.rollMenuHasAthleticsPicker = false;
                    this.rollMenuHasRingPicker = false;
                    this.rollMenuHasAttackChoice = true;
                    this.rollMenuOwCapacity = 0;
                    this.owHoverRow = null;
                    this.athHoverRow = null;
                    this.parryHoverRow = null;
                    this.rollMenuOpen = true;
                    return;
                }

                // Attack types: desktop opens the attack modal directly. On a
                // touch device we instead show a small menu so the player can
                // read the rules text without committing to the modal.
                if (f.is_attack_type) {
                    if (isTouch && rulesHtml) {
                        const pos = this._computeRollMenuPos(el);
                        this.rollMenuKey = key;
                        this.rollMenuTitle = f.label;
                        this.rollMenuPos = pos;
                        this.rollMenuOptions = [];
                        this.rollMenuHasStrike = false;
                        this.rollMenuHasParry = false;
                        this.rollMenuHasTogashiInit = false;
                        this.rollMenuHasAthleticsPicker = false;
                        this.rollMenuHasRingPicker = false;
                        this.rollMenuHasAttackChoice = false;
                        this.rollMenuHasMobileAttack = true;
                        this.rollMenuOwCapacity = 0;
                        this.owHoverRow = null;
                        this.athHoverRow = null;
                        this.parryHoverRow = null;
                        this.rollMenuOpen = true;
                        return;
                    }
                    this.openAttackModal(key);
                    return;
                }

                // Compute void options (merchants spend VP only after seeing the roll,
                // so pre-roll VP options are hidden - no reason to commit in advance).
                // Damage rolls (e.g. Dragon Tattoo) don't accept void spending.
                const options = (this.schoolAbilities.merchant_post_roll_vp || f.is_damage_roll)
                    ? [] : this.computeVoidOptions();
                // Check for special roll variants
                const hasStrike = key === 'knack:iaijutsu' && !!this.formulas['knack:iaijutsu:strike'];
                const hasParry = key === 'parry';
                // Athletics ring clicks always show a menu so the player can
                // pick a different ring or spend void without re-clicking.
                const isAthleticsRing = key.startsWith('athletics:');
                // Otherworldliness submenu also keeps the menu open
                const owCap = f.otherworldliness_capacity || 0;
                const owMax = Math.min(owCap, this.getOwPoolAvail());

                // If no options, no special variants, and no OW available, roll directly.
                // Exception: on touch with rules text we still open the menu so the
                // player can tap "View rules text" from the bottom row.
                if (options.length === 0 && !hasStrike && !hasParry && !isAthleticsRing && owMax === 0 && !rulesHtml) {
                    this.executeRoll(key, 0, null);
                    return;
                }

                // Position the menu near the clicked element
                const pos = this._computeRollMenuPos(el);

                this.rollMenuKey = key;
                this.rollMenuTitle = f.label;
                this.rollMenuPos = pos;
                this.rollMenuOptions = options;
                this.rollMenuHasStrike = hasStrike;
                this.rollMenuHasParry = hasParry;
                this.rollMenuHasTogashiInit = false;
                this.rollMenuHasAthleticsPicker = false;
                this.rollMenuHasRingPicker = false;
                this.rollMenuHasAttackChoice = false;
                this.rollMenuOwCapacity = f.otherworldliness_capacity || 0;
                this.owHoverRow = null;
                this.athHoverRow = null;
                this.parryHoverRow = null;
                this.rollMenuOpen = true;
            },

            _isTouchDevice() {
                // True when the device has no hover capability (touch-only).
                // Mirrors the same check that gates the tap-to-toggle handler
                // for non-roll tooltips in base.html.
                return window.matchMedia && window.matchMedia('(hover: none)').matches;
            },

            _readRulesText(el) {
                // Pull the inline tooltip content (rules text) from the
                // clicked roll element so the menu's "View rules text" row
                // can show it in a modal. Returns '' if the element isn't a
                // tooltip-trigger or has no .tooltip-content child.
                if (!el || !el.classList || !el.classList.contains('tooltip-trigger')) return '';
                const tt = el.querySelector(':scope > .tooltip-content');
                return tt ? tt.innerHTML : '';
            },

            openRulesModal(html) {
                this.rulesModalContent = html || '';
                this.rulesModalOpen = true;
            },

            _computeRollMenuPos(el) {
                // Position the roll-menu flyout near the clicked element,
                // but clamp into the viewport so the menu doesn't open off-screen.
                const rect = el.getBoundingClientRect();
                const menuWidth = 280;
                const menuHeight = 280;  // estimate used only to decide whether to flip above
                let left = rect.left;
                if (left + menuWidth > window.innerWidth) left = window.innerWidth - menuWidth - 8;
                if (left < 8) left = 8;
                let top = rect.bottom + 4;
                let flipped = false;
                if (top + menuHeight > window.innerHeight) {
                    // Not enough room below: flip above. Anchor at the element's
                    // top edge and let a translateY(-100%) transform in the
                    // template pull the menu's bottom up to that anchor, so the
                    // actual rendered menu height doesn't leave a gap.
                    top = rect.top - 4;
                    flipped = true;
                }
                return { top, left, flipped };
            },

            getOwPoolAvail() {
                const t = window._trackingBridge;
                if (!t) return 0;
                const entry = (t.perAdventure || []).find(a => a.id === 'otherworldliness');
                if (!entry) return 0;
                return Math.max(0, (entry.max || 0) - (t.getCount('otherworldliness') || 0));
            },
            getOwMax() {
                return Math.min(this.rollMenuOwCapacity || 0, this.getOwPoolAvail());
            },
            owRange(n) {
                const arr = [];
                for (let i = 1; i <= n; i++) arr.push(i);
                return arr;
            },
            owBaseSkillRank() {
                // Derived from capacity: capacity = 5 - rank, so rank = 5 - capacity.
                return 5 - (this.rollMenuOwCapacity || 0);
            },

            merchantVpStillAvailable() {
                const t = window._trackingBridge;
                if (!t) return false;
                const wMax = this.voidSpendConfig.worldliness_max || 0;
                const wAvail = wMax > 0 ? Math.max(0, wMax - (t.getCount('worldliness') || 0)) : 0;
                const poolAvail = (t.tempVoidPoints || 0) + (t.voidPoints || 0) + wAvail;
                const spentThisRoll = this.formula?.merchant_vp_spent || 0;
                const capRemaining = (this.voidSpendConfig.cap || 0) - spentThisRoll;
                return poolAvail > 0 && capRemaining > 0;
            },

            merchant5thStart() {
                if (!this.schoolAbilities.merchant_5th_dan_reroll) return;
                if (this.formula?.merchant_5th_dan_used) return;
                this.merchant5thSelections = [];
                this.merchant5thPhase = 'selecting';
            },

            merchant5thToggle(i) {
                const idx = this.merchant5thSelections.indexOf(i);
                if (idx >= 0) this.merchant5thSelections.splice(idx, 1);
                else this.merchant5thSelections.push(i);
            },

            merchant5thSelectedSum() {
                let s = 0;
                for (const i of this.merchant5thSelections) {
                    s += (this.finalDice[i]?.value || 0);
                }
                return s;
            },

            merchant5thMinRequired() {
                return Math.max(0, 5 * (this.merchant5thSelections.length - 1));
            },

            merchant5thCanConfirm() {
                return this.merchant5thSelections.length > 0
                    && this.merchant5thSelectedSum() >= this.merchant5thMinRequired();
            },

            async merchant5thConfirm() {
                if (!this.merchant5thCanConfirm()) return;
                const selected = [...this.merchant5thSelections].sort((a, b) => a - b);
                const oldKeptSum = this.keptSum;
                // Reconstitute the pool with parts preserved (finalDice drops the
                // exploded-parts array; kept/unkept retain it).
                const allWithParts = [...this.keptDice, ...this.unkeptDice];
                const partsByValue = new Map();
                for (const d of allWithParts) {
                    if (!partsByValue.has(d.value)) partsByValue.set(d.value, []);
                    partsByValue.get(d.value).push(d.parts);
                }
                const pool = this.finalDice.map(d => {
                    const arr = partsByValue.get(d.value);
                    const parts = (arr && arr.length > 0) ? arr.shift() : [d.value];
                    return { value: d.value, parts };
                });
                this.merchant5thPhase = 'rerolling';
                this.phase = 'rolling';
                const newDice = await this._rerollDice(
                    selected.length, this.formula.reroll_tens, 'dice-animation'
                );
                selected.forEach((idx, j) => {
                    pool[idx] = { value: newDice[j].value, parts: newDice[j].parts };
                });
                // Re-sort and re-select kept
                const sortedAsc = pool.slice().sort((a, b) => a.value - b.value);
                const keptCount = Math.min(this.formula.kept, sortedAsc.length);
                const isInit = this.formula.is_initiative;
                const keptSet = new Set();
                if (isInit) {
                    for (let i = 0; i < keptCount; i++) keptSet.add(i);
                } else {
                    for (let i = sortedAsc.length - keptCount; i < sortedAsc.length; i++) keptSet.add(i);
                }
                this.finalDice = sortedAsc.map((d, i) => ({ value: d.value, kept: keptSet.has(i) }));
                this.keptDice = sortedAsc.filter((_, i) => keptSet.has(i));
                this.unkeptDice = sortedAsc.filter((_, i) => !keptSet.has(i));
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                const delta = this.keptSum - oldKeptSum;
                this.baseTotal += delta;
                this.formula.merchant_5th_dan_bonus = delta;
                this.formula.merchant_5th_dan_used = true;
                this.merchant5thPhase = 'idle';
                this.merchant5thSelections = [];
                this.phase = 'done';
            },

            merchant5thCancel() {
                this.merchant5thPhase = 'idle';
                this.merchant5thSelections = [];
            },

            async merchantSpendOneVp() {
                const t = window._trackingBridge;
                if (!t || !this.merchantVpStillAvailable()) return;
                // Pick source in priority order: temp > regular > worldliness
                let opt;
                if ((t.tempVoidPoints || 0) > 0) {
                    opt = { count: 1, fromTemp: 1, fromRegular: 0, fromWorldliness: 0 };
                } else if ((t.voidPoints || 0) > 0) {
                    opt = { count: 1, fromTemp: 0, fromRegular: 1, fromWorldliness: 0 };
                } else {
                    opt = { count: 1, fromTemp: 0, fromRegular: 0, fromWorldliness: 1 };
                }
                // Snapshot discretionary bonuses already applied to baseTotal so we can re-add.
                const disc = this._genericDiscretionaryTotal();
                // Physical dice currently in the pool
                const oldPhysical = this.finalDice.length;
                // Update formula dimensions + apply 10k10 caps
                this.formula.rolled += 1;
                this.formula.kept += 1;
                const _cap = window.L7RRollMath.applyDiceCap(this.formula.rolled, this.formula.kept, this.formula.flat);
                this.formula.rolled = _cap.rolled; this.formula.kept = _cap.kept; this.formula.flat = _cap.flat;
                this.formula.void_spent = (this.formula.void_spent || 0) + 1;
                this.formula.merchant_vp_spent = (this.formula.merchant_vp_spent || 0) + 1;
                this.deductVoidPoints(opt);
                // Roll the new physical die(s) - 0 (cap hit) or 1 - and merge into pool.
                // Use keptDice/unkeptDice as the source since they retain the exploded
                // .parts breakdown that the template renders; finalDice drops that field.
                const newCount = Math.max(0, this.formula.rolled - oldPhysical);
                const existing = [...(this.keptDice || []), ...(this.unkeptDice || [])];
                let pool = existing.map(d => ({ parts: d.parts, value: d.value }));
                if (newCount > 0) {
                    this.phase = 'rolling';
                    const newDice = await this._rerollDice(
                        newCount, this.formula.reroll_tens, 'dice-animation'
                    );
                    pool = pool.concat(newDice.map(d => ({ parts: d.parts, value: d.value })));
                }
                // Re-sort and re-select kept (top N for normal, bottom N for initiative)
                const sortedAsc = pool.slice().sort((a, b) => a.value - b.value);
                const keptCount = Math.min(this.formula.kept, sortedAsc.length);
                const isInit = this.formula.is_initiative;
                const keptSet = new Set();
                if (isInit) {
                    for (let i = 0; i < keptCount; i++) keptSet.add(i);
                } else {
                    for (let i = sortedAsc.length - keptCount; i < sortedAsc.length; i++) keptSet.add(i);
                }
                this.finalDice = sortedAsc.map((d, i) => ({ value: d.value, kept: keptSet.has(i) }));
                this.keptDice = sortedAsc.filter((_, i) => keptSet.has(i));
                this.unkeptDice = sortedAsc.filter((_, i) => !keptSet.has(i));
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum + this.formula.flat + disc;
                this.phase = 'done';
            },

            computeVoidOptions() {
                const t = window._trackingBridge;
                if (!t) return [];
                const tempVoid = t.tempVoidPoints || 0;
                const regularVoid = t.voidPoints || 0;
                const wMax = this.voidSpendConfig.worldliness_max || 0;
                const wUsed = wMax > 0 ? (t.getCount('worldliness') || 0) : 0;
                const wAvail = Math.max(0, wMax - wUsed);
                const totalAvail = tempVoid + regularVoid + wAvail;
                const cap = this.voidSpendConfig.cap || 0;
                const maxSpend = Math.min(totalAvail, cap);
                if (maxSpend <= 0) return [];

                const options = [];
                for (let n = 1; n <= maxSpend; n++) {
                    const fromTemp = Math.min(n, tempVoid);
                    let rem = n - fromTemp;
                    const fromRegular = Math.min(rem, regularVoid);
                    rem -= fromRegular;
                    const fromWorldliness = rem;

                    // Build label
                    let label = `Spend ${n} void point${n > 1 ? 's' : ''}`;
                    const sources = [];
                    if (fromTemp > 0) sources.push(`${fromTemp} temporary`);
                    if (fromRegular > 0) sources.push(`${fromRegular} regular`);
                    if (fromWorldliness > 0) sources.push(`${fromWorldliness} worldliness`);
                    // Only show breakdown if multiple source types
                    if (sources.length > 1 || (sources.length === 1 && fromTemp > 0 && (regularVoid > 0 || wAvail > 0))) {
                        label += ` (${sources.join(', ')})`;
                    } else if (sources.length === 1 && fromWorldliness > 0) {
                        label += ' (worldliness)';
                    } else if (sources.length === 1 && fromTemp > 0 && regularVoid === 0 && wAvail === 0) {
                        label += ' (temporary)';
                    }

                    options.push({ count: n, fromTemp, fromRegular, fromWorldliness, label });
                }
                return options;
            },

            _keyAutoSpendsAction(key) {
                // Parry and feint go through executeRoll; all attack-type rolls
                // (attack/double_attack/counterattack/lunge and athletics:attack)
                // are handled in rollAttack. Returns true when a non-attack
                // roll should auto-spend the lowest unspent action die.
                if (!key) return false;
                if (key === 'parry' || key === 'athletics:parry') return true;
                if (key === 'knack:feint' || key.startsWith('knack:feint:')) return true;
                return false;
            },

            _isAthleticsActionKey(key) {
                // True when the roll counts as an athletics action for
                // action-die spending. An athletics-only die (Togashi
                // special) may only be consumed by these keys.
                return key === 'athletics:attack' || key === 'athletics:parry';
            },

            _initialSpendLabel(key) {
                if (key === 'parry' || key === 'athletics:parry') return 'Parry (rolling...)';
                if (key === 'knack:feint' || (key && key.startsWith('knack:feint:'))) return 'Feint (rolling...)';
                return null;
            },

            // When the user picks an action from the per-die menu the
            // caller stashes that die's index here so the downstream roll
            // entrypoint spends *that* die instead of auto-picking the
            // lowest. Consumed once the roll actually fires; dangling
            // state is cleared if the attack modal is cancelled.
            _preSpentDieIndex: null,

            _autoSpendActionDie(initialLabel, isAthletics = false) {
                const t = window._trackingBridge;
                if (this._preSpentDieIndex != null && this._preSpentDieIndex >= 0) {
                    const i = this._preSpentDieIndex;
                    this._preSpentDieIndex = null;
                    if (t && typeof t.spendSpecificActionDie === 'function') {
                        const ok = t.spendSpecificActionDie(i, initialLabel || null);
                        this._actionDieSpentIndex = ok ? i : -1;
                    } else {
                        this._actionDieSpentIndex = -1;
                    }
                    return;
                }
                if (t && typeof t.spendLowestUnspentActionDie === 'function') {
                    this._actionDieSpentIndex = t.spendLowestUnspentActionDie(
                        initialLabel || null, !!isAthletics
                    );
                } else {
                    this._actionDieSpentIndex = -1;
                }
            },

            // Route an action from the per-die menu. Stashes the chosen
            // die index so the actual spend fires at the usual auto-spend
            // site (inside executeRoll / rollAttack). That way cancelling
            // the attack modal doesn't leave a die stuck-spent with no
            // action recorded. Attack-type formulas open the attack modal
            // (void/TN picked there); parry/feint/athletics-parry use
            // executeRoll (with optional void opt + predeclared-parry +5).
            rollForActionDie(key, dieIndex, voidCount = 0, voidOption = null,
                             extraFlat = 0, extraReason = null) {
                const f = this.formulas[key];
                if (!f) return;
                this.rollMenuOpen = false;
                if (f.is_attack_type) {
                    // Pass the dieIndex through openAttackModal so it can
                    // install it after clearing any stale index from a
                    // previously-cancelled modal.
                    this.openAttackModal(key, dieIndex);
                    return;
                }
                // For non-modal rolls the spend fires immediately inside
                // executeRoll / executeRollWithExtraFlat, so lingering
                // state isn't possible.
                this._preSpentDieIndex = dieIndex;
                if (extraFlat > 0) {
                    this.executeRollWithExtraFlat(key, voidCount, voidOption, extraFlat, extraReason);
                } else {
                    this.executeRoll(key, voidCount, voidOption);
                }
            },

            _annotateSpentActionDie(text) {
                if (this._actionDieSpentIndex == null || this._actionDieSpentIndex < 0) return;
                const t = window._trackingBridge;
                if (t && typeof t.annotateActionDie === 'function') {
                    t.annotateActionDie(this._actionDieSpentIndex, text);
                }
            },

            _refreshAttackDieTooltip() {
                // Rewrites the spent action die's tooltip from current state so
                // discretionary bonuses (conviction, priest ally, etc.) that are
                // added after the attack or damage roll show up immediately.
                if (this._actionDieSpentIndex == null || this._actionDieSpentIndex < 0) return;
                const includeDamage = this.atkPhase === 'damage-result';
                this._annotateSpentActionDie(this._describeAttackForDie(includeDamage));
            },

            _describeParryForDie(key) {
                const label = key === 'athletics:parry' ? 'Athletics Parry' : 'Parry';
                return `${label}: total ${this.baseTotal}`;
            },

            // Shinjo Bushi Special Ability on parry rolls: capture the spent
            // action die's value at the start of the roll so the result modal
            // can show a phase-selection prompt. The die has already been
            // marked spent by _autoSpendActionDie, but its value is preserved
            // on the tracking bridge. If the roll isn't parry-flavoured (or
            // the character isn't Shinjo Bushi), reset state so a previous
            // roll's picker doesn't leak into this one.
            _captureShinjoParryDieValue(formula) {
                // Every roll resets the Shinjo 5th Dan bank-excess latch so
                // the "Bank Excess" button re-enables on each new parry
                // (banked amounts are cumulative across rolls - the
                // player should be able to bank once per parry, not once
                // per combat).
                this.shinjoParryBankedThisRoll = null;
                this.shinjoParryOpponentRoll = 0;
                const eligible = formula?.shinjo_phase_bonus_attack
                        && this.schoolAbilities?.shinjo_phase_bonus;
                if (!eligible) {
                    this.shinjoParryPhase = null;
                    this.shinjoParryDieValue = null;
                    this.shinjoParryBonusApplied = 0;
                    return;
                }
                const idx = this._actionDieSpentIndex;
                const t = window._trackingBridge;
                const die = (idx != null && idx >= 0 && t)
                    ? (t.actionDice || [])[idx] : null;
                this.shinjoParryDieValue = die ? (die.value || 0) : null;
                this.shinjoParryPhase = null;
                this.shinjoParryBonusApplied = 0;
            },

            _shinjoParryPendingBonus() {
                // Live preview of the bonus the dropdown would apply given
                // the currently-selected phase; 0 when nothing is selected
                // yet, the die wasn't captured, or the phase is <= the die's
                // value (so the die hadn't been held any phases).
                const phase = parseInt(this.shinjoParryPhase, 10);
                if (!Number.isFinite(phase) || phase <= 0) return 0;
                const dieVal = this.shinjoParryDieValue;
                if (dieVal == null) return 0;
                return window.L7RRollMath.shinjoPhaseBonus(phase, dieVal);
            },

            _applyShinjoParryBonus() {
                // Called from the phase <select>'s @change. Roll the new
                // bonus into baseTotal and stamp phase metadata onto the
                // formula so the breakdown line renders with labels. The
                // delta approach keeps repeated changes (or a change then
                // back to "-") idempotent without having to re-derive the
                // total from scratch.
                const newBonus = this._shinjoParryPendingBonus();
                const delta = newBonus - (this.shinjoParryBonusApplied || 0);
                this.baseTotal += delta;
                this.shinjoParryBonusApplied = newBonus;
                if (this.formula) {
                    const phase = parseInt(this.shinjoParryPhase, 10) || 0;
                    this.formula.shinjo_phase_bonus = newBonus;
                    this.formula.shinjo_phase_bonus_phase = phase;
                    this.formula.shinjo_phase_bonus_die_value =
                        this.shinjoParryDieValue || 0;
                }
            },

            _describeFeintForDie(key) {
                // key is "knack:feint" or "knack:feint:<ring>" - strip the ring.
                return `Feint: total ${this.baseTotal}`;
            },

            _describeAttackForDie(includeDamage) {
                const f = this.atkFormula || this.formula || {};
                const variant = f.attack_variant || 'attack';
                const labelMap = {
                    attack: 'Attack',
                    double_attack: 'Double Attack',
                    counterattack: 'Counterattack',
                    lunge: 'Lunge',
                    athletics_attack: 'Athletics Attack',
                    iaijutsu: 'Iaijutsu Attack',
                };
                const label = labelMap[variant] || 'Attack';
                const effTN = this.atkEffectiveTN ? this.atkEffectiveTN() : this.atkTN;
                const outcome = this.atkNearMiss
                    ? 'near miss (hit, no extra damage)'
                    : (this.atkHit ? 'hit' : 'miss');
                let text = `${label}: rolled ${this.atkRollTotal} vs TN ${effTN} - ${outcome}`;
                if (includeDamage && this.atkDamageTotal > 0) {
                    text += `, damage ${this.atkDamageTotal}`;
                }
                return text;
            },

            executeRollWithExtraFlat(key, voidSpent, option, extraFlat, reason, useKitsuneSwap = false) {
                this.rollMenuOpen = false;
                this.parryHoverRow = null;
                if (this._keyAutoSpendsAction(key)) this._autoSpendActionDie(this._initialSpendLabel(key), this._isAthleticsActionKey(key));
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];
                this.courtier5thApplied = false;
                this.dojiOpponentResult = 0;
                this.dojiTnRollApplied = false;
                this._postRollHooksFired = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.mirumotoPointsSpentThisRoll = 0;
                this.currentRollKey = key;
                const f = { ...this.formulas[key] };
                // Kitsune Warden Special Ability swap (Phase 10): predeclared
                // parry path. Apply the swap before the predeclared +5 stacks.
                if (useKitsuneSwap && f.kitsune_swap) {
                    f.rolled = f.kitsune_swap.rolled;
                    f.kept = f.kitsune_swap.kept;
                    f.label = f.kitsune_swap.label;
                    f.kitsune_swap_from_ring = f.kitsune_swap.kitsune_swap_from_ring;
                    f.kitsune_swap_to_ring = f.kitsune_swap.kitsune_swap_to_ring;
                }
                f.flat += extraFlat;
                f.bonuses = [...(f.bonuses || []), { label: reason, amount: extraFlat }];
                this._captureShinjoParryDieValue(f);

                if (voidSpent > 0 && option) {
                    f.rolled += voidSpent;
                    f.kept += voidSpent;
                    f.void_spent = voidSpent;
                    const _cap = window.L7RRollMath.applyDiceCap(f.rolled, f.kept, f.flat);
                    f.rolled = _cap.rolled; f.kept = _cap.kept; f.flat = _cap.flat;
                    let overflowBonus = _cap.overflowFlat;
                    f.void_overflow_bonus = overflowBonus;
                    // Mirumoto 5th Dan: +10 per VP on combat rolls
                    const combatBonus = this.voidSpendConfig.combat_vp_flat_bonus || 0;
                    if (combatBonus > 0) {
                        f.flat += voidSpent * combatBonus;
                    }
                    this.deductVoidPoints(option);
                }

                this.formula = f;
                this.title = f.label;
                this.formulaText = f.flat > 0
                    ? `${f.rolled}k${f.kept} + ${f.flat}`
                    : `${f.rolled}k${f.kept}`;
                this.raisesSpentThisRoll = 0;
                this.open = true;
                this.runRoll();
            },

            executeRoll(key, voidSpent, option, owSpent = 0, useKitsuneSwap = false) {
                this.rollMenuOpen = false;
                this.owHoverRow = null;
                this.parryHoverRow = null;
                // Reset the copy-as-image state so the button hides while
                // the animation runs and reappears once the new render
                // lands. ``_rollImageReqId`` is bumped here so any
                // still-in-flight render from the previous roll discards
                // its response on arrival.
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                // Reset roll-history state so a stale PATCH timer can't
                // overwrite the previous roll's row with this new roll's
                // mid-animation payload. _saveRollHistoryCreate fires after
                // runRoll finishes and sets _rollHistoryId again.
                this._rollHistoryId = null;
                clearTimeout(this._rollHistoryUpdateTimer);
                if (this._keyAutoSpendsAction(key)) this._autoSpendActionDie(this._initialSpendLabel(key), this._isAthleticsActionKey(key));
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];
                this.courtier5thApplied = false;
                this.dojiOpponentResult = 0;
                this.dojiTnRollApplied = false;
                this._postRollHooksFired = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.mirumotoPointsSpentThisRoll = 0;
                this.currentRollKey = key;
                const f = { ...this.formulas[key] };
                // Kitsune Warden Special Ability: the user opted in to roll
                // with the school ring instead of the formula's natural
                // ring. Apply the server-precomputed swap dimensions.
                if (useKitsuneSwap && f.kitsune_swap) {
                    f.rolled = f.kitsune_swap.rolled;
                    f.kept = f.kitsune_swap.kept;
                    f.label = f.kitsune_swap.label;
                    f.kitsune_swap_from_ring = f.kitsune_swap.kitsune_swap_from_ring;
                    f.kitsune_swap_to_ring = f.kitsune_swap.kitsune_swap_to_ring;
                }
                this.perRoundResetMessages = f.is_initiative
                    ? this._resetPerRoundAbilities() : [];
                this._captureShinjoParryDieValue(f);

                if (owSpent > 0) {
                    const cap = f.otherworldliness_capacity || 0;
                    const applied = Math.min(owSpent, cap);
                    f.rolled += applied;
                    f.ow_spent = applied;
                    const t = window._trackingBridge;
                    if (t && applied > 0) {
                        t.setCount('otherworldliness', (t.getCount('otherworldliness') || 0) + applied);
                    }
                    // Spending OW on an unskilled roll grants the skill for this roll,
                    // so 10s reroll - unless the character is also Impaired.
                    if (applied > 0 && f.no_reroll_reason === 'unskilled') {
                        const sw = (t && typeof t.seriousWounds === 'number') ? t.seriousWounds : 0;
                        const impaired = window.L7RRollMath.isImpaired(sw, this._earthRing || 0);
                        if (impaired) {
                            f.no_reroll_reason = 'impaired';
                        } else {
                            f.reroll_tens = true;
                            f.no_reroll_reason = '';
                        }
                    }
                }

                if (voidSpent > 0 && option) {
                    f.rolled += voidSpent;
                    f.kept += voidSpent;
                    f.void_spent = voidSpent;

                    // Mirumoto 5th Dan: +10 per VP on combat rolls (parry and knack combat rolls)
                    const combatBonus = this.voidSpendConfig.combat_vp_flat_bonus || 0;
                    if (combatBonus > 0) {
                        f.flat += voidSpent * combatBonus;
                    }

                    // Deduct void points via tracking bridge
                    this.deductVoidPoints(option);
                }

                // Apply 10k10 caps client-side (after both OW and VP additions)
                if (voidSpent > 0 || owSpent > 0) {
                    const _cap = window.L7RRollMath.applyDiceCap(f.rolled, f.kept, f.flat);
                    f.rolled = _cap.rolled; f.kept = _cap.kept; f.flat = _cap.flat;
                    let overflowBonus = _cap.overflowFlat;
                    f.void_overflow_bonus = overflowBonus;
                }

                this.formula = f;
                this.title = f.label;
                this.formulaText = f.flat > 0
                    ? `${f.rolled}k${f.kept} + ${f.flat}`
                    : `${f.rolled}k${f.kept}`;
                this.raisesSpentThisRoll = 0;
                this.open = true;
                this.runRoll();
            },

            deductVoidPoints(option) {
                const t = window._trackingBridge;
                if (!t) return;
                // Read-only Roll Mode: non-editors get no bridge mutations
                // from VP spends. The roll-modal's local +5/raise/etc.
                // computation happens in the caller before this hook fires,
                // so the displayed roll total still reflects the spend.
                if (!t.canEdit) return;
                const nonTempSpent = (option.fromRegular || 0) + (option.fromWorldliness || 0);
                if (option.fromTemp > 0) t.tempVoidPoints -= option.fromTemp;
                if (option.fromRegular > 0) t.voidPoints -= option.fromRegular;
                if (option.fromWorldliness > 0) {
                    t.setCount('worldliness', (t.getCount('worldliness') || 0) + option.fromWorldliness);
                }
                // Ide 5th Dan: gain temp VP when spending non-technique VP
                if (this.schoolAbilities.ide_temp_vp_on_spend && nonTempSpent > 0) {
                    t.tempVoidPoints += nonTempSpent;
                }
                // Yogo Warden 3rd Dan: each VP spent reduces light wounds by 2*attack
                const yogoHeal = this.schoolAbilities.yogo_vp_heal_amount || 0;
                if (yogoHeal > 0) {
                    const totalSpent = (option.fromTemp || 0) + nonTempSpent;
                    t.lightWounds = window.L7RRollMath.yogoHealLightWounds(t.lightWounds, totalSpent, yogoHeal);
                    window.dispatchEvent(new CustomEvent('wound-changed', { detail: { serious: t.seriousWounds } }));
                }
                // Matsu 3rd Dan: bank 3*attack per VP for future wound check bonus
                if (this.schoolAbilities.matsu_vp_wc_bonus) {
                    const totalSpent = (option.fromTemp || 0) + nonTempSpent;
                    const perVp = this.schoolAbilities.matsu_vp_wc_amount || 0;
                    for (let i = 0; i < totalSpent; i++) {
                        this.matsuBankedWcBonuses.push({ amount: perVp, spent: false });
                    }
                    t.saveBankedBonuses();
                }
                t.save();
            },

            // Pure result-state computation shared by the early
            // (overlap-with-animation) and late paths in runRoll. From a
            // settled dice array it sets finalDice / keptDice / unkeptDice
            // / keptSum / baseTotal (plus the Shosuro 5th Dan and carried-
            // Conviction adjustments). No external side effects, so it's
            // safe to run mid-animation; the post-roll hooks that DO have
            // side effects (VP grants, banking) stay in runRoll and fire
            // only after the animation completes. Recomputing from the
            // same dice is idempotent.
            _computeResultState(dice, kept, flat) {
                const indexed = dice.map((d, i) => ({ ...d, idx: i }));
                // Kakita Duelist Special Ability: a 10 on initiative is
                // actually Phase 0, so it MUST sort ahead of every non-10
                // die for keep-lowest purposes - otherwise the keep-lowest
                // slice discards it and the player loses their Phase-0 die.
                const kakitaInit = !!(this.formula.is_initiative && this.formula.kakita_phase_zero);
                const sortValue = (v) => (kakitaInit && v === 10) ? 0 : v;
                const sortedAsc = [...indexed].sort(
                    (a, b) => sortValue(a.value) - sortValue(b.value) || a.idx - b.idx
                );
                const keptCount = Math.min(kept, sortedAsc.length);
                const isInit = this.formula.is_initiative;
                // Initiative: keep LOWEST dice. Normal: keep HIGHEST.
                const keptIdx = new Set(
                    isInit
                        ? sortedAsc.slice(0, keptCount).map(d => d.idx)
                        : sortedAsc.slice(sortedAsc.length - keptCount).map(d => d.idx)
                );
                this.finalDice = sortedAsc.map(d => ({ value: d.value, kept: keptIdx.has(d.idx) }));
                this.keptDice = sortedAsc.filter(d => keptIdx.has(d.idx));
                this.unkeptDice = sortedAsc.filter(d => !keptIdx.has(d.idx));
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum + flat;

                // Shosuro 5th Dan: add lowest 3 dice to result (TN/contested only, not initiative)
                this.shosuroLowest3Bonus = 0;
