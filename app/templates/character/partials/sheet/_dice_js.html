                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum + f.flat;
                this.duelStrikeRoll = this.baseTotal;
                const excess = this.duelStrikeRoll - this.duelOpponentTN;
                this.duelStrikeHit = excess >= 0;
                this.duelStrikeExcess = excess;
                this.duelPhase = 'strike-result';
                this._prerenderRollImage(this._buildDuelStrikeImagePayload());
                this._saveRollHistoryCreate();
            },

            duelComputeDamage() {
                const f = this.formulas['knack:iaijutsu'] || {};
                const ringVal = f.damage_ring_val || 2;
                const ringName = f.damage_ring_name || 'Fire';
                const wR = this.duelWeaponRolled;
                const wK = this.duelWeaponKept;
                const extraDice = window.L7RRollMath.clampNonNegative(this.duelStrikeExcess);
                let rolled = wR + ringVal + (f.damage_extra_rolled || 0) + extraDice;
                let kept = wK + (f.damage_extra_kept || 0);
                let flat = f.damage_flat_bonus || 0;
                const _cap = window.L7RRollMath.applyDiceCap(rolled, kept, flat);
                rolled = _cap.rolled; kept = _cap.kept; flat = _cap.flat;
                const rk = `${rolled},${kept}`;
                const avg = Math.round((this.atkDamageAvgs[rk] || 0) + flat);
                return { rolled, kept, flat, avg, extraDice, ringVal, ringName };
            },

            async duelRollDamage() {
                const dmg = this.duelComputeDamage();
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.courtier5thApplied = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.duelPhase = 'damage-rolling';
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    dmg.rolled, true, this.prefs.dice_animation_enabled, playSound, 'dice-animation-duel'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(dmg.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.duelDamageTotal = this.keptSum + dmg.flat;
                this.duelPhase = 'damage-result';
                this._prerenderRollImage(this._buildDuelDamageImagePayload());
                this._saveRollHistoryCreate();
            },

            duelApplyOpponentRoll() {
                const oppRoll = parseInt(this.duelOpponentRoll || '0');
                this.duelOpponentHit = oppRoll >= this.duelPlayerTN;
                if (!this.duelStrikeHit && !this.duelOpponentHit) {
                    // Both missed - compare rolls, higher gets +5 bonus
                    if (this.duelStrikeRoll >= oppRoll) {
                        this.duelRestartBonus += 5;
                    }
                    this.duelPhase = 'restart';
                } else if (this.duelOpponentHit) {
                    this.duelPhase = 'opponent-damage';
                } else {
                    // We hit, they missed - duel over after our damage
                    this.duelPhase = 'done';
                }
            },

            duelApplyOpponentDamage() {
                const dmg = parseInt(this.duelOpponentDamage || '0');
                const t = window._trackingBridge;
                if (t && t.canEdit) {
                    t.lightWounds += dmg;
                    t.save();
                }
                // Close duel modal and open wound check modal. Editors see
                // the WC modal pre-populated with their new (post-mutation)
                // LW; non-editors see it pre-populated with the dmg amount
                // so the WC roll runs against that scenario without ever
                // touching the displayed LW.
                this.duelOpen = false;
                this.wcIsStrike = true;
                this.wcLightWounds = (t && t.canEdit) ? t.lightWounds : dmg;
                this.wcVoidSelected = 0;
                this.wcPhase = 'pre';
                this.wcRaisesSpent = 0;
                this.wcResultApplied = false;
                this.wcMaxRaisesPerRoll = 0;
                this.wcHasDiscretionary = false;
                this.wcModalOpen = true;
                // Skip the pre-roll phase and roll directly for iaijutsu wound checks
                this.$nextTick(() => this.rollWoundCheck());
            },

            duelRestart() {
                this.duelContestedDone = false;
                this.duelPlayerCanFocus = true;
                this.duelOpponentCanFocus = true;
                this.duelVoidSelected = 0;
                // Reset TNs to base values (XP / 10) - focus bonuses don't carry over
                this.duelPlayerTN = window.L7RRollMath.duelTn({{ character.starting_xp }} + {{ character.earned_xp }});
                this.duelOpponentTN = window.L7RRollMath.duelTn(parseInt(this.duelOpponentXP || '0'));
                this.duelPhase = 'contested';
            },

            // --- Attack Modal ---

            openAttackModal(key, preSpentDieIndex = null) {
                const f = this.formulas[key];
                if (!f) return;
                // Always overwrite _preSpentDieIndex on modal open so a
                // previously-cancelled modal's index can't leak into this
                // roll. Non-null when called from rollForActionDie.
                this._preSpentDieIndex = preSpentDieIndex;
                this.atkKey = key;
                this.atkFormula = f;
                this.atkPhase = 'pre';
                this.atkVoidSelected = 0;
                this.atkRaisesSpent = 0;
                this.atkConvictionSpent = 0;
                // The togashi daily-athletics-raise pool is spendable on
                // athletics:attack too; reset the per-roll counter so the
                // cap tracks spends within this attack only.
                this.togashiRaisesSpentThisRoll = 0;
                this.atkFailedParry = false;
                this.atkIsawaTnTrade = false;
                this.atkOtakuTradeDice = false;
                // Reset arbitrary bonuses every modal open so a prior
                // attack's selection never leaks. Defaults match the
                // initial Alpine state.
                this.atkExtraBonusEnabled = false;
                this.atkExtraBonusAmount = 15;
                this.atkExtraBonusLabel = 'surrounding';
                this.atkPostRollBonusEnabled = false;
                this.atkPostRollBonusAmount = 5;
                this.atkPostRollBonusApplied = 0;
                // Reset the copy-as-image state so a previous roll's
                // blob doesn't bleed under this modal's Copy button.
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                this.atkDojiUntouchedTarget = false;
                this.atkSpecApplies = this.attackSpecs.map(() => false);
                this.atkDojiPhase = 1;
                // Default the Shinjo phase picker to the to-be-spent die's
                // value so the dropdown's initial selection matches its own
                // first option (the phase-bonus dropdown starts at die_value
                // since earlier phases are impossible).
                this.atkShinjoPhase = this._shinjoDieToSpend()?.value || 1;
                // 0 is the "no selection yet" sentinel; the roll button stays
                // disabled until the Kakita picks a real phase. Stronger than
                // defaulting to 11 because an overlooked default silently
                // zeros out the 3rd Dan bonus.
                this.atkKakitaDefenderPhase = 0;
                // Phase-4 interrupt callers set atkForceAttackerPhase AFTER
                // openAttackModal - so the default reset lives here in the
                // generic entrypoint, and the interrupt path overwrites it
                // immediately after calling openAttackModal.
                this.atkForceAttackerPhase = null;
                this.atkKakitaInterrupt = false;
                // Reset Kitsune Warden Special Ability swap on every modal
                // open so a previous attack's selection doesn't leak.
                this.atkKitsuneSwap = false;
                // Athletics-attack TN = 5 + 10*parry; regular TN = 5 + 5*parry.
                // Reset atkTN to a sane default if the previous value isn't one of
                // the new variant's dropdown options (so the <select> isn't blank).
                const validTNs = f.is_athletics_attack
                    ? [5, 15, 25, 35, 45, 55] : [5, 10, 15, 20, 25, 30];
                if (!validTNs.includes(this.atkTN)) {
                    this.atkTN = f.is_athletics_attack ? 25 : 20;
                }
                const tnStep = f.is_athletics_attack ? 10 : 5;
                this.atkParrySkill = window.L7RRollMath.parrySkillFromTn(this.atkTN, tnStep);
                this.atkShowCustomTN = false;
                this.atkModalOpen = true;
            },

            // Kakita Phase 0 interrupt: the tracking bridge spent the two
            // highest action dice, we open the iaijutsu-attack modal here
            // and force the attacker phase to 0 (so the 3rd Dan bonus, if
            // applicable, computes as X * defender_phase and the usual
            // _autoSpendActionDie path does NOT fire a second time).
            openKakitaPhase0InterruptModal() {
                if (!this.formulas['knack:iaijutsu:attack']) return;
                this.openAttackModal('knack:iaijutsu:attack', null);
                this.atkForceAttackerPhase = 0;
                this.atkKakitaInterrupt = true;
            },

            // --- Kakita 5th Dan: Phase-0 contested iaijutsu modal ---

            openKakita5thDanModal() {
                const t = window._trackingBridge;
                if (t?.kakita5thDanUsed) return;
                this.k5Phase = 'pre';
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                this.k5OpponentHasIaijutsu = true;
                this.k5DefenderPhase = 11;
                this.k5OpponentSkillRank = 4;
                this.k5RollTotal = 0;
                this.k5RollDice = [];
                this.k5FormulaText = '';
                this.k5NoIaijutsuBonus = 0;
                this.k5KakitaBonus = 0;
                this.k5ContestSkillBonus = 0;
                this.k5OpponentRoll = 0;
                this.k5DamageTotal = 0;
                this.k5DamageDice = [];
                this.k5DamageRolled = 0;
                this.k5DamageKept = 0;
                this.k5DamageFlat = 0;
                this.k5DamageDiceAdjust = 0;
                this.k5Open = true;
            },

            closeKakita5thDanModal() {
                this.k5Open = false;
            },

            _kakita5thIaijutsuFormula() {
                // Prefer the Kakita-only iaijutsu:attack variant (carries
                // the Phase-2 is_attack_type + Phase-4 3rd-Dan flag); fall
                // back to the regular iaijutsu knack formula otherwise.
                return this.formulas['knack:iaijutsu:attack']
                    || this.formulas['knack:iaijutsu'];
            },

            _kakita5thContestSkillBonus() {
                // General contested-roll rule: +5 flat (one free raise) per
                // rank by which the Kakita's iaijutsu exceeds the opponent's
                // contested skill. Clamps at 0 (no penalty if lower).
                const ours = parseInt(this.k5OwnIaijutsuRank, 10) || 0;
                const theirs = parseInt(this.k5OpponentSkillRank, 10) || 0;
                return window.L7RRollMath.contestSkillRaiseBonus(ours, theirs);
            },

            _kakita5thPreRollBonus() {
                // Reports the sum of pre-roll bonuses that will be added
                // to the contested iaijutsu roll for display on the 'pre'
                // page. The 3rd Dan bonus uses attacker_phase=0 per the
                // 5th Dan rules.
                let bonus = 0;
                if (!this.k5OpponentHasIaijutsu) {
                    bonus += 5;  // free raise when opponent can't iaijutsu
                }
                const x = this.schoolAbilities.kakita_3rd_dan_defender_phase_bonus_x || 0;
                if (x > 0) {
                    const def = parseInt(this.k5DefenderPhase, 10);
                    if (Number.isFinite(def)) {
                        bonus += window.L7RRollMath.kakitaDefenderPhaseBonus(x, def, 0);
                    }
                }
                bonus += this._kakita5thContestSkillBonus();
                return bonus;
            },

            async _kakita5thRollDiceTray(rolled, rerollTens, trayId) {
                // Thin wrapper around rollAndAnimate so the 5th Dan modal
                // animates and plays sound when the player has those prefs
                // enabled - matching every other dice-roll in the app.
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                return window.L7RDice.rollAndAnimate(
                    rolled, rerollTens, this.prefs.dice_animation_enabled,
                    playSound, trayId,
                );
            },

            async rollKakita5thDanContest() {
                const f = this._kakita5thIaijutsuFormula();
                if (!f) return;
                let rolled = f.rolled || 0;
                let kept = f.kept || 0;
                let flat = f.flat || 0;
                // Opponent-has-no-iaijutsu: +5 free raise to the character.
                this.k5NoIaijutsuBonus = this.k5OpponentHasIaijutsu ? 0 : 5;
                flat += this.k5NoIaijutsuBonus;
                // 3rd Dan bonus with attacker_phase = 0.
                const x = this.schoolAbilities.kakita_3rd_dan_defender_phase_bonus_x || 0;
                const def = parseInt(this.k5DefenderPhase, 10);
                this.k5KakitaBonus = x > 0 && Number.isFinite(def)
                    ? window.L7RRollMath.kakitaDefenderPhaseBonus(x, def, 0) : 0;
                flat += this.k5KakitaBonus;
                // Contested-roll skill comparison: +5 per rank Kakita's own
                // iaijutsu exceeds the opponent's picked skill.
                this.k5ContestSkillBonus = this._kakita5thContestSkillBonus();
                flat += this.k5ContestSkillBonus;
                this.k5Phase = 'rolling';
                const dice = await this._kakita5thRollDiceTray(
                    rolled, !!f.reroll_tens, 'dice-animation-k5');
                // Keep the highest ``kept`` dice.
                const sorted = dice
                    .map((d, i) => ({...d, idx: i}))
                    .sort((a, b) => a.value - b.value);
                const keptIdx = new Set(
                    sorted.slice(sorted.length - kept).map(d => d.idx));
                this.k5RollDice = dice.map((d, i) => ({
                    value: d.value, kept: keptIdx.has(i),
                }));
                const keptSum = dice.reduce(
                    (s, d, i) => s + (keptIdx.has(i) ? d.value : 0), 0);
                this.k5RollTotal = keptSum + flat;
                this.k5FormulaText = flat > 0
                    ? `${rolled}k${kept} + ${flat}`
                    : `${rolled}k${kept}`;
                this.k5Phase = 'result';
                this._prerenderRollImage(this._buildKakita5thImagePayload());
                this._saveRollHistoryCreate();
            },

            async rollKakita5thDanDamage() {
                const f = this._kakita5thIaijutsuFormula();
                if (!f) return;
                // Base damage: weapon + iaijutsu damage metadata. Matches
                // the attack modal's default damage shape.
                const weaponRolled = parseInt(this.k5WeaponRolled, 10) || 0;
                const weaponKept = parseInt(this.k5WeaponKept, 10) || 0;
                const ringVal = f.damage_ring_val || 0;
                const extraRolled = f.damage_extra_rolled || 0;
                const extraKept = f.damage_extra_kept || 0;
                this.k5DamageFlat = f.damage_flat_bonus || 0;
                // Contest scaling: +/- floor(diff / 5) rolled dice.
                const diff = this.k5RollTotal - (parseInt(this.k5OpponentRoll, 10) || 0);
                this.k5DamageDiceAdjust = window.L7RRollMath.damageDiceContestAdjust(diff);
                this.k5DamageRolled = Math.max(0,
                    weaponRolled + extraRolled + ringVal + this.k5DamageDiceAdjust);
                this.k5DamageKept = Math.max(0, weaponKept + extraKept);
                // Rolls cap at 10k10 per L7R standards.
                if (this.k5DamageRolled > 10) { this.k5DamageKept += (this.k5DamageRolled - 10); this.k5DamageRolled = 10; }
                if (this.k5DamageKept > 10) { this.k5DamageFlat += 2 * (this.k5DamageKept - 10); this.k5DamageKept = 10; }
                if (this.k5DamageRolled <= 0 || this.k5DamageKept <= 0) {
                    this.k5DamageDice = [];
                    this.k5DamageTotal = this.k5DamageFlat;
                    this.k5Phase = 'damage-result';
                    this._markKakita5thUsed();
                    return;
                }
                this.k5Phase = 'damage-rolling';
                const dice = await this._kakita5thRollDiceTray(
                    this.k5DamageRolled, true, 'dice-animation-k5-damage');
                const sorted = dice
                    .map((d, i) => ({...d, idx: i}))
                    .sort((a, b) => a.value - b.value);
                const keptIdx = new Set(
                    sorted.slice(sorted.length - this.k5DamageKept).map(d => d.idx));
                this.k5DamageDice = dice.map((d, i) => ({
                    value: d.value, kept: keptIdx.has(i),
                }));
                const keptSum = dice.reduce(
                    (s, d, i) => s + (keptIdx.has(i) ? d.value : 0), 0);
                this.k5DamageTotal = keptSum + this.k5DamageFlat;
                this.k5Phase = 'damage-result';
                this._markKakita5thUsed();
            },

            _markKakita5thUsed() {
                const t = window._trackingBridge;
                if (!t) return;
                t.kakita5thDanUsed = true;
                t.adventureState.kakita_5th_dan_used = true;
                t.save();
            },

            atkIsDoubleAttack() {
                return this.atkFormula?.attack_variant === 'double_attack';
            },

            atkIsAthleticsAttack() {
                return this.atkFormula?.attack_variant === 'athletics_attack';
            },

            // Human-readable name of the action the attack modal is handling.
            // Falls back to the formula label (stripped of parenthetical rings
            // like "(Fire)") and finally to a generic label.
            attackActionName() {
                const raw = this.atkFormula?.label || 'Attack';
                return raw.replace(/\s*\(.*\)\s*$/, '').trim() || 'Attack';
            },

            // Returns a string describing when to warn the player about an
            // attempted action-die-spending action:
            //   'no-init'      -> no action dice present at all (never rolled
            //                     initiative this combat).
            //   'out-of-dice'  -> dice rolled but every one is spent.
            //   null           -> at least one unspent die, no warning.
            // Athletics-only dice count as "available" for the warning - they
            // exist and might be spendable (Mantis 4th Dan) or simply signal
            // that initiative has been rolled.
            initiativeWarningVariant() {
                // Interrupt-style entry points (Kakita Phase 0 interrupt,
                // eventually Kakita 5th Dan) have already paid the action-
                // die cost up-front via ``atkForceAttackerPhase``, so the
                // "no initiative / out of dice" nudge would be misleading.
                if (this.atkForceAttackerPhase !== null
                        && this.atkForceAttackerPhase !== undefined) {
                    return null;
                }
                const dice = window._trackingBridge?.actionDice || [];
                if (!dice.length) return 'no-init';
                if (dice.every(d => d.spent)) return 'out-of-dice';
                return null;
            },

            // Close any open action-die-spending modal and trigger the
            // initiative action. Uses the DOM's initiative entrypoint so
            // school-specific branches (Togashi choice menu, etc.) fire
            // exactly as they do from a normal click.
            triggerInitiativeFromWarning() {
                this.atkModalOpen = false;
                this.close();  // dice-roller modal (if open)
                this.rollMenuOpen = false;
                const btn = document.querySelector('[data-roll-key="initiative"]');
                if (btn) btn.click();
            },

            atkEffectiveTN() {
                // Double attack TN is raised by 20
                return window.L7RRollMath.attackEffectiveTn(this.atkTN, this.atkIsDoubleAttack());
            },

            // Mantis Wave-Treader posture overlay helpers. Read live state
            // from the tracking bridge so pre-roll Alpine expressions react to
            // posture selections without re-opening the modal. Returns a list
            // of labeled strings to display; also expose the numeric total for
            // probability / damage math.
            _mantisLiveAttackLabels() {
                const t = window._trackingBridge;
                if (!t) return [];
                const out = [];
                if (t.currentPosture?.() === 'offensive') {
                    out.push('+5 from offensive posture');
                }
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    const c = t.offensivePhaseCount?.() || 0;
                    if (c > 0) out.push(`+${c} from Mantis 5th Dan (offensive posture count)`);
                }
                if (this.schoolAbilities.mantis_3rd_dan_offensive) {
                    const a = t.offensive3rdDanAccum || 0;
                    if (a > 0) out.push(`+${a} from Mantis 3rd Dan (offensive)`);
                }
                return out;
            },
            _mantisLiveDamageLabels() {
                // Attack and damage share the same offensive-posture overlays,
                // so this is structurally identical to the attack-side list.
                return this._mantisLiveAttackLabels();
            },
            _mantisLiveAttackFlat() {
                const t = window._trackingBridge;
                if (!t) return 0;
                let flat = t.currentPosture?.() === 'offensive' ? 5 : 0;
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    flat += t.offensivePhaseCount?.() || 0;
                }
                if (this.schoolAbilities.mantis_3rd_dan_offensive) {
                    flat += t.offensive3rdDanAccum || 0;
                }
                return flat;
            },
            _mantisLiveWcLabels() {
                const t = window._trackingBridge;
                if (!t) return [];
                const out = [];
                if (t.currentPosture?.() === 'defensive') {
                    out.push('+5 from defensive posture');
                }
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    const c = t.defensivePhaseCount?.() || 0;
                    if (c > 0) out.push(`+${c} from Mantis 5th Dan (defensive posture count)`);
                }
                if (this.schoolAbilities.mantis_3rd_dan_defensive) {
                    const a = t.defensive3rdDanAccum || 0;
                    if (a > 0) out.push(`+${a} from Mantis 3rd Dan (defensive)`);
                }
                return out;
            },
            _mantisLiveWcFlat() {
                const t = window._trackingBridge;
                if (!t) return 0;
                let flat = t.currentPosture?.() === 'defensive' ? 5 : 0;
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    flat += t.defensivePhaseCount?.() || 0;
                }
                if (this.schoolAbilities.mantis_3rd_dan_defensive) {
                    flat += t.defensive3rdDanAccum || 0;
                }
                return flat;
            },

            _dojiAtkBonus() {
                return this.atkFormula?.doji_5th_dan_always
                    ? window.L7RRollMath.bonusPer5Over10(this.atkTN) : 0;
            },

            // Attack Specialization bonus: +10 per checked attack spec.
            // Returns 0 unless the current formula is an attack-type roll
            // (gates out parry/skill paths that never show the checkboxes).
            _attackSpecBonus() {
                if (!this.atkFormula?.is_attack_type) return 0;
                let count = 0;
                for (let i = 0; i < (this.atkSpecApplies || []).length; i++) {
                    if (this.atkSpecApplies[i]) count++;
                }
                return window.L7RRollMath.attackSpecBonus(count);
            },

            // Doji Artisan 4th Dan: +phase when attacking a target that has
            // not attacked you this round. Returns 0 unless the pre-roll
            // checkbox is ticked and the formula exposes the flag.
            _dojiUntouchedBonus() {
                if (!this.atkFormula?.doji_4th_dan_untouched_target) return 0;
                if (!this.atkDojiUntouchedTarget) return 0;
                const phase = parseInt(this.atkDojiPhase, 10);
                return Number.isFinite(phase) && phase > 0 ? phase : 0;
            },

            // Shinjo Bushi Special Ability helpers. Returns the action die
            // that would be spent on the current attack, or null if none
            // will be spent (e.g. no unspent dice; warning has already
            // fired by the time we reach this code path).
            _shinjoDieToSpend() {
                const t = window._trackingBridge;
                if (!t) return null;
                const dice = t.actionDice || [];
                if (this._preSpentDieIndex != null && this._preSpentDieIndex >= 0) {
                    const d = dice[this._preSpentDieIndex];
                    return d && !d.spent ? d : null;
                }
                const isAth = this._isAthleticsActionKey(this.atkKey);
                for (const d of dice) {
                    if (d.spent) continue;
                    if (!isAth && d.athletics_only) continue;
                    return d;
                }
                return null;
            },
            // Phases the chosen die was held = current phase minus die value.
            // Clamped to 0 so a die that hasn't "come up" yet contributes no
            // bonus rather than a negative one.
            _shinjoPhasesHeld() {
                const die = this._shinjoDieToSpend();
                if (!die) return 0;
                const phase = parseInt(this.atkShinjoPhase, 10);
                if (!Number.isFinite(phase) || phase <= 0) return 0;
                return window.L7RRollMath.shinjoPhasesHeld(phase, die.value || 0);
            },
            _shinjoPhaseBonus() {
                if (!this.atkFormula?.shinjo_phase_bonus_attack) return 0;
                if (!this.schoolAbilities.shinjo_phase_bonus) return 0;
                if (this.initiativeWarningVariant() !== null) return 0;
                return 2 * this._shinjoPhasesHeld();
            },

            // Kakita Duelist 3rd Dan: X * (defender_phase - attacker_phase)
            // where X is attack skill. Attacker phase is normally the spent
            // action die's value, but the Phase-0 interrupt entry point
            // sets ``atkForceAttackerPhase = 0`` because the interrupt
            // spends its 2 highest dice as a cost rather than "in" their
            // phase. Defender phase is the player's pre-roll pick (clamped
            // to >= attacker phase so the bonus can't go negative).
            _kakita3rdDanAttackerPhase() {
                if (this.atkForceAttackerPhase !== null
                        && this.atkForceAttackerPhase !== undefined) {
                    return this.atkForceAttackerPhase;
                }
                const die = this._shinjoDieToSpend();
                return die ? (die.value || 0) : 0;
            },
            _kakita3rdDanBonus() {
                if (!this.atkFormula?.kakita_3rd_dan_defender_phase_bonus) return 0;
                if (this.initiativeWarningVariant() !== null) return 0;
                // Interrupt path: attacker phase is forced to 0 and the
                // cost dice are already spent - no additional die-to-spend.
                // Normal path: still require a to-be-spent action die.
                const forced = this.atkForceAttackerPhase;
                if ((forced === null || forced === undefined)
                        && !this._shinjoDieToSpend()) return 0;
                const x = this.schoolAbilities.kakita_3rd_dan_defender_phase_bonus_x || 0;
                if (x <= 0) return 0;
                const defender = parseInt(this.atkKakitaDefenderPhase, 10);
                const attacker = this._kakita3rdDanAttackerPhase();
                // 0 is the "not yet picked" sentinel; no bonus until the
                // player chooses a real phase.
                if (!Number.isFinite(defender) || defender === 0) return 0;
                return window.L7RRollMath.kakitaDefenderPhaseBonus(x, defender, attacker);
            },

            _kakita3rdDanNeedsPhase() {
                // True when the Kakita 3rd Dan defender-phase control is on
                // screen but the player hasn't picked a phase yet. Mirrors
                // the x-show condition on the control so the Roll button
                // only gates when the control is actually active.
                if (!this.atkFormula?.kakita_3rd_dan_defender_phase_bonus) return false;
                const x = this.schoolAbilities.kakita_3rd_dan_defender_phase_bonus_x || 0;
                if (x <= 0) return false;
                if (this.initiativeWarningVariant() !== null) return false;
                const forced = this.atkForceAttackerPhase;
                if ((forced === null || forced === undefined)
                        && !this._shinjoDieToSpend()) return false;
                return this.atkKakitaDefenderPhase === 0;
            },

            // Returns either the default attack-probs entry for the current
            // atkKey or its Kitsune-swap variant, depending on the modal
            // checkbox. Centralised so atkHitChance / atkAvgAttackRoll /
            // table render all see the same source.
            _atkProbsForCurrent() {
                const base = this.atkProbs[this.atkKey];
                if (!base) return null;
                if (this.atkKitsuneSwap && base.kitsune_swap) return base.kitsune_swap;
                return base;
            },

            _atkExtraBonusFlat() {
                // GM-grant pre-roll bonus: amount only counts when the
                // checkbox is on; non-numeric input defaults to 0 so
                // the math stays sane while the user is typing.
                if (!this.atkExtraBonusEnabled) return 0;
                const n = parseInt(this.atkExtraBonusAmount, 10);
                return Number.isFinite(n) ? n : 0;
            },

            // Post-roll arbitrary bonus on the attack result panel.
            // ``Applied`` tracks how much is currently folded into
            // atkRollTotal so we can apply deltas without
            // double-counting (toggle off, edit number while checked).
            atkPostRollBonusToggle(enabled) {
                if (enabled) {
                    const amt = parseInt(this.atkPostRollBonusAmount, 10) || 0;
                    if (amt !== 0) {
                        this.atkRollTotal += amt;
                        this.baseTotal += amt;
                        this.atkPostRollBonusApplied = amt;
                        this._atkUpdateHitState();
                    } else {
                        this.atkPostRollBonusApplied = 0;
                    }
                    // Auto-focus the number field with its content
                    // selected so the user types directly to replace
                    // the default. Wrapped in $nextTick so Alpine has
                    // rendered the input before we ref it.
                    this.$nextTick(() => {
                        const el = this.$refs.atkPostRollBonusInput;
                        if (el) { el.focus(); el.select(); }
                    });
                } else {
                    if (this.atkPostRollBonusApplied !== 0) {
                        this.atkRollTotal -= this.atkPostRollBonusApplied;
                        this.baseTotal -= this.atkPostRollBonusApplied;
                        this.atkPostRollBonusApplied = 0;
                        this._atkUpdateHitState();
                    }
                    // Restore the default so a subsequent toggle-on
                    // starts from +5 again.
                    this.atkPostRollBonusAmount = 5;
                }
            },

            atkPostRollBonusUpdate() {
                if (!this.atkPostRollBonusEnabled) return;
                const next = parseInt(this.atkPostRollBonusAmount, 10);
                const newAmt = Number.isFinite(next) ? next : 0;
                const delta = newAmt - this.atkPostRollBonusApplied;
                if (delta !== 0) {
                    this.atkRollTotal += delta;
                    this.baseTotal += delta;
                    this.atkPostRollBonusApplied = newAmt;
                    this._atkUpdateHitState();
                }
            },

            atkHitChance(voidCount) {
                const probs = this._atkProbsForCurrent();
                if (!probs) return 0;
                const rk = probs.void_keys?.[String(voidCount)];
                if (!rk || !probs.probs?.[rk]) return 0;
                const arr = probs.probs[rk];
                const vpFlat = voidCount * (this.voidSpendConfig.combat_vp_flat_bonus || 0);
                const dojiBonus = this._dojiAtkBonus();
                const dojiUntouched = this._dojiUntouchedBonus();
                const shinjoPhase = this._shinjoPhaseBonus();
                const kakita3rd = this._kakita3rdDanBonus();
                const shosuroFlat = probs.shosuro_flats?.[rk] || 0;
                const specFlat = this._attackSpecBonus();
                // Mantis Wave-Treader: offensive posture (+5) plus 5th Dan
                // offensive-posture-count accumulator (+N) feed into the target.
                const postureFlat = this._mantisLiveAttackFlat();
                const extraBonus = this._atkExtraBonusFlat();
                const target = Math.max(0,
                    this.atkEffectiveTN() - (probs.flat || 0) - vpFlat - dojiBonus - dojiUntouched - shinjoPhase - kakita3rd - shosuroFlat - postureFlat - specFlat - extraBonus);
                return target < arr.length ? arr[target] : 0;
            },

            atkAvgAttackRoll(voidCount) {
                const probs = this._atkProbsForCurrent();
                if (!probs) return 0;
                const rk = probs.void_keys?.[String(voidCount)];
                const vpFlat = voidCount * (this.voidSpendConfig.combat_vp_flat_bonus || 0);
                const dojiBonus = this._dojiAtkBonus();
                const dojiUntouched = this._dojiUntouchedBonus();
                const shinjoPhase = this._shinjoPhaseBonus();
                const kakita3rd = this._kakita3rdDanBonus();
                const shosuroFlat = probs.shosuro_flats?.[rk] || 0;
                const specFlat = this._attackSpecBonus();
                const postureFlat = this._mantisLiveAttackFlat();
                const extraBonus = this._atkExtraBonusFlat();
                return (probs.avgs?.[rk] || 0) + (probs.flat || 0) + vpFlat + dojiBonus + dojiUntouched + shinjoPhase + kakita3rd + shosuroFlat + postureFlat + specFlat + extraBonus;
            },

            atkAvgExtraDice(voidCount) {
                const avg = this.atkAvgAttackRoll(voidCount);
                // For double attack, extra dice are based on excess over BASE TN (not +20)
                const excess = avg - this.atkTN;
                return window.L7RRollMath.excessToExtraDice(excess);
            },

            shosuroAvgFor(rolled, rerollTens) {
                // Lookup average 3-lowest-dice bonus (clamps rolled to 3..10).
                const table = this.schoolAbilities.shosuro_lowest_3_avg || {};
                const r = Math.max(3, Math.min(10, rolled || 0));
                const k = (rerollTens ? '1' : '0') + ':' + r;
                return table[k] || 0;
            },

            atkComputeDamage(extraDice, isLunge, failedParry, parrySkill, isDoubleAttack, tradeDice = 0) {
                const f = this.atkFormula;
                if (!f) return { rolled: 0, kept: 0, flat: 0, avg: 0, parts: [] };
                let wR = this.atkWeaponRolled;
                let wK = this.atkWeaponKept;
                const ringVal = f.damage_ring_val || 2;
                const ringName = f.damage_ring_name || 'Fire';
                let extraR = (f.damage_extra_rolled || 0);
                let extraK = (f.damage_extra_kept || 0);
                let flat = f.damage_flat_bonus || 0;
                // Hiruma 3rd Dan: +2X on damage roll after parry
                if (f.hiruma_parry_bonus) { flat += f.hiruma_parry_bonus; }

                // Bayushi Special: +1k1 per VP spent on the attack roll
                const bayushiVpDmg = this.schoolAbilities.bayushi_vp_damage ? (f.void_spent || 0) : 0;
                if (bayushiVpDmg > 0) {
                    extraR += bayushiVpDmg;
                    extraK += bayushiVpDmg;
                }

                let totalExtra = extraDice;
                if (isLunge) totalExtra += 1;
                if (isDoubleAttack && failedParry) totalExtra += 2;

                if (failedParry) {
                    // Brotherhood 4th Dan: failed parries don't reduce damage dice
                    if (this.schoolAbilities.brotherhood_parry_no_reduce) {
                        // No reduction at all
                    } else if (this.schoolAbilities.mirumoto_parry_modifier && isDoubleAttack) {
                        // Mirumoto 4th Dan vs double attacks: parry doesn't prevent auto SW
                        // (totalExtra stays as-is - the auto SW from double attack is preserved)
                        totalExtra = Math.max(0, totalExtra - parrySkill);
                    } else if (this.schoolAbilities.mirumoto_parry_modifier) {
                        // Mirumoto 4th Dan vs regular attacks: halve parry reduction (round down)
                        totalExtra = Math.max(0, totalExtra - Math.floor(parrySkill / 2));
                    } else {
                        totalExtra = Math.max(0, totalExtra - parrySkill);
                    }
                }
                // Otaku 4th Dan: lunge extra die always applies even if unsuccessfully parried
                if (isLunge && failedParry && this.schoolAbilities.otaku_lunge_extra_die) {
                    totalExtra += 1;
                }

                let rolled = wR + ringVal + extraR + totalExtra;
                let kept = wK + extraK;
                const parts = [`${wR}k${wK} weapon`, `+${ringVal}k0 from ${ringName}`];
                if (bayushiVpDmg > 0) parts.push(`+${bayushiVpDmg}k${bayushiVpDmg} from VP (Bayushi Special)`);
                const schoolR = extraR - bayushiVpDmg, schoolK = extraK - bayushiVpDmg;
                if (schoolR > 0 || schoolK > 0) parts.push(`+${schoolR}k${schoolK} from school`);
                if (extraDice > 0) parts.push(`+${extraDice}k0 extra from attack roll`);
                if (isLunge) parts.push('+1k0 from Lunge');
                if (isDoubleAttack && failedParry) parts.push('+2k0 from Double Attack (failed parry)');
                if (failedParry && this.schoolAbilities.brotherhood_parry_no_reduce) {
                    parts.push('parry does not reduce dice (4th Dan)');
                } else if (failedParry && this.schoolAbilities.mirumoto_parry_modifier && !isDoubleAttack) {
                    parts.push(`-${Math.floor(parrySkill / 2)}k0 from failed parry (halved by 4th Dan)`);
                } else if (failedParry) {
                    parts.push(`-${parrySkill}k0 from failed parry`);
                }
                let residualFlat = flat;
                if (f.hiruma_parry_bonus) {
                    parts.push(`+${f.hiruma_parry_bonus} from Hiruma post-parry bonus`);
                    residualFlat -= f.hiruma_parry_bonus;
                }
                // Mantis Wave-Treader 2nd Dan free raise on damage shows as an
                // explicit labeled line; damage_bonus_sources carries the label
                // as "+5 from 2nd Dan (damage)".
                const has2ndDanDamage = (f.damage_bonus_sources || [])
                    .some(s => typeof s === 'string' && s.includes('2nd Dan'));
                if (has2ndDanDamage) {
                    parts.push('+5 flat from 2nd Dan');
                    residualFlat -= 5;
                }
                // Mantis Wave-Treader Special: offensive posture adds +5 flat damage.
                // Read live posture so pre-roll preview reflects current state.
                if (window._trackingBridge?.currentPosture?.() === 'offensive') {
                    parts.push('+5 flat from offensive posture');
                    flat += 5;
                }
                // Mantis Wave-Treader 5th Dan: per-round accumulator of +N
                // damage where N = count of offensive postures declared.
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    const _mantisDmgAcc = window._trackingBridge?.offensivePhaseCount?.() || 0;
                    if (_mantisDmgAcc > 0) {
                        parts.push(`+${_mantisDmgAcc} flat from Mantis 5th Dan (offensive posture count)`);
                        flat += _mantisDmgAcc;
                    }
                }
                // Mantis Wave-Treader 3rd Dan offensive: per-round accumulator
                // (+X damage) set via the attack-result-modal button.
                if (this.schoolAbilities.mantis_3rd_dan_offensive) {
                    const _mantis3rdDmg = window._trackingBridge?.offensive3rdDanAccum || 0;
                    if (_mantis3rdDmg > 0) {
                        parts.push(`+${_mantis3rdDmg} flat from Mantis 3rd Dan (offensive)`);
                        flat += _mantis3rdDmg;
                    }
                }
                if (residualFlat > 0) {
                    parts.push(`+${residualFlat} flat bonus`);
                }

                // Ikoma 4th Dan: 10-dice floor on unparried damage without extra kept dice
                if (this.schoolAbilities.ikoma_10_dice_floor && !failedParry && rolled <= 10 && rolled < 10) {
                    parts.push(`rolled ${rolled} -> 10 (4th Dan, unparried)`);
                    rolled = 10;
                }

                const rawRolled = rolled;

                // Otaku 5th Dan: trade dice for auto serious wound
                if (tradeDice > 0) {
                    rolled = window.L7RRollMath.tradeDiceFloor(rolled, tradeDice);
                }

                // Apply 10k10 caps. Excess rolled dice become extra kept
                // dice; each kept die past 10 converts to +2 flat. Surface
                // that overflow as a dedicated parts entry so the damage
                // breakdown shows where the +2N came from (without this,
                // the total silently included +2N that no bullet explained).
                const _cap = window.L7RRollMath.applyDiceCap(rolled, kept, flat);
                rolled = _cap.rolled; kept = _cap.kept;
                const overflowFlat = _cap.overflowFlat;
                if (overflowFlat > 0) {
                    const extras = overflowFlat / 2;
                    const noun = extras === 1 ? 'die' : 'dice';
                    parts.push(
                        `+${overflowFlat} bonus for rolling ${extras} ${noun} past 10k10`
                    );
                }

                const rk = `${rolled},${kept}`;
                // Shosuro Actor 5th Dan: add average of 3 lowest dice (damage rerolls 10s).
                // Baked into the "avg" for pre-roll display; the post-roll result
                // shows the actual lowest-3 sum via atkDamageShosuroBonus.
                const shosuroAvg = f.shosuro_5th_dan
                    ? (this.shosuroAvgFor(rolled, true) || 0) : 0;
                const avg = Math.round((this.atkDamageAvgs[rk] || 0) + flat + overflowFlat + shosuroAvg);

                return {
                    rolled, kept,
                    flat: flat + overflowFlat,
                    avg, parts, rawRolled,
                    shosuro_5th_dan: !!f.shosuro_5th_dan,
                };
            },

            atkAvgDamage(voidCount) {
                const extra = this.atkAvgExtraDice(voidCount);
                const f = this.atkFormula;
                const isLunge = f?.attack_variant === 'lunge';
                const d = this.atkComputeDamage(extra, isLunge, false, 0, false);
                return d.avg;
            },

            async rollAttack() {
                // Every attack variant (attack, double_attack, counterattack,
                // lunge, athletics:attack) consumes an action die. The initial
                // label is a placeholder - it will be replaced with the full
                // attack result once the roll completes. Only athletics:attack
                // counts as an athletics action for athletics-only die spending.
                // Interrupt-style entry points (Kakita Phase 0 interrupt)
                // have already paid their dice cost up-front and set
                // ``atkForceAttackerPhase``; those skip the auto-spend so
                // the attack doesn't consume a third die.
                if (this.atkForceAttackerPhase === null
                        || this.atkForceAttackerPhase === undefined) {
                    this._autoSpendActionDie('Attack (rolling...)', this._isAthleticsActionKey(this.atkKey));
                } else {
                    this._actionDieSpentIndex = -1;
                }
                const voidCount = this.atkVoidSelected;
                const formula = { ...this.formulas[this.atkKey] };
                // Kitsune Warden Special Ability: when the modal checkbox
                // is checked, swap the formula's natural ring for the
                // school ring before any further bonuses stack.
                if (this.atkKitsuneSwap && formula.kitsune_swap) {
                    formula.rolled = formula.kitsune_swap.rolled;
                    formula.kept = formula.kitsune_swap.kept;
                    formula.label = formula.kitsune_swap.label;
                    formula.kitsune_swap_from_ring = formula.kitsune_swap.kitsune_swap_from_ring;
                    formula.kitsune_swap_to_ring = formula.kitsune_swap.kitsune_swap_to_ring;
                }
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];

                // Mantis Wave-Treader Special: offensive posture at attack-roll
                // time adds +5 to the attack roll. Snapshot into formula so the
                // post-roll breakdown shows the labeled entry even if posture
                // changes before the damage roll.
                if (window._trackingBridge?.currentPosture?.() === 'offensive') {
                    formula.flat = (formula.flat || 0) + 5;
                    formula.bonus_sources = [...(formula.bonus_sources || []), '+5 from offensive posture'];
                    formula.bonuses = [...(formula.bonuses || []), { label: 'offensive posture', amount: 5 }];
                }
                // Pre-roll "Extra bonus" GM grant. Folds into the
                // formula's flat + bonuses so the post-roll breakdown
                // and any subsequent damage / extra-die math uses the
                // updated total. The label has no mechanical effect -
                // it's surfaced verbatim in the breakdown.
                const _atkExtraBonus = this._atkExtraBonusFlat();
                if (this.atkExtraBonusEnabled && _atkExtraBonus !== 0) {
                    const _atkExtraLabel = (this.atkExtraBonusLabel || '').trim() || 'extra bonus';
                    formula.flat = (formula.flat || 0) + _atkExtraBonus;
                    const _sign = _atkExtraBonus >= 0 ? '+' : '';
                    formula.bonus_sources = [...(formula.bonus_sources || []),
                        `${_sign}${_atkExtraBonus} from ${_atkExtraLabel}`];
                    formula.bonuses = [...(formula.bonuses || []), {
                        label: _atkExtraLabel,
                        amount: _atkExtraBonus,
                    }];
                }
                // Mantis Wave-Treader 5th Dan: per-round accumulator of +N to
                // attack where N is the count of offensive postures declared.
                if (this.schoolAbilities.mantis_posture_accumulation) {
                    const _mantisAtkAcc = window._trackingBridge?.offensivePhaseCount?.() || 0;
                    if (_mantisAtkAcc > 0) {
                        formula.flat = (formula.flat || 0) + _mantisAtkAcc;
                        const _lbl = `+${_mantisAtkAcc} from Mantis 5th Dan (offensive posture count)`;
                        formula.bonus_sources = [...(formula.bonus_sources || []), _lbl];
                        formula.bonuses = [...(formula.bonuses || []), {
                            label: 'Mantis 5th Dan (offensive posture count)',
                            amount: _mantisAtkAcc,
                        }];
                    }
                }
                // Mantis Wave-Treader 3rd Dan offensive: per-round accumulator
                // set via the attack-result-modal button (spend one action
                // die for +X). Applies to all subsequent attack and damage.
                if (this.schoolAbilities.mantis_3rd_dan_offensive) {
                    const _mantis3rd = window._trackingBridge?.offensive3rdDanAccum || 0;
                    if (_mantis3rd > 0) {
                        formula.flat = (formula.flat || 0) + _mantis3rd;
                        const _lbl = `+${_mantis3rd} from Mantis 3rd Dan (offensive)`;
                        formula.bonus_sources = [...(formula.bonus_sources || []), _lbl];
                        formula.bonuses = [...(formula.bonuses || []), {
                            label: 'Mantis 3rd Dan (offensive)',
                            amount: _mantis3rd,
                        }];
                    }
                }

                // Isawa Duelist 3rd Dan: auto-apply TN trade bonus (user can undo post-roll)
                this.atkIsawaTnTrade = false;
                if (this.schoolAbilities.isawa_tn_trade) {
                    formula.flat += this.schoolAbilities.isawa_tn_trade_bonus || 0;
                    formula.isawa_tn_trade = true;
                    this.atkIsawaTnTrade = true;
                }

                // Doji Artisan 5th Dan: auto-apply bonus from TN
                if (formula.doji_5th_dan_always) {
                    const dojiBonus = window.L7RRollMath.bonusPer5Over10(this.atkTN);
                    if (dojiBonus > 0) {
                        formula.flat += dojiBonus;
                        formula.doji_5th_dan_bonus = dojiBonus;
                    }
                }

                // Doji Artisan 4th Dan: if the player ticked "target has not
                // attacked me this round", add the chosen phase as a flat
                // bonus and stamp it onto the formula for the post-roll
                // breakdown.
                if (formula.doji_4th_dan_untouched_target && this.atkDojiUntouchedTarget) {
                    const phase = parseInt(this.atkDojiPhase, 10) || 0;
                    if (phase > 0) {
                        formula.flat += phase;
                        formula.doji_4th_dan_bonus = phase;
                        formula.doji_4th_dan_phase = phase;
                    }
                }

                // Attack Specialization: +10 per checked spec, plus the
                // matching sub-domain texts for the post-roll breakdown.
                {
                    const appliedTexts = [];
                    for (let i = 0; i < (this.atkSpecApplies || []).length; i++) {
                        if (!this.atkSpecApplies[i]) continue;
                        const s = this.attackSpecs[i];
                        if (!s) continue;
                        appliedTexts.push(s.text || 'unspecified');
                    }
                    if (appliedTexts.length > 0) {
                        const bonus = 10 * appliedTexts.length;
                        formula.flat += bonus;
                        formula.attack_spec_bonus = bonus;
                        formula.attack_spec_applied_texts = appliedTexts;
                    }
                }

                // Shinjo Bushi Special Ability: snapshot the phase bonus onto
                // the formula so the post-roll breakdown can label it. The
                // die-value snapshot is taken BEFORE _autoSpendActionDie ran
                // (via this._actionDieSpentIndex, populated above) since that
                // flipped ``spent`` on the chosen die.
                if (formula.shinjo_phase_bonus_attack
                        && this.schoolAbilities.shinjo_phase_bonus) {
                    const idx = this._actionDieSpentIndex;
                    const t = window._trackingBridge;
                    const spentDie = (idx != null && idx >= 0 && t)
                        ? (t.actionDice || [])[idx] : null;
                    const phase = parseInt(this.atkShinjoPhase, 10) || 0;
                    const heldFor = spentDie
                        ? Math.max(0, phase - (spentDie.value || 0)) : 0;
                    const bonus = 2 * heldFor;
                    if (bonus > 0) {
                        formula.flat += bonus;
                        formula.shinjo_phase_bonus = bonus;
                        formula.shinjo_phase_bonus_phase = phase;
                        formula.shinjo_phase_bonus_die_value = spentDie?.value || 0;
                    }
                }

                // Kakita Duelist 3rd Dan: stamp defender-phase bonus onto
                // the formula. Attacker phase comes from the forced override
                // (Phase-0 interrupt = 0) if set, else the spent die's value.
                if (formula.kakita_3rd_dan_defender_phase_bonus) {
                    const x = this.schoolAbilities.kakita_3rd_dan_defender_phase_bonus_x || 0;
                    let attackerPhase = null;
                    if (this.atkForceAttackerPhase !== null
                            && this.atkForceAttackerPhase !== undefined) {
                        attackerPhase = this.atkForceAttackerPhase;
                    } else {
                        const idx = this._actionDieSpentIndex;
                        const t = window._trackingBridge;
                        const spentDie = (idx != null && idx >= 0 && t)
                            ? (t.actionDice || [])[idx] : null;
                        if (spentDie) attackerPhase = spentDie.value || 0;
                    }
                    if (x > 0 && attackerPhase !== null) {
                        const defenderPhase = parseInt(this.atkKakitaDefenderPhase, 10);
                        const phases = Number.isFinite(defenderPhase)
                            ? Math.max(0, defenderPhase - attackerPhase) : 0;
                        const bonus = x * phases;
                        if (bonus > 0) {
                            formula.flat += bonus;
                            formula.kakita_3rd_dan_bonus = bonus;
                            formula.kakita_3rd_dan_attacker_phase = attackerPhase;
                            formula.kakita_3rd_dan_defender_phase = defenderPhase;
                            formula.kakita_3rd_dan_x = x;
                        }
                    }
                }

                // Bayushi 4th Dan: feint raises are now discretionary (applied post-roll via buttons)
                let _bankedConsumed = false;
                this.bayushiRaisesSpentThisRoll = 0;

                // Hiruma 3rd Dan: auto-apply all banked post-parry bonuses
                if (this.hirumaBankedAttackBonus > 0) {
                    formula.flat += this.hirumaBankedAttackBonus;
                    formula.hiruma_parry_bonus = this.hirumaBankedAttackBonus;
                    this.hirumaBankedAttackBonus = 0;
                    if (window._trackingBridge) window._trackingBridge.hirumaBankedAttackBonus = 0;
                    _bankedConsumed = true;
                }

                // Akodo 3rd Dan: reset per-roll spend tracking (bonuses are applied post-roll via buttons)
                this.akodoSpentThisRoll = 0;

                // Ide Special: apply banked TN reduction
                if (this.ideBankedTnReduce > 0) {
                    formula.ide_tn_reduce = this.ideBankedTnReduce;
                    this.ideBankedTnReduce = 0;
                    _bankedConsumed = true;
                }
                if (_bankedConsumed) window._trackingBridge?.saveBankedBonuses();

                if (voidCount > 0) {
                    formula.rolled += voidCount;
                    formula.kept += voidCount;
                    formula.void_spent = voidCount;
                    const _cap = window.L7RRollMath.applyDiceCap(formula.rolled, formula.kept, formula.flat);
                    formula.rolled = _cap.rolled; formula.kept = _cap.kept; formula.flat = _cap.flat;
                    if (_cap.overflowFlat > 0) formula.void_overflow_bonus = _cap.overflowFlat;
                    // Mirumoto 5th Dan: +10 per VP on combat rolls
                    const combatBonus = this.voidSpendConfig.combat_vp_flat_bonus || 0;
                    if (combatBonus > 0) {
                        formula.flat += voidCount * combatBonus;
                    }
                    const options = this.computeVoidOptions();
                    if (options[voidCount - 1]) this.deductVoidPoints(options[voidCount - 1]);
                }

                this.atkPhase = 'rolling';
                this.formula = formula;
                // Store the modified formula so damage calculation can see bonuses (e.g. hiruma_parry_bonus)
                this.atkFormula = formula;

                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    formula.rolled, formula.reroll_tens,
                    this.prefs.dice_animation_enabled, playSound, 'dice-animation-atk'
                );

                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(formula.kept, sorted.length);
                const keptIdx = new Set(sorted.slice(sorted.length - keptCount).map((d, i) => sorted.length - keptCount + i));
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.unkeptDice = sorted.filter((_, i) => i < sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum + formula.flat;

                // Shosuro Actor 5th Dan: add sum of lowest 3 dice (post-roll)
                this.shosuroLowest3Bonus = 0;
                if (formula.shosuro_5th_dan) {
                    const allValues = sorted.map(d => d.value);
                    const lowest3 = allValues.slice(0, Math.min(3, allValues.length));
                    this.shosuroLowest3Bonus = lowest3.reduce((s, v) => s + v, 0);
                    this.baseTotal += this.shosuroLowest3Bonus;
                }

                // Conviction: carry forward any points already spent.
                if (this.convictionSpentThisRoll > 0) {
                    this.baseTotal += this.convictionSpentThisRoll;
                }
                // Priest 5th Dan ally conviction persists across rerolls.
                this.baseTotal += this.totalPriestAllySpentThisRoll();

                this.atkRollTotal = this.baseTotal;
                this.atkRaisesSpent = 0;
                this.atkConvictionSpent = 0;
                this.atkFailedParry = false;

                const ideTnReduce = formula.ide_tn_reduce || 0;
                const effectiveTN = Math.max(0, this.atkEffectiveTN() - ideTnReduce);
                const excess = this.atkRollTotal - effectiveTN;
                this.atkHit = excess >= 0;
                this.atkNearMiss = false;
                // Matsu 4th Dan: miss by <20 on double attack = hit with no extra damage
                if (!this.atkHit && this.schoolAbilities.matsu_near_miss
                    && formula.attack_variant === 'double_attack' && excess >= -19) {
                    this.atkHit = true;
                    this.atkNearMiss = true;
                }
                this.atkExcess = excess;
                // For double attack, extra damage dice based on excess over BASE TN
                const excessForDamage = this.atkIsDoubleAttack()
                    ? this.atkRollTotal - this.atkTN : excess;
                this.atkExtraDice = this.atkHit && !this.atkNearMiss ? window.L7RRollMath.excessToExtraDice(excessForDamage) : 0;

                // Hida 5th Dan: bank counterattack excess for wound check bonus
                if (this.schoolAbilities.hida_counterattack_wc_bonus
                    && this.atkHit && formula.attack_variant === 'counterattack' && excess > 0) {
                    this.hidaBankedWcBonus += excess;
                    if (window._trackingBridge) window._trackingBridge.hidaBankedWcBonus = this.hidaBankedWcBonus;
                    window._trackingBridge?.saveBankedBonuses();
                }

                // Hida 3rd Dan: offer dice reroll
                this.hidaRerollPhase = '';
                if (this.schoolAbilities.hida_reroll) {
                    const isCounter = formula.attack_variant === 'counterattack';
                    const isImpaired = !formula.reroll_tens;
                    this.hidaRerollMax = window.L7RRollMath.hidaRerollMax(this.schoolAbilities.hida_reroll_x, isCounter, isImpaired);
                    // Pre-select lowest dice (any, not just kept) with value <= 7
                    const allDiceIdx = this.finalDice.map((d, i) => ({ ...d, idx: i }));
                    allDiceIdx.sort((a, b) => a.value - b.value);
                    this.hidaRerollSelections = allDiceIdx
                        .filter(d => d.value <= 7)
                        .slice(0, this.hidaRerollMax)
                        .map(d => d.idx);
                    this.hidaRerollPhase = 'selecting';
                }

                this.atkPhase = 'result';
                // Annotate the auto-spent action die with this attack's result.
                this._annotateSpentActionDie(this._describeAttackForDie(false));
                this._prerenderRollImage(this._buildAttackImagePayload());
                this._saveRollHistoryCreate();
            },

            atkSpendRaise() {
                const f = this.atkFormula;
                const max = f?.adventure_raises_max_per_roll || 0;
                if (this.atkRaisesSpent >= max) return;
                const t = window._trackingBridge;
                const used = t?.getCount?.('adventure_raises') || 0;
                const avail = Math.max(0, (this.advRaisesConfig.available || 0) - used);
                if (this.atkRaisesSpent >= avail) return;
                this.atkRaisesSpent++;
                this.baseTotal += 5;
                this.atkRollTotal += 5;
                if (t?.setCount) t.setCount('adventure_raises', used + 1);
                this._atkUpdateHitState();
            },

            atkUndoRaise() {
                if (this.atkRaisesSpent <= 0) return;
                const t = window._trackingBridge;
                const used = t?.getCount?.('adventure_raises') || 0;
                this.atkRaisesSpent--;
                this.baseTotal -= 5;
                this.atkRollTotal -= 5;
                if (t?.setCount) t.setCount('adventure_raises', Math.max(0, used - 1));
                this._atkUpdateHitState();
            },

            // Togashi 3rd Dan daily-athletics-raise spend from the attack
            // modal. Mirrors spendTogashiRaise() but also updates atkRollTotal
            // and re-evaluates hit/miss state so the HIT block can switch
            // from MISS to HIT when the added +5 closes the gap.
            atkSpendTogashiRaise() {
                if (!this.canSpendTogashiRaise()) return;
                this.togashiRaisesSpentThisRoll++;
                this.baseTotal += 5;
                this.atkRollTotal += 5;
                const t = window._trackingBridge;
                if (t) {
                    t.setCount('togashi_daily_athletics_raises',
                        (t.getCount('togashi_daily_athletics_raises') || 0) + 1);
                }
                this._atkUpdateHitState();
            },

            atkUndoTogashiRaise() {
                if (this.togashiRaisesSpentThisRoll <= 0) return;
                this.togashiRaisesSpentThisRoll--;
                this.baseTotal -= 5;
                this.atkRollTotal -= 5;
                const t = window._trackingBridge;
                if (t) {
                    t.setCount('togashi_daily_athletics_raises',
                        Math.max(0, (t.getCount('togashi_daily_athletics_raises') || 0) - 1));
                }
                this._atkUpdateHitState();
            },

            _atkUpdateHitState() {
                const effectiveTN = this.atkEffectiveTN();
                const excess = this.atkRollTotal - effectiveTN;
                this.atkHit = excess >= 0;
                this.atkNearMiss = false;
                if (!this.atkHit && this.schoolAbilities.matsu_near_miss
                    && this.atkIsDoubleAttack() && excess >= -19) {
                    this.atkHit = true;
                    this.atkNearMiss = true;
                }
                this.atkExcess = excess;
                const excessForDamage = this.atkIsDoubleAttack()
                    ? this.atkRollTotal - this.atkTN : excess;
                this.atkExtraDice = this.atkHit && !this.atkNearMiss ? window.L7RRollMath.excessToExtraDice(excessForDamage) : 0;
            },

            atkCurrentDamage() {
                const f = this.atkFormula;
                if (!f || !this.atkHit) return null;
                const isLunge = f.attack_variant === 'lunge';
                const isDA = f.attack_variant === 'double_attack';
                return this.atkComputeDamage(
                    this.atkExtraDice, isLunge,
                    this.atkFailedParry, this.atkParrySkill, isDA
                );
            },

            async rollDamage() {
                const f = this.atkFormula;
                if (!f || !this.atkHit) return;
                // Damage is a separate roll from the attack; Conviction points
                // spent on the attack do not carry over.
                this.convictionSpentThisRoll = 0;
                this.togashiRaisesSpentThisRoll = 0;
                this.priestAllySpentThisRoll = {};
                this.preceptsPoolSwapBonuses = [];
                const isLunge = f.attack_variant === 'lunge';
                const isDA = f.attack_variant === 'double_attack';
                const trade = this.atkOtakuTradeDice ? 10 : 0;
                const dmg = this.atkComputeDamage(
                    this.atkExtraDice, isLunge,
                    this.atkFailedParry, this.atkParrySkill, isDA, trade
                );
                if (!dmg) return;
                const { rolled, kept, flat } = dmg;
                this.atkPhase = 'damage-rolling';
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    rolled, true, // damage always rerolls 10s
                    this.prefs.dice_animation_enabled, playSound, 'dice-animation-atk'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                // Shosuro 5th Dan: add sum of lowest 3 dice to damage (post-roll)
                this.atkDamageShosuroBonus = 0;
                if (dmg.shosuro_5th_dan) {
                    const allValues = sorted.map(d => d.value);
                    const lowest3 = allValues.slice(0, Math.min(3, allValues.length));
                    this.atkDamageShosuroBonus = lowest3.reduce((s, v) => s + v, 0);
                }
                this.atkDamageTotal = this.keptSum + flat + this.atkDamageShosuroBonus + this.convictionSpentThisRoll + this.totalPriestAllySpentThisRoll();
                this.atkDamageRolled = rolled;
                this.atkDamageKept = kept;
                this.atkDamageFlat = flat;
                this.atkDamageParts = dmg.parts || [];
                this.atkDamageConvictionSpent = 0;
                this.atkPhase = 'damage-result';
                // Now that damage is rolled, refresh the action die's tooltip
                // so it includes the damage total.
                this._annotateSpentActionDie(this._describeAttackForDie(true));
                this._prerenderRollImage(this._buildAttackDamageImagePayload());
                this._saveRollHistoryCreate();
            },

            // --- Wound Check ---

            openWoundCheckModal(amountOverride) {
                const t = window._trackingBridge;
                if (!t) return;
                // For non-editors the LW + flow passes the entered amount
                // via event detail so the WC roll runs against that value
                // without mutating the bridge's lightWounds (which would
                // otherwise change the sheet's displayed count). Editors
                // pass undefined and we read t.lightWounds directly.
                const lw = (typeof amountOverride === 'number' && amountOverride > 0)
                    ? amountOverride : t.lightWounds;
                if (lw <= 0) return;
                try {
                    this.wcProbs = JSON.parse(document.getElementById('wound-check-probs')?.textContent || '{}');
                } catch (e) { this.wcProbs = {}; }
                const formula = this.formulas['wound_check'];
                this.wcLightWounds = lw;
                this.wcVoidSelected = 0;
                this.wcDaidojiCounterattack = false;
                this.wcIsStrike = false;
                this.wcPhase = 'pre';
                // Reset the copy-as-image state so a previous roll's
                // blob can't be pasted under this one's Copy button.
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                this.wcRaisesSpent = 0;
                this.wcResultApplied = false;
                // Reset Kitsune Warden Special Ability swap on each open.
                this.wcKitsuneSwap = false;
                this.wcMaxRaisesPerRoll = formula?.adventure_raises_max_per_roll || 0;
                const raisesUsed = t.getCount ? t.getCount('adventure_raises') : 0;
                const raisesAvail = Math.max(0, (this.advRaisesConfig.available || 0) - raisesUsed);
                this.wcPostRollVpSpent = 0;
                this.wcPostRollVpSources = [];
                this.wcMatsuBonusApplied = 0;
                const hasPostRollVp = this.voidSpendConfig.wc_vp_free_raise && (window._trackingBridge?.anyVPAvailable?.() || 0) > 0;
                this.wcExcessSpentThisRoll = 0;
                const hasUnspentWcExcess = (this.bankedWcExcess || []).some(b => !b.spent);
                const hasUnspentMatsu = (this.matsuBankedWcBonuses || []).some(b => !b.spent);
                const hasConviction = (this.convictionConfig.rank || 0) > 0 && this.convictionPoolAvail() > 0;
                const hasPriestAlly = (this.priestAllies || []).some(p => this.priestAllyPoolAvail(p) > 0);
                const hasPreceptsPool = this.preceptsPoolAlliesForThisRoll('wc').length > 0;
                this.wcHasDiscretionary = (this.wcMaxRaisesPerRoll > 0 && raisesAvail > 0) || hasUnspentMatsu || hasUnspentWcExcess || hasPostRollVp || hasConviction || hasPriestAlly || hasPreceptsPool;
                this.wcModalOpen = true;
            },

            wcProbRow(voidCount) {
                // Compute probability breakdown for a given void spend.
                // The Kitsune Warden Special Ability swap (when checked)
                // routes the lookup through wcProbs.kitsune_swap which has
                // a parallel set of probs/void_keys precomputed from the
                // school-ring baseline. Iaijutsu strikes don't accept the
                // swap (no kitsune_swap key in the formula) so the swap
                // path silently no-ops there.
                const p = this.wcProbs;
                if (!p || !p.probs) return null;
                const useSwap = this.wcKitsuneSwap && p.kitsune_swap && !this.wcIsStrike;
                const probsTable = useSwap ? p.kitsune_swap.probs : (this.wcIsStrike ? p.probs_no_reroll : p.probs);
                const voidKeys = useSwap ? p.kitsune_swap.void_keys : p.void_keys;
                const key = this.wcIsStrike ? p.void_keys?.['0'] : voidKeys?.[String(voidCount)];
                if (!key || !probsTable?.[key]) return null;
                const probs = probsTable[key];
                const daidojiBonus = this.wcDaidojiCounterattack && this.daidojiCounterattackData
                    ? this.daidojiCounterattackData.bonus : 0;
                const vpFlat = voidCount * (this.voidSpendConfig.combat_vp_flat_bonus || 0);
                const wcVpRaise = this.voidSpendConfig.wc_vp_free_raise ? voidCount * 5 : 0;
                const dojiBonus = this.formulas['wound_check']?.doji_5th_dan_wc
                    ? window.L7RRollMath.bonusPer5Over10(this.wcLightWounds) : 0;
                const shosuroFlat = this.wcIsStrike
                    ? (p.shosuro_flats_no_reroll?.[key] || 0)
                    : (p.shosuro_flats?.[key] || 0);
                // Mantis Wave-Treader: defensive posture (+5) plus 5th Dan
                // defensive-posture-count accumulator (+N) feed the WC flat.
                const postureFlat = this._mantisLiveWcFlat();
                const flat = (p.flat || 0) + daidojiBonus + vpFlat + wcVpRaise + dojiBonus + shosuroFlat + postureFlat;
                const lw = this.wcLightWounds;
                const target = Math.max(0, lw - flat);

                // Pass chance is always based on actual LW
                const passChance = target < probs.length ? probs[target] : 0;

                // Bayushi 5th Dan: SW distribution uses halved LW
                const halfLw = this.formulas['wound_check']?.bayushi_5th_dan_half_lw;
                const effectiveLw = halfLw ? Math.floor(lw / 2) : lw;
                const effectiveTarget = Math.max(0, effectiveLw - flat);

                const rows = [];
                let maxSW = window.L7RRollMath.woundCheckMaxSeriousWounds(effectiveLw);
                for (let sw = 1; sw <= maxSW; sw++) {
                    // For SW calculation: a roll that fails the real check but exceeds the
                    // effective target gives 1 SW. Rolls below effective target give more SW.
                    const failLo = Math.max(0, effectiveTarget - sw * 10);
                    const failHi = Math.max(0, effectiveTarget - (sw - 1) * 10);
                    const pGeLo = failLo < probs.length ? probs[failLo] : 0;
                    const pGeHi = failHi < probs.length ? probs[failHi] : 0;
                    let chance = pGeLo - pGeHi;
                    // For SW=1 with Bayushi: also include rolls between effectiveTarget and target
                    // (rolls that fail the actual check but exceed the halved target)
                    if (sw === 1 && halfLw && effectiveTarget < target) {
                        const pGeEffTarget = effectiveTarget < probs.length ? probs[effectiveTarget] : 0;
                        const pGeTarget = target < probs.length ? probs[target] : 0;
                        chance += pGeEffTarget - pGeTarget;
                    }
                    if (chance > 0.0005) rows.push({ sw, chance });
                }

                // Expected serious wounds
                let expectedSW = 0;
                for (const r of rows) expectedSW += r.sw * r.chance;

                return { passChance, rows, expectedSW };
            },

            async rollWoundCheck() {
                const voidCount = this.wcIsStrike ? 0 : this.wcVoidSelected;
                const formula = { ...this.formulas['wound_check'] };
                // Kitsune Warden Special Ability: swap the WC ring (Water)
                // for the school ring when the modal checkbox is checked.
                // Iaijutsu strikes (wcIsStrike) bypass this - the formula
                // builder doesn't attach kitsune_swap on iaijutsu paths.
                if (this.wcKitsuneSwap && formula.kitsune_swap && !this.wcIsStrike) {
                    formula.rolled = formula.kitsune_swap.rolled;
                    formula.kept = formula.kitsune_swap.kept;
                    formula.label = formula.kitsune_swap.label;
