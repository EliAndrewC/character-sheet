                if (this.schoolAbilities.shosuro_add_lowest_3 && !isInit) {
                    const allValues = sortedAsc.map(d => d.value);
                    const lowest3 = allValues.slice(0, Math.min(3, allValues.length));
                    this.shosuroLowest3Bonus = lowest3.reduce((s, v) => s + v, 0);
                    this.baseTotal += this.shosuroLowest3Bonus;
                }

                // Conviction: carry forward any points already spent (they
                // persist across rerolls, including Togashi/Lucky).
                if (!isInit && this.convictionSpentThisRoll > 0) {
                    this.baseTotal += this.convictionSpentThisRoll;
                }
                // Priest 5th Dan ally conviction: also persists across rerolls.
                if (!isInit) {
                    this.baseTotal += this.totalPriestAllySpentThisRoll();
                }
            },

            // ``opts.skipImageRender`` and ``opts.skipHistoryCreate``: used
            // by ``useLucky`` so a generic-roll reroll patches the existing
            // history row + re-prerenders the image AFTER the auto-use-
            // higher resolve has restored the original dice (if it won),
            // instead of saving a second row and pasting an outdated image.
            async runRoll(opts) {
                opts = opts || {};
                this.phase = 'rolling';
                this.finalDice = [];
                this.unkeptDice = [];
                this.keptDice = [];
                this.baseTotal = 0;
                this.keptSum = 0;

                const { rolled, kept, flat, reroll_tens } = this.formula;
                // Sound is played once per round from inside rollAndAnimate so
                // each reroll wave gets its own sound.
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n)
                    : null;
                const isInit = this.formula.is_initiative;
                // Overlap the Copy-as-image render with the dice animation.
                // The dice are final the instant they're generated (the
                // animation is cosmetic), so ``onDiceReady`` - fired by
                // rollAndAnimate before its ~3.2s of sleeps - lets us
                // compute the result and kick off the PNG pre-render in
                // parallel with the animation, so the image is ready by the
                // time the result panel appears. Initiative builds a
                // different (action-dice) panel with extra interleaved
                // animation, so it stays on the post-animation path below;
                // ``skipImageRender`` (Lucky reroll) opts out entirely.
                this._earlyRendered = false;
                const onDiceReady = (diceEarly) => {
                    if (isInit || opts.skipImageRender) return;
                    this._computeResultState(diceEarly, kept, flat);
                    this._prerenderRollImage(this._buildRollImagePayload());
                    this._earlyRendered = true;
                };
                const dice = await window.L7RDice.rollAndAnimate(
                    rolled, reroll_tens, this.prefs.dice_animation_enabled,
                    playSound, undefined, onDiceReady
                );
                // Compute the result state if onDiceReady didn't (initiative,
                // skipImageRender, or the no-animation path where there's
                // nothing to overlap). Idempotent on the same dice.
                if (!this._earlyRendered) {
                    this._computeResultState(dice, kept, flat);
                }

                // Initiative: compute action dice with school effects
                this.actionDice = [];
                if (isInit) {
                    let actions = this.keptDice.map(d => d.value).sort((a, b) => a - b);
                    // Hiruma 4th Dan: lower all action dice by 2 (min 1)
                    if (this.formula.hiruma_4th_dan) {
                        actions = actions.map(v => Math.max(1, v - 2));
                    }
                    // Shinjo 4th Dan: highest action die set to 1
                    if (this.formula.shinjo_4th_dan && actions.length > 0) {
                        actions[actions.length - 1] = 1;
                    }
                    // Kakita: 10s become Phase 0
                    if (this.formula.kakita_phase_zero) {
                        actions = actions.map(v => v === 10 ? 0 : v);
                    }
                    actions.sort((a, b) => a - b);
                    // Togashi Ise Zumi all-athletics variant: every action die
                    // is restricted to athletics actions, so flag each one so
                    // it renders in blue and its per-die menu offers only the
                    // athletics variants.
                    const allAthletics = !!this.formula.togashi_athletics_only;
                    const dice = actions.map(v => allAthletics
                        ? {value: v, athletics_only: true}
                        : {value: v});

                    // Togashi Ise Zumi normal variant: roll one additional
                    // standalone athletics-only action die alongside the
                    // main initiative roll (same animation area so players
                    // see it appear after the main dice settle). The extra
                    // die is flagged so it renders distinctly in the Actions
                    // tracker and is skipped by the non-athletics auto-spend.
                    if (this.formula.togashi_athletics_extra_die) {
                        const athDice = await window.L7RDice.rollAndAnimate(
                            1, false, this.prefs.dice_animation_enabled, playSound
                        );
                        const athV = athDice[0]?.value || 0;
                        if (athV > 0) dice.push({value: athV, athletics_only: true});
                    }

                    // Mantis Wave-Treader 4th Dan: append a deterministic
                    // value-1 die restricted to movement / athletics / the
                    // Mantis 3rd Dan technique. Not rolled - always 1.
                    // Reuses the `athletics_only` auto-spend skip; the
                    // `mantis_4th_dan` flag picks the right tooltip.
                    if (this.formula.mantis_4th_dan_athletics_die) {
                        dice.push({
                            value: 1,
                            athletics_only: true,
                            mantis_4th_dan: true,
                        });
                    }

                    this.actionDice = dice;
                    // Persist the rolled action dice to the Tracking section
                    // so they're visible (and spendable) until Clear is clicked
                    // or the next initiative roll replaces them.
                    if (window._trackingBridge) {
                        window._trackingBridge.setActionDice(this.actionDice);
                    }
                }

                // Post-roll school ability hooks (non-initiative only)
                // Guard: only fire once per roll (prevents double-grant if runRoll is called twice)
                if (!isInit && !this._postRollHooksFired) {
                    this._postRollHooksFired = true;
                    const t = window._trackingBridge;
                    const key = this.currentRollKey;
                    // Mirumoto Special: gain 1 temp VP after any parry roll
                    // (editor-only: a non-editor walking through the parry
                    // sees the roll compute, but the auto-grant doesn't
                    // touch the displayed VP count).
                    if (key === 'parry' && this.schoolAbilities.mirumoto_temp_vp_on_parry && t && t.canEdit) {
                        t.tempVoidPoints += 1;
                        t.save();
                    }
                    // Shinjo 5th Dan: bank parry excess for future wound check
                    if (key === 'parry' && this.schoolAbilities.shinjo_bank_parry_excess) {
                        // Parry TN is not tracked, so this banked bonus is informational.
                        // Player enters the excess manually or we show a prompt.
                        // For now we store roll total so it can be used.
                    }
                    // Shinjo Bushi 3rd Dan: after a parry, decrement every
                    // remaining unspent action die by X (attack skill). The
                    // reduced value feeds the Special Ability's phases-held
                    // math on later rolls this round.
                    if ((key === 'parry' || key === 'athletics:parry')
                            && this.schoolAbilities.shinjo_3rd_dan_parry_decrement > 0
                            && t && t.canEdit) {
                        const dec = this.schoolAbilities.shinjo_3rd_dan_parry_decrement;
                        (t.actionDice || []).forEach(d => {
                            if (!d.spent) d.value = (d.value || 0) - dec;
                        });
                        t.save();
                    }
                    // Hiruma 3rd Dan: bank 2*attack for next attack and damage after parry (stacks)
                    if (key === 'parry' && this.schoolAbilities.hiruma_post_parry_bonus && t?.canEdit) {
                        this.hirumaBankedAttackBonus += this.schoolAbilities.hiruma_post_parry_amount || 0;
                        if (t) t.hirumaBankedAttackBonus = this.hirumaBankedAttackBonus;
                        t?.saveBankedBonuses();
                    }
                    // Akodo Special: feint roll triggers temp VP (success/failure decided by user)
                    // Ide Special: feint triggers TN reduction
                    // These are handled in the result display via buttons (see template below)
                    // Non-Akodo feint schools: auto-grant 1 temp VP on feint
                    if (key === 'knack:feint' && this.schoolAbilities.feint_temp_vp && t && t.canEdit) {
                        t.tempVoidPoints += 1;
                        t.save();
                    }
                    // Bayushi 4th Dan: auto-bank +5 for a future attack after feint
                    if (this.schoolAbilities.bayushi_post_feint_raise && t?.canEdit) {
                        this.bayushiBankedFeintRaise += 5;
                        if (t) t.bayushiBankedFeintRaise = this.bayushiBankedFeintRaise;
                        t?.saveBankedBonuses();
                    }

                    // If this roll auto-spent an action die (parry/feint),
                    // annotate it with the result so the die's tooltip shows
                    // what action was taken and what happened.
                    if (this._actionDieSpentIndex != null && this._actionDieSpentIndex >= 0) {
                        if (key === 'parry' || key === 'athletics:parry') {
                            this._annotateSpentActionDie(this._describeParryForDie(key));
                        } else if (key === 'knack:feint' || (key && key.startsWith('knack:feint:'))) {
                            this._annotateSpentActionDie(this._describeFeintForDie(key));
                        }
                        this._actionDieSpentIndex = -1;
                    }
                }

                this.phase = 'done';
                // Pre-render the "copy as image" PNG so the Copy button
                // on the result panel can write to the clipboard
                // synchronously inside the user-gesture handler.
                // Initiative renders an action-dice panel rather than
                // a keep/drop result, so it uses a separate builder.
                // Skipped when the non-initiative early path already
                // kicked off the render during the animation
                // (``_earlyRendered``).
                if (!opts.skipImageRender && !this._earlyRendered) {
                    this._prerenderRollImage(
                        this.formula && this.formula.is_initiative
                            ? this._buildInitiativeImagePayload()
                            : this._buildRollImagePayload()
                    );
                }
                // Persist the roll to the character's Roll History (the
                // server gates on the owner/non-admin-editor rule; non-
                // recording cases get 204 and _rollHistoryId stays null).
                if (!opts.skipHistoryCreate) {
                    this._saveRollHistoryCreate();
                }
            },

            // Copy-as-image: build the payload, post it to the server's
            // SVG-to-PNG renderer, hold the resulting Blob so a later
            // click on the Copy button can paste it to the clipboard
            // inside a real user-gesture handler (Safari requires the
            // Blob to already be resolved when ``clipboard.write`` is
            // called - hence pre-rendering rather than fetching on
            // click).
            // Context-only bullets that aren't flat numeric "bonuses" but
            // belong in the result modal's breakdown. Mirrors the x-show'd
            // <div> rows in the live result modals.
            //
            // ``formula`` provides the formula-derived bullets (VP spent,
            // OW spent, overflow, combat-VP bonus). Damage rolls do NOT
            // accept VP/OW/etc, so pass an empty formula (``{}``) for the
            // damage builder - the attack's VP would otherwise leak into
            // the damage row's breakdown.
            //
            // The dice-card SVG renderer ignores this field; only the
            // readonly Roll History modal reads it.
            _extraBonusBullets(formula) {
                const f = formula || this.formula || {};
                const extras = [];
                const v = f.void_spent || 0;
                if (v > 0) {
                    extras.push(
                        'Rolled +' + v + 'k' + v + ' from ' + v
                        + ' spent void point' + (v > 1 ? 's' : '')
                    );
                }
                const ow = f.ow_spent || 0;
                if (ow > 0) {
                    extras.push('Skill raised by ' + ow + ' by Otherworldliness');
                }
                const combatVp = (this.voidSpendConfig || {}).combat_vp_flat_bonus || 0;
                if (v > 0 && combatVp > 0) {
                    extras.push(
                        '+' + (v * combatVp) + ' from 5th Dan (+'
                        + combatVp + ' per VP on combat rolls)'
                    );
                }
                if ((f.void_overflow_bonus || 0) > 0) {
                    extras.push(
                        '+' + f.void_overflow_bonus
                        + ' from rolling above 10k10 (+2 per extra die above 10)'
                    );
                }
                if (f.merchant_5th_dan_used) {
                    const m = f.merchant_5th_dan_bonus || 0;
                    extras.push(
                        ((m >= 0 ? '+' : '') + m)
                        + ' from Merchant 5th Dan reroll'
                    );
                }
                if ((this.shosuroLowest3Bonus || 0) > 0) {
                    extras.push(
                        '+' + this.shosuroLowest3Bonus
                        + ' from 5th Dan (lowest 3 dice added to result)'
                    );
                }
                if ((this.mirumotoPointsSpentThisRoll || 0) > 0) {
                    const n = this.mirumotoPointsSpentThisRoll;
                    extras.push(
                        '+' + (n * 2) + ' from ' + n + ' 3rd Dan point'
                        + (n > 1 ? 's' : '')
                    );
                }
                if ((this.convictionSpentThisRoll || 0) > 0) {
                    const n = this.convictionSpentThisRoll;
                    extras.push(
                        '+' + n + ' from ' + n + ' Conviction point'
                        + (n > 1 ? 's' : '')
                    );
                }
                if ((this.togashiRaisesSpentThisRoll || 0) > 0) {
                    const n = this.togashiRaisesSpentThisRoll;
                    extras.push(
                        '+' + (n * 5) + ' from ' + n
                        + ' Togashi daily athletics raise' + (n > 1 ? 's' : '')
                    );
                }
                if (this.luckyUsedThisRoll) {
                    extras.push('Lucky reroll used');
                }
                if (this.togashiRerollUsed) {
                    extras.push('Togashi reroll used');
                }
                return extras;
            },

            // Damage-roll extras. Includes:
            // - ``atkDamageParts`` (pre-formatted dice-composition strings
            //   like "3k2 weapon", "+3k0 from Fire", "+4k0 extra from
            //   attack roll", "+4 flat bonus") - these explain HOW the
            //   damage roll's XkY formula was assembled. The live damage
            //   modal renders them as bullets just below the kept-sum.
            // - Shosuro 5th Dan damage bonus
            // - Conviction spent on the damage roll
            //
            // Damage rolls do NOT accept VP/OW/overflow - those live on
            // the preceding attack roll, not on damage.
            _damageExtraBonusBullets() {
                const extras = [];
                for (const p of (this.atkDamageParts || [])) {
                    if (p) extras.push(String(p));
                }
                if ((this.atkDamageShosuroBonus || 0) > 0) {
                    extras.push(
                        '+' + this.atkDamageShosuroBonus
                        + ' from Shosuro 5th Dan (lowest 3 dice added to damage)'
                    );
                }
                if ((this.convictionSpentThisRoll || 0) > 0) {
                    const n = this.convictionSpentThisRoll;
                    extras.push(
                        '+' + n + ' from ' + n + ' Conviction point'
                        + (n > 1 ? 's' : '')
                    );
                }
                return extras;
            },

            _buildRollImagePayload() {
                const f = this.formula || {};
                const kept = (this.keptDice || []).map(d => ({
                    parts: Array.isArray(d.parts) && d.parts.length
                        ? d.parts : [d.value],
                }));
                const dropped = (this.unkeptDice || []).map(d => ({
                    parts: Array.isArray(d.parts) && d.parts.length
                        ? d.parts : [d.value],
                }));
                const bonuses = [];
                for (const b of (f.bonuses || [])) {
                    if (b && b.amount && b.label) {
                        bonuses.push({label: b.label, amount: b.amount});
                    }
                }
                if ((this.raisesSpentThisRoll || 0) > 0) {
                    const n = this.raisesSpentThisRoll;
                    bonuses.push({
                        label: n === 1 ? 'from 1 raise spent'
                                       : 'from ' + n + ' raises spent',
                        amount: n * 5,
                    });
                }
                // Append the skill-rank parenthetical to the formula
                // subtitle so a reader can disambiguate when a 1st
                // Dan extra die has inflated the rolled count - e.g.
                // "7k3 + 5 (tact skill: 3)" makes it obvious the
                // character has Tact 3, not Tact 4. Only fires when
                // the rolled formula carries ``skill_name`` (the
                // server marks this exclusively on basic / advanced
                // skill rolls; knacks, combat, initiative don't get
                // the tag).
                let formulaText = this.formulaText || f.label || '';
                if (f.skill_name) {
                    formulaText += ' (' + f.skill_name + ' skill: '
                                 + (f.skill_rank || 0) + ')';
                }
                return {
                    title: this.title || 'Roll',
                    formula: formulaText,
                    kept: kept,
                    dropped: dropped,
                    bonuses: bonuses,
                    extras: this._extraBonusBullets(f),
                    kept_sum: this.keptSum || 0,
                    total: this.baseTotal,
                    alternatives: this._alternativesForPayload(f),
                };
            },

            // Pull formula.alternatives (e.g. "vs Wasp", "for servants
            // and the mistreated", Streetwise's bounty-hunter row) into
            // the payload the dice-card renderer expects. Each entry
            // is ``{label, extra_flat}``; we filter to entries that
            // have a label so a malformed row doesn't render a blank
            // line on the card.
            _alternativesForPayload(formula) {
                const alts = [];
                for (const a of ((formula || {}).alternatives || [])) {
                    if (!a) continue;
                    const label = (a.label || '').trim();
                    const extra = parseInt(a.extra_flat, 10);
                    if (!label || !Number.isFinite(extra) || extra === 0) continue;
                    alts.push({label: label, extra_flat: extra});
                }
                return alts;
            },

            _prerenderRollImage(payloadOrNull) {
                // Argument: an explicit payload from a modal-specific
                // builder, or omitted/null to use the dice-roller
                // default. Each modal opts in by passing its own
                // ``_buildXImagePayload()`` result; sharing the same
                // status / blob / reqId means only one roll's image
                // can be "ready" at a time (which matches the user's
                // mental model - they're in one modal at once).
                const t = window._trackingBridge;
                if (!t || !t._charId) return;
                const reqId = ++this._rollImageReqId;
                this.rollImageBlob = null;
                this.rollImageStatus = 'rendering';
                const payload = payloadOrNull || this._buildRollImagePayload();
                // Stamp the payload signature so the post-roll-mutation
                // watcher can dedupe: a re-prerender that arrives with
                // the same payload (e.g. the watcher firing once after
                // the explicit phase-transition call) hits the early
                // return in ``_maybeReprerender`` instead of spawning a
                // redundant fetch.
                this._lastPayloadSig = JSON.stringify(payload);
                fetch('/characters/' + t._charId + '/roll-image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload),
                }).then(resp => {
                    if (reqId !== this._rollImageReqId) return null;
                    if (!resp.ok) throw new Error('render failed');
                    return resp.blob();
                }).then(blob => {
                    if (blob === null) return;       // stale request
                    if (reqId !== this._rollImageReqId) return;
                    this.rollImageBlob = blob;
                    this.rollImageStatus = 'ready';
                }).catch(() => {
                    if (reqId !== this._rollImageReqId) return;
                    this.rollImageStatus = 'failed';
                });
            },

            // ------------------------------------------------------------------
            // Modal-specific payload builders for the Copy-as-image renderer.
            // Each returns the same shape the dice-card service expects:
            //   {title, formula, kept, dropped, bonuses, total, footer?}
            // Common helpers:
            //   _cellsFromDice(arr): converts {value, parts?} entries into the
            //     server's ``[{parts: [n, ...]}]`` cell list, preserving any
            //     reroll-tens chain.
            // ------------------------------------------------------------------

            _cellsFromDice(arr) {
                return (arr || []).map(d => ({
                    parts: Array.isArray(d.parts) && d.parts.length
                        ? d.parts : [d.value],
                }));
            },

            _buildInitiativeImagePayload() {
                // Initiative renders its dice as "action dice" rather
                // than the keep/drop split used elsewhere - the KEPT
                // row uses ``actionDice`` (post-school-transform: e.g.
                // Kakita 10s become 0, Hiruma 4th Dan lowers each by
                // 2, Togashi appends an athletics-only bonus die)
                // rather than the raw kept dice from the roll.
                // The DROPPED row mirrors the regular roll's
                // ``unkeptDice`` so a reader can see the discarded
                // high dice. ``show_total: false`` suppresses the
                // "TOTAL <n>" trophy at the bottom of the card -
                // initiative has no meaningful sum across action
                // dice; each die is its own standalone phase number.
                const kept = (this.actionDice || []).map(d => ({
                    parts: [d.value],
                }));
                return {
                    title: this.title || 'Initiative',
                    formula: this.formulaText || '',
                    kept: kept,
                    dropped: this._cellsFromDice(this.unkeptDice || []),
                    bonuses: [],
                    total: 0,
                    footer: 'Action dice',
                    show_total: false,
                };
            },

            _buildFreeformImagePayload() {
                const all = (this.ffFinalDice || []);
                return {
                    title: 'Freeform Roll',
                    formula: this.ffFormulaText || '',
                    kept: this._cellsFromDice(all.filter(d => d.kept)),
                    dropped: this._cellsFromDice(all.filter(d => !d.kept)),
                    bonuses: [],
                    total: this.ffTotal || 0,
                };
            },

            _buildWoundCheckImagePayload() {
                const bonuses = [];
                for (const b of (this.formula?.bonuses || [])) {
                    if (b && b.amount && b.label) {
                        bonuses.push({label: b.label, amount: b.amount});
                    }
                }
                if ((this.wcRaisesSpent || 0) > 0) {
                    const n = this.wcRaisesSpent;
                    bonuses.push({
                        label: n === 1 ? 'from 1 raise spent'
                                       : 'from ' + n + ' raises spent',
                        amount: n * 5,
                    });
                }
                if ((this.wcPostRollVpSpent || 0) > 0) {
                    const n = this.wcPostRollVpSpent;
                    bonuses.push({
                        label: 'from ' + n + ' VP spent post-roll',
                        amount: n * 5,
                    });
                }
                const passed = !!this.wcPassed;
                const margin = passed
                    ? (this.wcRollTotal || this.baseTotal || 0) - (this.wcLightWounds || 0)
                    : (this.wcLightWounds || 0) - (this.wcRollTotal || this.baseTotal || 0);
                const footer = passed
                    ? `vs TN ${this.wcLightWounds || 0} - Passed (+${margin})`
                    : `vs TN ${this.wcLightWounds || 0} - Failed by ${margin}`;
                // Derive the formula subtitle from ``this.formula`` (which
                // ``rollWoundCheck`` sets fresh on every roll). The shared
                // ``this.formulaText`` field is only stamped by the
                // generic skill-roll path - so reading it here would let
                // a prior "6k3 + 5" bleed onto a 4k3 wound-check card.
                const wcF = this.formula || {};
                let wcFormulaText = '';
                if (wcF.rolled && wcF.kept) {
                    wcFormulaText = (wcF.flat || 0) > 0
                        ? `${wcF.rolled}k${wcF.kept} + ${wcF.flat}`
                        : `${wcF.rolled}k${wcF.kept}`;
                }
                const extras = this._extraBonusBullets(this.formula);
                // Append the post-roll outcome bullet once the player has
                // chosen (Keep LW / Take 1 SW on pass, or auto/manual apply
                // on fail). Captured here so the readonly Roll History
                // modal can show what actually happened to the character.
                const lw = this.wcLightWounds || 0;
                if (this.wcResultChoice === 'keep_lw') {
                    extras.push(
                        'Kept ' + lw + ' light wound' + (lw === 1 ? '' : 's')
                    );
                } else if (this.wcResultChoice === 'take_1_sw') {
                    extras.push(
                        'Took 1 serious wound; light wounds reset to 0'
                    );
                } else if (this.wcResultChoice === 'failure_applied') {
                    const sw = this.wcSeriousWounds || 0;
                    extras.push(
                        'Took ' + sw + ' serious wound' + (sw === 1 ? '' : 's')
                        + '; light wounds reset to 0'
                    );
                }
                return {
                    title: 'Wound Check',
                    formula: wcFormulaText,
                    kept: this._cellsFromDice(this.keptDice || []),
                    dropped: this._cellsFromDice(this.unkeptDice || []),
                    bonuses: bonuses,
                    extras: extras,
                    kept_sum: this.keptSum || 0,
                    total: this.wcRollTotal || this.baseTotal || 0,
                    footer: footer,
                    alternatives: this._alternativesForPayload(this.formula),
                };
            },

            _buildAttackImagePayload() {
                const bonuses = [];
                for (const b of (this.atkFormula?.bonuses || [])) {
                    if (b && b.amount && b.label) {
                        bonuses.push({label: b.label, amount: b.amount});
                    }
                }
                if ((this.atkRaisesSpent || 0) > 0) {
                    const n = this.atkRaisesSpent;
                    bonuses.push({
                        label: n === 1 ? 'from 1 raise spent'
                                       : 'from ' + n + ' raises spent',
                        amount: n * 5,
                    });
                }
                if ((this.atkPostRollBonusApplied || 0) !== 0) {
                    bonuses.push({
                        label: 'extra bonus',
                        amount: this.atkPostRollBonusApplied,
                    });
                }
                let footer;
                if (this.atkHit) {
                    const extras = this.atkExtraDice || 0;
                    const noun = extras === 1 ? 'die' : 'dice';
                    footer = `vs TN ${this.atkEffectiveTN()} - Hit (+${extras} damage ${noun})`;
                } else {
                    footer = `vs TN ${this.atkEffectiveTN()} - Missed by ${-(this.atkExcess || 0)}`;
                }
                return {
                    title: (this.atkFormula?.label || 'Attack')
                        .replace(/\s*\(.*\)/, ''),
                    formula: (this.atkFormula?.rolled || 0)
                        + 'k' + (this.atkFormula?.kept || 0),
                    kept: this._cellsFromDice(this.keptDice || []),
                    dropped: this._cellsFromDice(this.unkeptDice || []),
                    bonuses: bonuses,
                    extras: this._extraBonusBullets(this.atkFormula),
                    kept_sum: this.keptSum || 0,
                    total: this.atkRollTotal || this.baseTotal || 0,
                    footer: footer,
                    alternatives: this._alternativesForPayload(this.atkFormula),
                };
            },

            _buildAttackDamageImagePayload() {
                // The damage roll reuses ``finalDice`` after the
                // damage tray rolls (it's the damage dice now, not
                // the attack ones). ``atkDamageTotal`` carries the
                // kept-sum + flat; we surface it as the trophy line.
                // ``atkDamageParts`` is an array of strings ("+N from
                // <source>") that we lift into named bonus entries.
                return {
                    title: 'Damage',
                    formula: (this.atkDamageRolled || 0)
                        + 'k' + (this.atkDamageKept || 0),
                    kept: this._cellsFromDice(
                        (this.finalDice || []).filter(d => d.kept)
                    ),
                    dropped: this._cellsFromDice(
                        (this.finalDice || []).filter(d => !d.kept)
                    ),
                    bonuses: [],
                    // Damage rolls don't accept VP/OW/etc - pull from the
                    // narrow damage-only extras helper.
                    extras: this._damageExtraBonusBullets(),
                    kept_sum: this.keptSum || 0,
                    total: this.atkDamageTotal || 0,
                };
            },

            _buildDuelContestedImagePayload() {
                return {
                    title: 'Iaijutsu Duel - Contested',
                    formula: this.formulaText || '',
                    kept: this._cellsFromDice(this.keptDice || []),
                    dropped: this._cellsFromDice(this.unkeptDice || []),
                    bonuses: [],
                    extras: this._extraBonusBullets(this.formula),
                    kept_sum: this.keptSum || 0,
                    total: this.duelContestedRoll || this.baseTotal || 0,
                };
            },

            _buildDuelStrikeImagePayload() {
                return {
                    title: 'Iaijutsu Duel - Strike',
                    formula: this.formulaText || '',
                    kept: this._cellsFromDice(this.keptDice || []),
                    dropped: this._cellsFromDice(this.unkeptDice || []),
                    bonuses: [],
                    extras: this._extraBonusBullets(this.formula),
                    kept_sum: this.keptSum || 0,
                    total: this.duelStrikeRoll || this.baseTotal || 0,
                };
            },

            _buildDuelDamageImagePayload() {
                const dice = (this.duelDamageDice || this.atkDamageDice || [])
                    .map(d => ({
                        parts: Array.isArray(d.parts) && d.parts.length
                            ? d.parts : [d.value],
                    }));
                return {
                    title: 'Iaijutsu Duel - Damage',
                    formula: '',
                    kept: dice,
                    dropped: [],
                    bonuses: [],
                    // Damage rolls don't accept VP/OW; reuse the narrow helper.
                    extras: this._damageExtraBonusBullets(),
                    kept_sum: this.keptSum || 0,
                    total: this.duelDamageTotal || this.atkDamageTotal || 0,
                };
            },

            _buildKakita5thImagePayload() {
                const bonuses = [];
                if ((this.k5NoIaijutsuBonus || 0) > 0) {
                    bonuses.push({
                        label: '5th Dan (opponent has no iaijutsu)',
                        amount: this.k5NoIaijutsuBonus,
                    });
                }
                if ((this.k5KakitaBonus || 0) > 0) {
                    bonuses.push({
                        label: 'Kakita 3rd Dan',
                        amount: this.k5KakitaBonus,
                    });
                }
                if ((this.k5ContestSkillBonus || 0) > 0) {
                    bonuses.push({
                        label: 'contested-roll skill gap',
                        amount: this.k5ContestSkillBonus,
                    });
                }
                const all = this.k5RollDice || [];
                const keptSum = all.filter(d => d.kept)
                    .reduce((s, d) => s + (d.value || 0), 0);
                return {
                    title: 'Kakita 5th Dan Contest',
                    formula: this.k5FormulaText || '',
                    kept: this._cellsFromDice(all.filter(d => d.kept)),
                    dropped: this._cellsFromDice(all.filter(d => !d.kept)),
                    bonuses: bonuses,
                    extras: this._extraBonusBullets(this.formula),
                    kept_sum: keptSum,
                    total: this.k5RollTotal || 0,
                };
            },

            // Route to the right ``_buildXImagePayload`` based on whichever
            // result modal is currently showing. Returns ``null`` when no
            // roll has settled yet (pre / rolling phases, or every modal
            // closed). The watcher below uses this both as the source of
            // truth for the re-prerender payload AND as the place its
            // reactive dependencies are read - so any field that affects
            // a returned payload must be touched here.
            _currentResultPayload() {
                if (this.wcModalOpen && this.wcPhase === 'result') {
                    return this._buildWoundCheckImagePayload();
                }
                if (this.atkModalOpen) {
                    if (this.atkPhase === 'result') return this._buildAttackImagePayload();
                    if (this.atkPhase === 'damage-result') return this._buildAttackDamageImagePayload();
                }
                if (this.duelOpen) {
                    if (this.duelPhase === 'contested-result') return this._buildDuelContestedImagePayload();
                    if (this.duelPhase === 'strike-result') return this._buildDuelStrikeImagePayload();
                    if (this.duelPhase === 'damage-result') return this._buildDuelDamageImagePayload();
                }
                if (this.k5Open && this.k5Phase === 'result') {
                    return this._buildKakita5thImagePayload();
                }
                if (this.open && this.phase === 'done') {
                    return (this.formula && this.formula.is_initiative)
                        ? this._buildInitiativeImagePayload()
                        : this._buildRollImagePayload();
                }
                return null;
            },

            // ----------------------------------------------------------------
            // Roll History persistence. See app/services/rolls_history.py for
            // the server-side recording gate (owner-only + non-admin-editor;
            // admins NEVER record on someone else's char). The client posts
            // unconditionally; non-recording cases get a 204 and
            // _rollHistoryId stays null so the PATCH path is a no-op.
            // ----------------------------------------------------------------

            _impairedNow() {
                const t = window._trackingBridge;
                const sw = (t && typeof t.seriousWounds === 'number')
                    ? t.seriousWounds
                    : {{ character.current_serious_wounds or 0 }};
                return window.L7RRollMath.isImpaired(sw, {{ ring_map['Earth'] }});
            },

            _currentTn() {
                // TN is captured only when the rolling character's own state
                // determines it (attack TN derived from defender Parry; WC TN
                // is the current LW). Parry rolls intentionally skip TN -
                // their TN is the attacker's roll result, which the parry
                // modal doesn't track. Damage rolls have NO TN even though
                // they reuse atkModalOpen (only the attack roll's TN matters,
                // and we capture it during atkPhase === 'result'). All other
                // roll types return null.
                if (this.wcModalOpen && this.wcPhase === 'result') {
                    return (this.wcLightWounds > 0) ? this.wcLightWounds : null;
                }
                if (this.atkModalOpen && this.atkPhase === 'result') {
                    return (this.atkTN > 0) ? this.atkTN : null;
                }
                return null;
            },

            _currentActionDieSpent() {
                const i = this._actionDieSpentIndex;
                if (i == null || i < 0) return null;
                const t = window._trackingBridge;
                if (!t || !Array.isArray(t.actionDice) || !t.actionDice[i]) return null;
                return {
                    value: t.actionDice[i].value,
                    source: this.currentRollKey || '',
                };
            },

            _currentRollHistoryPayload() {
                // Derive key + label from whichever modal is in a result
                // phase. The dice-roller's ``this.title`` / ``currentRollKey``
                // are only updated by its OWN main path (executeRoll /
                // executeRollWithExtraFlat / rollBless); modal-specific
                // result phases (attack, attack damage, WC, duel, K5)
                // leave those fields untouched, which would otherwise
                // re-record the previous skill roll's key for an attack.
                const payload = this._currentResultPayload() || {};
                // When Lucky has fired on this roll, attach both halves
                // (original + reroll dice and totals) so the Roll History
                // page can render the pair with a Lucky badge. The server
                // stores the JSON verbatim and the dice-card renderer
                // ignores unknown fields, so this needs no Python change.
                if (this.luckyUsedThisRoll && this.luckyRollPair) {
                    payload.lucky = this.luckyRollPair;
                }
                const {key, label} = this._currentRollHistoryKeyAndLabel(payload);
                return {
                    roll_key: key,
                    roll_label: label,
                    payload: payload,
                    impaired_at_roll: this._impairedNow(),
                    tn: this._currentTn(),
                    action_die_spent: this._currentActionDieSpent(),
                };
            },

            _currentRollHistoryKeyAndLabel(payload) {
                // Mirror the routing in ``_currentResultPayload``.
                if (this.wcModalOpen && this.wcPhase === 'result') {
                    return {key: 'wound_check', label: 'Wound Check'};
                }
                if (this.atkModalOpen) {
                    if (this.atkPhase === 'result') {
                        return {
                            key: this.atkKey || 'attack',
                            label: (payload && payload.title) || 'Attack',
                        };
                    }
                    if (this.atkPhase === 'damage-result') {
                        // Damage is a follow-on to the attack; namespace
                        // its key off the attack's key so the history can
                        // tell which weapon (knack) the damage came from.
                        const base = this.atkKey || 'attack';
                        return {
                            key: base + ':damage',
                            label: (payload && payload.title) || 'Damage',
                        };
                    }
                }
                if (this.duelOpen) {
                    if (this.duelPhase === 'contested-result') {
                        return {
                            key: 'iaijutsu:contested',
                            label: (payload && payload.title) || 'Iaijutsu Contested',
                        };
                    }
                    if (this.duelPhase === 'strike-result') {
                        return {
                            key: 'iaijutsu:strike',
                            label: (payload && payload.title) || 'Iaijutsu Strike',
                        };
                    }
                    if (this.duelPhase === 'damage-result') {
                        return {
                            key: 'iaijutsu:damage',
                            label: (payload && payload.title) || 'Iaijutsu Damage',
                        };
                    }
                }
                if (this.k5Open && this.k5Phase === 'result') {
                    return {
                        key: 'kakita_5th_dan',
                        label: (payload && payload.title) || 'Kakita 5th Dan',

                return {

            _saveRollHistoryCreate() {
                const t = window._trackingBridge;
                if (!t || !t._charId) return;
                const reqId = ++this._rollHistoryReqId;
                this._rollHistoryId = null;
                this._lastRollHistorySig = '';
                this._rollHistoryPendingPayload = null;
                const body = this._currentRollHistoryPayload();
                fetch('/characters/' + t._charId + '/rolls', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body),
                }).then(r => (r.status === 204 ? null : r.json()))
                  .then(data => {
                      if (reqId !== this._rollHistoryReqId) return;  // stale
                      if (data && data.id) {
                          this._rollHistoryId = data.id;
                          this._lastRollHistorySig = JSON.stringify(body.payload);
                          // A choice handler (Keep LW / Take 1 SW / failure
                          // auto-apply) may have fired AND captured a
                          // snapshot BEFORE this POST returned. PATCH with
                          // the snapshot directly - it's immune to the
                          // modal having closed in the meantime.
                          if (this._rollHistoryPendingPayload) {

                    // current payload so the deferred PATCH can use it
                    // even if the modal closes in the meantime.
                    if (this._currentResultPayload()) {
                        this._rollHistoryPendingPayload = this._currentRollHistoryPayload();
                    }
                    return;
                }
                clearTimeout(this._rollHistoryUpdateTimer);
                this._rollHistoryUpdateTimer = setTimeout(
                    () => this._flushRollHistoryUpdate(), 200,
                );
            },

            _flushRollHistoryUpdate() {
                clearTimeout(this._rollHistoryUpdateTimer);
                if (!this._rollHistoryId) {
                    if (this._currentResultPayload()) {
                        this._rollHistoryPendingPayload = this._currentRollHistoryPayload();
                    }
                    return;
                }
                // If no result modal is currently showing a payload, skip:
                // a stale timer firing mid-animation of the next roll would
                // otherwise wipe the previous row's payload with {}.
                const inner = this._currentResultPayload();
                if (!inner) return;
                this._patchRollHistory(this._currentRollHistoryPayload());
            },

            _patchRollHistory(body, opts) {
                if (!body) return;
                const sig = JSON.stringify(body.payload);
                if (sig === this._lastRollHistorySig) return;
                const t = window._trackingBridge;
                if (!t || !t._charId || !this._rollHistoryId) return;
                this._lastRollHistorySig = sig;
                // ``keepalive`` lets the browser deliver the PATCH even when
                // the page is unloading (user clicked a nav link right after
                // the action that triggered this patch). Without it, the
                // fetch is aborted at navigation and the update is lost -
                // which is how Lucky's payload.lucky pair was getting
                // dropped when a user clicked away within ~200 ms.
                fetch('/characters/' + t._charId + '/rolls/' + this._rollHistoryId, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        payload: body.payload,
                        action_die_spent: body.action_die_spent,
                    }),
                    keepalive: !!(opts && opts.keepalive),
                }).catch(() => { /* non-fatal */ });

            // the payload.lucky pair lands even if the user immediately
            // closes the modal or navigates away. Also marks the fetch as
            // ``keepalive`` so a navigation in mid-flight doesn't abort it.
            // If the initial-roll POST hasn't yet returned (rare race
            // when Lucky fires before its response lands), stash the
            // payload so ``_saveRollHistoryCreate``'s .then() PATCHes it
            // as soon as the id arrives.
            _patchRollHistoryNow() {
                const body = this._currentRollHistoryPayload();
                if (!body) return;
                if (!this._rollHistoryId) {
                    this._rollHistoryPendingPayload = body;
                    return;
                }
                clearTimeout(this._rollHistoryUpdateTimer);
                this._patchRollHistory(body, {keepalive: true});
            },

            // Debounced entry point for post-roll mutations. Each watcher
            // (registered in ``init()``) calls this when a tracked field
            // changes. The 200 ms timer collapses bursts (toggling a
            // checkbox triggers two field writes within the same tick;
            // typing a number into the post-roll bonus input fires per
            // keystroke) into a single re-render, and the signature
            // dedupe avoids the redundant fire that happens right after
            // the explicit phase-transition prerender call.
            _maybeReprerender() {
                if (this.rollImageStatus === 'idle') return;
                clearTimeout(this._reprerenderTimer);
                this._reprerenderTimer = setTimeout(() => {
                    if (this.rollImageStatus === 'idle') return;
                    const payload = this._currentResultPayload();
                    if (!payload) return;
                    const sig = JSON.stringify(payload);
                    if (sig === this._lastPayloadSig) return;

            async copyRollImage() {
                // Clipboard.write must be called from inside a user
                // gesture and Safari rejects gesture chains that have
                // already awaited a network response. With the blob
                // pre-rendered, this handler stays synchronous up to
                // the clipboard.write call.
                if (!this.rollImageBlob) {

                        new ClipboardItem({'image/png': this.rollImageBlob}),

                }

            // Editors never see it regardless (the partial gates server-side

            _resourcesSpentForBanner() {

                if (this.raisesSpentThisRoll || this.togashiRaisesSpentThisRoll) return true;
                if (this.convictionSpentThisRoll || this.mirumotoPointsSpentThisRoll) return true;
                if (this.luckyUsedThisRoll || this.togashiRerollUsed) return true;
                if (Object.values(this.priestAllySpentThisRoll || {}).some(n => n > 0)) return true;
                if ((this.preceptsPoolSwapBonuses || []).length > 0) return true;
                return false;

            // 3rd Dan free raises: spending and undo
            canSpendRaise() {

                const maxPerRoll = this.formula.adventure_raises_max_per_roll;

            undoRaise() {

                }

            // --- Conviction: daily-pool points, +1 each, max X per roll ---
            convictionPoolAvail() {
                const t = window._trackingBridge;

                return Math.max(0, (this.convictionConfig.daily_max || 0) - used);
            },
            convictionRollRemaining() {
                return Math.max(0, (this.convictionConfig.max_per_roll || 0) - this.convictionSpentThisRoll);
            },
            canSpendConviction() {

                    && this.convictionRollRemaining() > 0
                    && this.convictionPoolAvail() > 0;

            canUndoConviction() {

            spendConviction(target) {

                this.baseTotal += 1;
                if (target === 'attack') this.atkRollTotal += 1;
                if (target === 'wc') this.wcRollTotal += 1;
                if (target === 'damage') this.atkDamageTotal += 1;
                const t = window._trackingBridge;
                if (t) {
                    const used = (t.getCount('conviction') || 0);
                    t.setCount('conviction', used + 1);
                }
                if (target === 'attack' && typeof this._atkUpdateHitState === 'function') {
                    this._atkUpdateHitState();

                if (target === 'wc') this._wcUpdateMargin();
                if (target === 'attack' || target === 'damage') this._refreshAttackDieTooltip();
            },
            undoConviction(target) {

                this.convictionSpentThisRoll--;
                this.baseTotal -= 1;
                if (target === 'attack') this.atkRollTotal -= 1;
                if (target === 'wc') this.wcRollTotal -= 1;
                if (target === 'damage') this.atkDamageTotal -= 1;
                const t = window._trackingBridge;
                if (t) {
                    const used = (t.getCount('conviction') || 0);
                    t.setCount('conviction', Math.max(0, used - 1));
                }
                if (target === 'attack' && typeof this._atkUpdateHitState === 'function') {
                    this._atkUpdateHitState();
                }
                if (target === 'wc') this._wcUpdateMargin();
                if (target === 'attack' || target === 'damage') this._refreshAttackDieTooltip();
            },
            // --- Togashi 3rd Dan daily athletics raises ---
            togashiRaisesPoolAvail() {
                const t = window._trackingBridge;
                if (!t) return 0;
                const max = this.schoolAbilities.togashi_daily_raises_max || 0;
                return Math.max(0, max - (t.getCount('togashi_daily_athletics_raises') || 0));
            },
            togashiRaisesPerRollCap() {
                const perRoll = this.schoolAbilities.togashi_daily_raises_per_roll || 0;
                // Never allow more than what the daily pool has left (counting this roll's spends).
                return Math.min(perRoll, this.togashiRaisesPoolAvail() + this.togashiRaisesSpentThisRoll);
            },
            canSpendTogashiRaise() {
                return this.togashiRaisesSpentThisRoll < this.togashiRaisesPerRollCap();
            },
            spendTogashiRaise() {
                if (!this.canSpendTogashiRaise()) return;
                this.togashiRaisesSpentThisRoll++;
                this.baseTotal += 5;
                const t = window._trackingBridge;
                if (t) {
                    t.setCount('togashi_daily_athletics_raises',
                        (t.getCount('togashi_daily_athletics_raises') || 0) + 1);
                }
            },
            undoTogashiRaise() {
                if (this.togashiRaisesSpentThisRoll <= 0) return;
                this.togashiRaisesSpentThisRoll--;
                this.baseTotal -= 5;
                const t = window._trackingBridge;
                if (t) {
                    t.setCount('togashi_daily_athletics_raises',
                        Math.max(0, (t.getCount('togashi_daily_athletics_raises') || 0) - 1));
                }
            },

            _wcUpdateMargin() {
                // Recompute wound check pass/fail + margin after flat adjustments.
                const wc = window.L7RRollMath.woundCheckResult(this.wcRollTotal, this.wcLightWounds, this.formulas['wound_check']?.bayushi_5th_dan_half_lw);
                this.wcPassed = wc.passed;
                this.wcMargin = wc.margin;
                this.wcSeriousWounds = wc.seriousWounds;
            },

            // --- Priest 3rd Dan precepts pool display ---
            _isPreceptsPoolQualifyingRoll(modal) {
                // modal: 'attack' | 'damage' | 'wc' | 'roll'.
                // Returns true when the current modal's active roll is an
                // attack / parry / damage / wound check per the 3rd Dan rules.
                // Iaijutsu duel rolls (knack:iaijutsu, knack:iaijutsu:strike)
                // are excluded because they're not "attack, parry, wound
                // check, or damage" rolls per the user's spec - they're a
                // separate contested roll. The Kakita combat iaijutsu attack
                // (knack:iaijutsu:attack) IS included because it's an attack
                // roll - is_attack_type is set on it.
                if (modal === 'attack') {
                    return !!(this.atkFormula && this.atkFormula.is_attack_type);
                }
                if (modal === 'damage') {
                    // Damage panel is only visible when atkPhase hits
                    // 'damage-result', so the block reuses the same flag.
                    return !!(this.atkFormula && this.atkFormula.is_attack_type);
                }
                if (modal === 'wc') {
                    return true;   // wound-check modal only ever hosts wound check rolls
                }
                // Generic dice-roller modal: parry, athletics:parry, and
                // any attack-type knack roll that goes through it.
                const f = this.formula;
                if (f && f.is_attack_type) return true;
                if (this.currentRollKey === 'parry') return true;
                if (this.currentRollKey === 'athletics:parry') return true;
                return false;
            },
            preceptsPoolAlliesForThisRoll(modal) {
                // Returns [{priest_id, name, pool, isSelf}, ...]. Empty
                // list when the current roll doesn't qualify or no pool
                // is available anywhere.
                if (!this._isPreceptsPoolQualifyingRoll(modal)) return [];
                const out = [];
                if (this.schoolAbilities && this.schoolAbilities.priest_precepts_pool) {
                    const t = window._trackingBridge;
                    const selfPool = (t && Array.isArray(t.preceptsPool)) ? t.preceptsPool : [];
                    if (selfPool.length > 0) {
                        out.push({
                            priest_id: 'self',
                            name: this._charName || 'Your',
                            pool: selfPool,
                            isSelf: true,
                        });
                    }
                }
                for (const a of (this.priestPreceptsAllies || [])) {
                    if ((a.pool || []).length > 0) {
                        out.push({
                            priest_id: a.priest_id,
                            name: a.name,
                            pool: a.pool,
                            isSelf: false,
                        });
                    }
                }
                return out;
            },

            _preceptsModalKeptCount() {
                // The kept-count (N for "keep top N") of the active modal's
                // roll. All qualifying rolls keep the highest N.
                if (this.atkModalOpen && this.atkPhase === 'damage-result') {
                    return this.atkDamageKept || 0;
                }
                if (this.atkModalOpen) {
                    return (this.atkFormula && this.atkFormula.kept) || 0;
                }
                if (this.wcModalOpen) {
                    return (this.formulas && this.formulas['wound_check']
                            && this.formulas['wound_check'].kept) || 0;
                }
                return (this.formula && this.formula.kept) || 0;
            },
            _preceptsActiveModal() {
                if (this.atkModalOpen && this.atkPhase === 'damage-result') return 'damage';
                if (this.atkModalOpen) return 'attack';
                if (this.wcModalOpen) return 'wc';
                return 'roll';
            },
            preceptsSwapOptions(priest, poolDieValue) {
                // Per-pool-die dropdown options.
                //
                // Priest's own swap: any non-equal rolled die. The priest can
                // either help their roll (swap in a higher pool die) OR
                // refresh the pool by impairing their roll (swap in a lower
                // pool die and gain a higher kept die in the pool).
                //
                // Ally swap: strictly ``pool_die > rolled_die``. The priest
                // can only help allies, never hurt them.
                //
                // Equal-value swaps are a no-op and are excluded for both.
                const rolled = Array.isArray(this.finalDice) ? this.finalDice : [];
                const eligible = priest && priest.isSelf
                    ? rolled.filter(d => d && d.value !== poolDieValue)
                    : rolled.filter(d => d && d.value < poolDieValue);
                const values = Array.from(new Set(eligible.map(d => d.value))).sort((a, b) => a - b);
                if (values.length === 0) {
                    const label = priest && priest.isSelf
                        ? 'No different rolled dice to swap with'
                        : 'No lower rolled dice to swap with';
                    return [{ disabled: true, label }];
                }
                return values.map(v => ({ value: v, label: 'Swap with a rolled ' + v }));
            },
            preceptsPoolMenuPos: { top: 0, left: 0, flipped: false },
            _computePreceptsMenuPos(el) {
                // Position the pool-die swap dropdown near the clicked die.
                // Prefers above-the-die because the pool lives at the bottom
                // of roll modals where below would clip; clamps horizontally
                // so the menu never leaves the viewport. Uses fixed
                // positioning (via position:fixed in the template) so the
                // menu escapes any modal's overflow:hidden.
                const rect = el.getBoundingClientRect();
                const menuWidth = 220;       // matches min-w on the menu
                const menuHeight = 220;      // estimate only, used for flip check
                // Horizontal: center on the die, then clamp to viewport.
                let left = rect.left + rect.width / 2 - menuWidth / 2;
                if (left + menuWidth > window.innerWidth - 8) {
                    left = window.innerWidth - menuWidth - 8;
                }
                if (left < 8) left = 8;
                // Vertical: default to above (the pool tends to live at the
                // bottom of the modal, so above is the common case).
                let top = rect.top - 4;
                let flipped = true;
                // If flipping above would clip at the top, drop to below.
                if (top - menuHeight < 8) {
                    top = rect.bottom + 4;
                    flipped = false;
                }
                return { top, left, flipped };
            },
            openPreceptsPoolMenu(priest, poolDieIndex, el) {
                const key = priest.priest_id + ':' + poolDieIndex;
                if (this.preceptsPoolMenuOpen === key) {
                    this.preceptsPoolMenuOpen = null;
                    return;
                }
                if (el) {
                    this.preceptsPoolMenuPos = this._computePreceptsMenuPos(el);
                }
                this.preceptsPoolMenuOpen = key;
            },
            swapPreceptsDie(priest, poolDieIndex, rolledValue) {
                // Commit a swap: the clicked pool die moves into finalDice,
                // the replaced rolled die returns to the priest's pool. Kept
                // set is recomputed (top-N by value), totals shift by the
                // change in keptSum, and a structured bonus-source entry is
                // appended for display. Pool change is persisted per-owner.
                if (!Array.isArray(this.finalDice)) return;
                const rolledIdx = this.finalDice.findIndex(
                    d => d && d.value === rolledValue
                );
                if (rolledIdx < 0) return;
                const pool = priest && Array.isArray(priest.pool) ? priest.pool : null;
                if (!pool) return;
                const poolDie = pool[poolDieIndex];
                if (!poolDie) return;
                const poolValue = poolDie.value;
                // Equal-value swap is a no-op (excluded for both self/ally).
                if (poolValue === rolledValue) return;
                // Ally swap: strictly greater. Priest can help allies but
                // never impair their rolls.
                if (!priest.isSelf && poolValue < rolledValue) return;

                const prevRolledValue = this.finalDice[rolledIdx].value;

                this.finalDice.splice(rolledIdx, 1, {
                    value: poolValue,
                    kept: false,
                    parts: [poolValue],
                });
                pool.splice(poolDieIndex, 1, { value: prevRolledValue });

                // Re-kept: keep the top-N by value.
                const keptCount = this._preceptsModalKeptCount();
                const sortedIdx = this.finalDice
                    .map((d, i) => ({ i, v: d.value }))
                    .sort((a, b) => a.v - b.v);
                const keptIdxSet = new Set(
                    sortedIdx.slice(sortedIdx.length - keptCount).map(x => x.i)
                );
                for (let i = 0; i < this.finalDice.length; i++) {
                    this.finalDice[i] = {
                        ...this.finalDice[i],
                        kept: keptIdxSet.has(i),
                    };
                }
                this.keptDice = this.finalDice.filter(d => d.kept);
                const newKeptSum = this.keptDice.reduce((s, d) => s + d.value, 0);

                // Propagate the new keptSum to the active modal's total.
                const modal = this._preceptsActiveModal();
                const delta = newKeptSum - this.keptSum;
                this.keptSum = newKeptSum;
                this.baseTotal += delta;
                if (modal === 'attack') {
                    this.atkRollTotal += delta;
                    if (typeof this._atkUpdateHitState === 'function') {
                        this._atkUpdateHitState();
                    }
                    if (typeof this._refreshAttackDieTooltip === 'function') {
                        this._refreshAttackDieTooltip();
                    }
                } else if (modal === 'damage') {
                    this.atkDamageTotal += delta;
                    if (typeof this._refreshAttackDieTooltip === 'function') {
                        this._refreshAttackDieTooltip();
                    }
                } else if (modal === 'wc') {
                    this.wcRollTotal += delta;
                    if (typeof this._wcUpdateMargin === 'function') {
                        this._wcUpdateMargin();
                    }
                }

                this.preceptsPoolSwapBonuses = [
                    ...(this.preceptsPoolSwapBonuses || []),
                    {
                        priestId: priest.priest_id,
                        priestName: priest.name,
                        isSelf: !!priest.isSelf,
                        rolledValueBefore: prevRolledValue,
                        poolValueAfter: poolValue,
                    },
                ];

                if (priest.isSelf) {
                    const t = window._trackingBridge;
                    if (t) {
                        t.preceptsPool = pool;
                        t.save();
                    }
                } else {
                    this._postPreceptsPoolReplace(priest.priest_id, pool);
                }

                this.preceptsPoolMenuOpen = null;
            },
            _postPreceptsPoolReplace(priestId, pool) {
                // Phase 7 read-only shim: non-editors of the rolling
                // character never persist cross-character pool swaps.
                // The in-modal swap UI still updates local Alpine
                // state; the banner on the affected roll result
                // explains that the priest's resource isn't actually
                // depleted.
                const t = window._trackingBridge;
                if (!t || !t.canEdit) return;
                fetch('/characters/' + priestId + '/precepts-pool', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        pool,
                        rolling_character_id: t._charId,
                    }),
                }).catch(() => { /* best-effort */ });
            },

            // --- Priest 5th Dan ally conviction ---
            priestAllySpent(priestId) {
                return this.priestAllySpentThisRoll[priestId] || 0;
            },
            priestAllyPoolAvail(priest) {

            priestAllyRollRemaining(priest) {

            },
            canSpendPriestAlly(priest) {

            },
            spendPriestAlly(priest, target) {

                priest.used = (priest.used || 0) + 1;

                if (target === 'attack') this.atkRollTotal += 1;
                if (target === 'wc') this.wcRollTotal += 1;
                if (target === 'damage') this.atkDamageTotal += 1;

                if (target === 'attack' && typeof this._atkUpdateHitState === 'function') {

                }

                if (target === 'attack' || target === 'damage') this._refreshAttackDieTooltip();
            },
            undoPriestAlly(priest, target) {
                if (!this.canUndoPriestAlly(priest)) return;
                this.priestAllySpentThisRoll[priest.priest_id] -= 1;
                priest.used = Math.max(0, (priest.used || 0) - 1);
                this.baseTotal -= 1;

                if (target === 'wc') this.wcRollTotal -= 1;
                if (target === 'damage') this.atkDamageTotal -= 1;
                this._postPriestAllyDelta(priest.priest_id, -1);
                if (target === 'attack' && typeof this._atkUpdateHitState === 'function') {
                    this._atkUpdateHitState();
                }
                if (target === 'wc') this._wcUpdateMargin();
                if (target === 'attack' || target === 'damage') this._refreshAttackDieTooltip();
            },
            totalPriestAllySpentThisRoll() {
                return Object.values(this.priestAllySpentThisRoll).reduce((a, b) => a + b, 0);
            },
            _postPriestAllyDelta(priestId, delta) {
                // Phase 7 read-only shim: non-editors of the rolling
                // character never persist cross-character conviction
                // spends. The local spent-this-roll counter still
                // changes so the roll total and the banner reflect a
                // notional spend.
                const t = window._trackingBridge;
                if (!t || !t.canEdit) return;
                // Update the priest's persisted conviction_used counter.
                // The endpoint now validates that the caller has edit
                // access on the rolling character (passed as
                // rolling_character_id) and that the rolling character
                // shares the priest's gaming group.
                fetch(`/characters/${priestId}/ally-conviction`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        delta,
                        rolling_character_id: t._charId,
                    }),
                }).catch(() => { /* best-effort; UI already decremented locally */ });
            },
            raisesRemainingAdventure() {
                return Math.max(0, this.advRaisesConfig.available - this.advRaisesConfig.used);
            },

            // --- Sub-damage roll (feint damage, parry damage) ---

            async rollSubDamage(rolled, kept, label) {
                this.subDamageLabel = label;
                this.phase = 'sub-damage-rolling';
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    rolled, true,
                    this.prefs.dice_animation_enabled, playSound, 'dice-animation'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(kept, sorted.length);
                this.subDamageDice = sorted.map((d, i) => ({
                    value: d.value,
                    kept: i >= sorted.length - keptCount
                }));
                const keptDice = sorted.slice(sorted.length - keptCount);
                this.subDamageTotal = keptDice.reduce((s, d) => s + d.value, 0);
                this.phase = 'sub-damage-result';
            },

            // --- Iaijutsu Duel ---

            openDuelModal() {
                this.duelPhase = 'setup';
                this.duelPlayerTN = window.L7RRollMath.duelTn({{ character.starting_xp }} + {{ character.earned_xp }});
                this.duelContestedDone = false;
                this.duelPlayerCanFocus = true;
                this.duelOpponentCanFocus = true;
                this.duelRestartBonus = 0;
                this.duelVoidSelected = 0;
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.courtier5thApplied = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                // Clear copy-as-image state so the modal opens fresh.
                this.rollImageStatus = 'idle';
                this.rollImageBlob = null;
                this._rollImageReqId++;
                this._lastPayloadSig = '';
                this.duelOpen = true;
            },

            duelStartContested() {
                this.duelOpponentTN = window.L7RRollMath.duelTn(parseInt(this.duelOpponentXP || '0'));
                this.duelPhase = 'contested';
            },

            async duelRollContested() {
                const f = { ...this.formulas['knack:iaijutsu'] };
                // Add duel restart bonus
                f.flat += this.duelRestartBonus;
                // Add void spending
                const voidCount = this.duelVoidSelected;
                if (voidCount > 0) {
                    f.rolled += voidCount;
                    f.kept += voidCount;
                    f.void_spent = voidCount;
                    const _cap = window.L7RRollMath.applyDiceCap(f.rolled, f.kept, f.flat);
                    f.rolled = _cap.rolled; f.kept = _cap.kept; f.flat = _cap.flat;
                    // Mirumoto 5th Dan: +10 per VP on combat rolls
                    const combatBonus = this.voidSpendConfig.combat_vp_flat_bonus || 0;
                    if (combatBonus > 0) {
                        f.flat += voidCount * combatBonus;
                    }
                    const options = this.computeVoidOptions();
                    if (options[voidCount - 1]) this.deductVoidPoints(options[voidCount - 1]);
                }

                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.courtier5thApplied = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.duelPhase = 'contested-rolling';
                this.formula = f;
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    f.rolled, f.reroll_tens, this.prefs.dice_animation_enabled, playSound, 'dice-animation-duel'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
                this.keptSum = this.keptDice.reduce((s, d) => s + d.value, 0);
                this.baseTotal = this.keptSum + f.flat;
                this.duelContestedRoll = this.baseTotal;
                this.duelContestedDone = true;
                this.duelPhase = 'contested-result';
                this._prerenderRollImage(this._buildDuelContestedImagePayload());
                this._saveRollHistoryCreate();
            },

            duelProceedToFocusStrike() {
                this.duelPhase = 'focus_strike';
            },

            duelFocus() {
                if (!this.duelPlayerCanFocus) return;
                this.duelPlayerTN += 5;
                this.duelPlayerCanFocus = false;
                this.duelOpponentCanFocus = true;
            },

            duelOpponentFocus() {
                if (!this.duelOpponentCanFocus) return;
                this.duelOpponentTN += 5;
                this.duelOpponentCanFocus = false;
                this.duelPlayerCanFocus = true;
            },

            async duelRollStrike() {
                const f = { ...this.formulas['knack:iaijutsu:strike'] };
                f.flat += this.duelRestartBonus;
                this.luckyUsedThisRoll = false;
                this.togashiRerollUsed = false;
                this.courtier5thApplied = false;
                this.luckyOriginalWasHigher = false;
                this.luckyRollPair = null;
                this.duelPhase = 'strike-rolling';
                this.formula = f;
                const playSound = this.prefs.dice_sound_enabled && window.L7RDice
                    ? (n) => window.L7RDice.playDiceSound(n) : null;
                const dice = await window.L7RDice.rollAndAnimate(
                    f.rolled, false, this.prefs.dice_animation_enabled, playSound, 'dice-animation-duel'
                );
                const sorted = [...dice].sort((a, b) => a.value - b.value);
                const keptCount = Math.min(f.kept, sorted.length);
                this.finalDice = sorted.map((d, i) => ({ value: d.value, kept: i >= sorted.length - keptCount }));
                this.keptDice = sorted.filter((_, i) => i >= sorted.length - keptCount);
